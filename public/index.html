// Try to start server-side processing
async function tryServerSideProcessing() {
    console.log('=== tryServerSideProcessing ===');
    console.log('Assessment ID:', state.assessmentId);
    console.log('Server available:', serverSideAvailable);
    
    if (!state.assessmentId) {
        console.log('❌ No assessment ID for server processing');
        return false;
    }
    
    try {
        // Call server-side processing endpoint
        // Server will get documents from the assessment record
        console.log('Calling /api/assessment/' + state.assessmentId + '/process-server');
        var resp = await fetch('/api/assessment/' + state.assessmentId + '/process-server', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({
                priority: 1
            })
        });
        
        console.log('Response status:', resp.status);
        
        // Check if response is JSON
        var contentType = resp.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            console.log('⚠️ Response is not JSON, falling back to client-side');
            console.log('Content-Type:', contentType);
            return false;
        }
        
        // Check for error status codes
        if (!resp.ok) {
            console.log('⚠️ Server returned error status:', resp.status);
            var errorText = await resp.text();
            console.log('Error response:', errorText);
            return false;
        }
        
        var data = await resp.json();
        console.log('Response data:', data);
        
        if (data.success) {
            console.log('✅ Server processing started:', data);
            
            // Subscribe to WebSocket updates
            subscribeToAssessment(state.assessmentId);
            
            // Stay on actualProcessing screen but mark as background/server mode
            state.backgroundProcessing = true;
            state.processingMode = 'server';
            state.progressData = {
                status: 'processing',
                progress: 0,
                phase: 'starting',
                commentary: 'Server processing started. You can safely navigate away.',
                docsCount: data.documentsCount || 0
            };
            // Keep actualProcessing screen - don't switch to backgroundWatching
            // The render will show the Agent Pipeline with background mode banner
            render();
            
            return true;
        } else if (data.fallback === 'client') {
            console.log('⚠️ Server processing not available:', data.message);
            return false;
        } else {
            console.log('❌ Server processing failed:', data.error || data.message);
            return false;
        }
        
    } catch (err) {
        console.error('❌ Error starting server processing:', err.message);
        // Don't throw - just return false to fall back to client-side
        return false;
    }
}

// Helper to infer document type from key
function inferDocType(key) {
    var lower = (key || '').toLowerCase();
    if (lower.includes('balance') || lower.includes('bs')) return 'balance_sheet';
    if (lower.includes('profit') || lower.includes('loss') || lower.includes('pl') || lower.includes('p&l')) return 'profit_and_loss';
    if (lower.includes('gst')) return 'gst_return';
    if (lower.includes('bank')) return 'bank_statement';
    if (lower.includes('itr')) return 'itr';
    return 'balance_sheet';
}

async function runActualDataProcessing(){
    var ps = state.actualProcessingState;
    var companyName = state.uploadData.companyName;
    var loanAmount = state.uploadData.loanAmount;
    var industryType = state.uploadData.industryType;
    var files = state.uploadData.files;
    
    console.log('=== Starting Actual Data Processing ===');
    console.log('Company:', companyName, 'Loan:', loanAmount);
    console.log('Files:', Object.keys(files));
    
    // Client-side processing (original code)
    try {
        // Agent 0: Document Upload
        await processAgent(0, async function(){
            await processTask(0, 0, async function(){
                // Validate files
                console.log('Validating files...');
                addApiLog('info', 'Validating ' + Object.keys(files).length + ' files...');
                await delay(300);
            });
            
            await processTask(0, 1, async function(){
                console.log('Creating assessment...');
                addApiLog('info', 'Creating assessment record...');
                // Create assessment with timeout and retry
                try {
                    var createResp = await fetchWithTimeout('/api/assessment/create', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            companyName: companyName,
                            loanAmount: loanAmount,
                            industryType: industryType,
                            loanAccountNumber: state.uploadData.loanAccountNumber || null,
                            pennantData: state.uploadData.pennantData || null
                        })
                    }, 30000); // 30 second timeout
                    if(!createResp.ok) throw new Error('Server error: ' + createResp.status);
                    var createData = await createResp.json();
                    if(!createData.success) throw new Error(createData.error || 'Failed to create assessment');
                    state.assessmentId = createData.assessmentId;
                    addApiLog('info', 'Assessment ID: ' + state.assessmentId);
                    console.log('Assessment ID:', state.assessmentId);
                } catch(createErr) {
                    var errMsg = createErr.message || 'Failed to create assessment';
                    if(errMsg.includes('NetworkError') || errMsg.includes('Failed to fetch')) {
                        errMsg = 'Connection failed. Please check your internet connection and try again.';
                    }
                    throw new Error(errMsg);
                }
                
                // Upload all files
                var fileKeys = Object.keys(files);
                addApiLog('info', 'Uploading ' + fileKeys.length + ' documents...');
                for(var i = 0; i < fileKeys.length; i++){
                    var key = fileKeys[i];
                    var file = files[key];
                    console.log('Uploading:', key, file.name, '(' + Math.round(file.size/1024) + 'KB)');
                    
                    // Skip large files
                    if(file.size > 5 * 1024 * 1024) {
                        console.warn('Skipping large file:', key);
                        addApiLog('info', 'Skipped: ' + key + ' (>5MB)');
                        continue;
                    }
                    
                    var docType = getDocType(key);
                    var year = getDocYear(key);
                    try {
                        var base64 = await fileToBase64(file);
                        var uploadResp = await fetchWithTimeout('/api/upload/direct', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                assessmentId: state.assessmentId,
                                docType: docType,
                                docKey: key,
                                year: year,
                                fileData: base64,
                                fileName: file.name,
                                contentType: file.type
                            })
                        }, 120000); // 2 minute timeout per file
                        if(uploadResp.ok) {
                            addApiLog('info', 'Uploaded: ' + file.name + ' (' + Math.round(file.size/1024) + 'KB)');
                            console.log('Uploaded:', key, '→', docType + '_' + year);
                        } else {
                            addApiLog('api_error', 'Upload failed: ' + key);
                            console.error('Upload failed:', key, uploadResp.status);
                        }
                    } catch(uploadErr) {
                        addApiLog('api_error', 'Upload error: ' + uploadErr.message);
                        console.error('Upload error:', key, uploadErr.message);
                    }
                }
                addApiLog('info', 'All documents uploaded');
            });
            
            await processTask(0, 2, async function(){
                await delay(200);
            });
        });
        
        // ============================================
        // SERVER-SIDE PROCESSING - NOW THE DEFAULT
        // Processing happens on server, UI updates via WebSocket
        // ============================================
        
        if (serverSideAvailable) {
            console.log('🚀 Using SERVER-SIDE processing (BullMQ + Redis)');
            addApiLog('info', '🚀 Starting server-side processing...');
            
            // Build document list for server
            var docList = [];
            var assessment = await fetch('/api/assessment/' + state.assessmentId).then(r => r.json());
            if (assessment && assessment.documents) {
                Object.keys(assessment.documents).forEach(function(key) {
                    var doc = assessment.documents[key];
                    if (doc && doc.s3Key) {
                        docList.push({
                            id: key,
                            name: doc.filename || doc.originalName || key,
                            type: doc.docType || inferDocType(key),
                            s3Key: doc.s3Key
                        });
                    }
                });
            }
            
            console.log('Documents for server processing:', docList);
            addApiLog('info', 'Sending ' + docList.length + ' documents to server queue...');
            
            // Trigger server-side processing
            var serverResp = await fetch('/api/assessment/' + state.assessmentId + '/process-server', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({ documents: docList })
            });
            
            if (!serverResp.ok) {
                var errData = await serverResp.json().catch(function() { return {}; });
                console.error('Server processing failed:', errData);
                addApiLog('error', 'Server processing unavailable, falling back to client-side');
                // Fall through to client-side processing below
            } else {
                var serverData = await serverResp.json();
                console.log('✅ Server processing started:', serverData);
                addApiLog('success', '✅ Job queued on server (ID: ' + serverData.jobId + ')');
                
                // Mark Agent 0 as complete (uploads done)
                ps.agents[0].status = 'complete';
                ps.agents[0].tasks.forEach(function(t) { t.status = 'complete'; });
                
                // Mark Agent 1 as ACTIVE (not 'processing' - renderActualProcessingScreen looks for 'active')
                ps.agents[1].status = 'active';
                ps.currentAgent = 1;  // Set current agent index
                
                // Activate first available task in Agent 1
                if (ps.agents[1].tasks) {
                    var firstTaskActivated = false;
                    ps.agents[1].tasks.forEach(function(t) {
                        if (!firstTaskActivated && t.available !== false) {
                            t.status = 'active';
                            firstTaskActivated = true;
                        }
                    });
                }
                
                ps.serverProcessing = true;
                ps.serverJobId = serverData.jobId;
                
                // Set up WebSocket + polling for updates
                setupServerProgressListener();
                
                // Render to show Agent 1 as processing
                render();
                
                // Wait for server completion via WebSocket or polling
                try {
                    console.log('⏳ Waiting for server completion...');
                    await waitForServerCompletion();
                    console.log('✅ Server processing complete!');
                } catch (waitErr) {
                    console.error('Server wait error:', waitErr);
                    addApiLog('error', 'Server processing error: ' + waitErr.message);
                    // Server failed - show error and stop (don't fall through to client-side)
                    ps.error = waitErr.message || 'Server processing failed';
                    render();
                    return; // CRITICAL: Don't fall through to client-side processing
                }
                
                // Stop polling
                stopProgressPolling();
                
                // Server processing complete - load the final assessment
                addApiLog('info', 'Loading final assessment from server...');
                var finalAssessment = await loadFullAssessment(state.assessmentId);
                
                if (finalAssessment) {
                    console.log('✅ Final assessment loaded:', finalAssessment.status);
                    
                    // Update state with results
                    state.fullAssessment = finalAssessment;
                    state.extractedData = finalAssessment.extracted_data || finalAssessment.all_extracted_data;
                    
                    // Mark all agents complete
                    ps.agents.forEach(function(agent) {
                        if (agent) {
                            agent.status = 'complete';
                            if (agent.tasks) {
                                agent.tasks.forEach(function(t) { t.status = 'complete'; });
                            }
                        }
                    });
                    render();
                    
                    await delay(500); // Brief pause to show completion
                    
                    // Transition to results
                    completeProcessingAndShowResults(finalAssessment);
                    return;
                } else {
                    console.error('❌ Failed to load final assessment');
                    addApiLog('error', 'Failed to load assessment results');
                    // Server completed but couldn't load results - show error, don't fall through
                    ps.error = 'Server completed but failed to load results. Please refresh and check dashboard.';
                    render();
                    return; // CRITICAL: Don't fall through to client-side processing
                }
            }
        }
        
        // SAFEGUARD: If server processing was started but failed, don't run client-side
        if (ps.serverProcessing) {
            console.log('⚠️ Server processing was started but something went wrong - not falling back to client');
            ps.error = 'Server processing failed. Please check the server logs and try again.';
            render();
            return;
        }
        
        console.log('Using client-side processing');
        console.log('Server-side available:', serverSideAvailable);
        
        // Agent 1: Financial Statement Extractor (CLIENT-SIDE FALLBACK)
        await processAgent(1, async function(){
            var agent = ps.agents[1];
            if(!agent.available) {
                console.log('Agent 1 skipped - no financial docs');
                markAgentSkipped(1);
                return;
            }
            
            for(var t = 0; t < agent.tasks.length; t++){
                if(!agent.tasks[t].available) {
                    agent.tasks[t].status = 'skipped';
                    agent.tasks[t].note = 'No document uploaded';
                    render();
                    continue;
                }
                await processTask(1, t, async function(){
                    if(t === 0) {
                        // Extract ALL financials via Claude in ONE call
                        console.log('Calling /api/extract-financials...');
                        addApiLog('info', 'Starting financial document extraction...');
                        
                        // Count expected documents for progress calculation
                        // CRITICAL FIX: Track documents dynamically as we discover them from SSE
                        var totalExpectedDocs = 0;
                        var completedDocs = 0;
                        var discoveredDocs = {}; // Track unique documents we've seen
                        
                        Object.keys(state.uploadData.files || {}).forEach(function(key) {
                            var file = state.uploadData.files[key];
                            // Only count files that were actually uploaded (have buffer, s3Key, or data)
                            if(file && (file.buffer || file.s3Key || file.data)) {
                                totalExpectedDocs++;
                            }
                        });
                        totalExpectedDocs = Math.max(totalExpectedDocs, 1);
                        
                        // Connect to SSE for real-time progress updates
                        var sseConnected = false;
                        var sseLogsReceived = false;
                        var eventSource = null;
                        var currentDocName = 'Financial Statements';
                        
                        // Track current section being processed (shown in Agent 1 card)
                        ps.currentSection = 'Financial Statements';
                        ps.currentDocNum = 0;
                        ps.totalDocsInSection = {};
                        
                        try {
                            eventSource = new EventSource('/api/extraction-progress/' + state.assessmentId);
                            
                            eventSource.onmessage = function(event) {
                                try {
                                    var data = JSON.parse(event.data);
                                    sseLogsReceived = true;
                                    
                                    // Force timer update on every SSE event
                                    state.elapsed = Math.floor((Date.now() - ps.startTime) / 1000);
                                    
                                    if(data.type === 'connected') {
                                        sseConnected = true;
                                        addApiLog('info', '🔌 Real-time progress connected');
                                    }
                                    else if(data.type === 'section') {
                                        addApiLog('info', '');
                                        addApiLog('info', '━━━ ' + data.section + ' ━━━');
                                        currentDocName = data.section;
                                        
                                        // Update current section for visual display
                                        ps.currentSection = data.section;
                                        
                                        // SYNC AGENT PIPELINE WITH SECTION
                                        // Map section names to agent indices
                                        var sectionToAgent = {
                                            'Financial Statements': 1,  // Document Processing Agent
                                            'GST Returns': 3,           // GST Return Agent
                                            'Bank Statements': 2,       // Bank Statement Agent
                                            'ITR Returns': 4,           // ITR Document Agent
                                            'KYC Documents': 5,         // KYC Document Agent
                                            'Property Documents': 6     // Property Document Agent
                                        };
                                        
                                        var targetAgentIdx = sectionToAgent[data.section];
                                        if (targetAgentIdx !== undefined && ps.agents && ps.agents[targetAgentIdx]) {
                                            // Complete all previous agents up to this one
                                            for (var ai = 0; ai < targetAgentIdx; ai++) {
                                                if (ps.agents[ai] && ps.agents[ai].status === 'active') {
                                                    ps.agents[ai].status = 'complete';
                                                    // Mark all tasks as complete
                                                    if (ps.agents[ai].tasks) {
                                                        ps.agents[ai].tasks.forEach(function(t) {
                                                            if (t.status === 'active' || t.status === 'pending') {
                                                                t.status = 'complete';
                                                            }
                                                        });
                                                    }
                                                }
                                            }
                                            // Activate the target agent
                                            ps.agents[targetAgentIdx].status = 'active';
                                            ps.currentAgent = targetAgentIdx;
                                        }
                                        
                                        render();
                                    }
                                    else if(data.type === 'doc_start') {
                                        addApiLog('api_call', '[' + data.docNum + '] ' + data.docName + ' (' + data.sizeKB + ' KB) - Processing...');
                                        currentDocName = data.docName;
                                        ps.currentDocNum = data.docNum;
                                        ps.currentDocName = data.docName;
                                        
                                        // CRITICAL FIX: Track unique documents and update total if we discover more
                                        var docKey = data.docNum + '_' + data.docName;
                                        if(!discoveredDocs[docKey]) {
                                            discoveredDocs[docKey] = true;
                                            // If we're discovering more docs than we initially counted, update the total
                                            var discoveredCount = Object.keys(discoveredDocs).length;
                                            if(discoveredCount > totalExpectedDocs) {
                                                totalExpectedDocs = discoveredCount;
                                            }
                                        }
                                        
                                        // Update task status within current agent
                                        var activeAgentIdx = ps.currentAgent || 0;
                                        if (ps.agents && ps.agents[activeAgentIdx] && ps.agents[activeAgentIdx].tasks) {
                                            // Find next pending task and mark as active
                                            var foundActive = false;
                                            ps.agents[activeAgentIdx].tasks.forEach(function(task, ti) {
                                                if (!foundActive && task.status === 'pending') {
                                                    task.status = 'active';
                                                    foundActive = true;
                                                }
                                            });
                                        }
                                        render();
                                    }
                                    else if(data.type === 'doc_complete') {
                                        completedDocs++;
                                        var tokenPct = data.tokenUsage ? Math.round((data.tokenUsage.used / data.tokenUsage.limit) * 100) : 0;
                                        var tokenIcon = tokenPct >= 80 ? '!' : '';
                                        var outputTokens = data.outputTokens || Math.round((data.tokens || 0) * 0.15);
                                        
                                        addApiLog('api_response', '    ' + data.duration + 's | ' + (data.tokens || 0).toLocaleString() + ' | ' + outputTokens.toLocaleString() + ' tokens');
                                        if(data.tokenUsage) {
                                            addApiLog('rate_limit', '    ' + tokenIcon + ' Token usage: ' + data.tokenUsage.used.toLocaleString() + ' / ' + data.tokenUsage.limit.toLocaleString() + ' (' + tokenPct + '%)');
                                        }
                                        if(data.keyValues) {
                                            var vals = [];
                                            Object.keys(data.keyValues).forEach(function(k) {
                                                if(data.keyValues[k]) {
                                                    var v = data.keyValues[k];
                                                    if(typeof v === 'number' && v > 1000) v = formatCurrency(v);
                                                    vals.push(k + ': ' + v);
                                                }
                                            });
                                            if(vals.length > 0) addApiLog('field', '    ' + vals.join(' | '));
                                        }
                                        addApiLog('extraction', '    Complete');
                                        
                                        // Update stats
                                        ps.apiStats.calls = data.docNum;
                                        ps.apiStats.tokensSent += data.tokens || 0;
                                        ps.apiStats.tokensReceived += outputTokens;
                                        
                                        // Update progress percentage based on documents completed
                                        var docProgress = Math.round((completedDocs / totalExpectedDocs) * 100);
                                        ps.docProgress = docProgress;
                                        ps.currentDocName = data.docName + ' [DONE]';
                                        
                                        // Send progress update to server for background watching
                                        sendProgressUpdate(state.assessmentId, {
                                            progress: docProgress,
                                            commentary: 'Processing document ' + completedDocs + ' of ' + totalExpectedDocs + ': ' + data.docName,
                                            metrics: {
                                                documents: ps.docCount,
                                                apiCalls: ps.apiStats.calls,
                                                dataPoints: Object.keys(ps.extractedData || {}).length
                                            },
                                            currentDocument: data.docName
                                        });
                                        
                                        // Update task status - mark active task as complete
                                        var activeAgentIdx = ps.currentAgent || 0;
                                        if (ps.agents && ps.agents[activeAgentIdx] && ps.agents[activeAgentIdx].tasks) {
                                            ps.agents[activeAgentIdx].tasks.forEach(function(task) {
                                                if (task.status === 'active') {
                                                    task.status = 'complete';
                                                }
                                            });
                                        }
                                        
                                        render();
                                    }
                                    else if(data.type === 'doc_error') {
                                        addApiLog('api_error', '    ERROR: ' + data.error);
                                    }
                                    else if(data.type === 'rate_wait') {
                                        addApiLog('rate_limit', '    Pre-wait: ' + data.seconds + 's for rate limit window');
                                        ps.currentDocName = 'Waiting for rate limit...';
                                        render();
                                    }
                                    else if(data.type === 'rate_retry') {
                                        addApiLog('rate_limit', '    🔄 Retry attempt ' + data.attempt + '/' + data.maxRetries + ' after 429 error');
                                        ps.currentDocName = 'Retrying after rate limit...';
                                        render();
                                    }
                                    else if(data.type === 'complete') {
                                        addApiLog('info', '');
                                        addApiLog('extraction', 'Extraction complete: ' + data.totalDocs + ' documents in ' + data.totalTime + 's');
                                        ps.currentSection = 'Complete';
                                        ps.currentDocName = 'All documents extracted';
                                    }
                                    
                                    render();
                                } catch(e) {
                                    console.error('SSE parse error:', e);
                                }
                            };
                            
                            eventSource.onerror = function(err) {
                                console.log('SSE connection closed or error');
                            };
                        } catch(sseErr) {
                            console.log('SSE not available, falling back to batch mode');
                        }
                        
                        // Store sseLogsReceived in processing state so HTTP handler can check it
                        ps.sseLogsReceived = function() { return sseLogsReceived; };
                        
                        try {
                            addApiLog('api_call', 'POST /api/extract-financials');
                            addApiLog('api_call', 'Model: claude-sonnet-4-20250514');
                            if(!sseConnected) {
                                addApiLog('api_call', 'Sending documents to Anthropic Claude API...');
                                addApiLog('info', 'Please wait - processing takes several minutes...');
                            }
                            
                            var extractStartTime = Date.now();
                            var extractResp = await fetchWithTimeout('/api/extract-financials', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({assessmentId: state.assessmentId})
                            }, 600000); // 10 minutes timeout for large documents
                            var extractTime = ((Date.now() - extractStartTime) / 1000).toFixed(1);
                            
                            // Close SSE connection
                            if(eventSource) {
                                eventSource.close();
                            }
                            
                            console.log('Extract response:', extractResp.status);
                            if(!extractResp.ok) {
                                addApiLog('api_error', 'API returned status: ' + extractResp.status);
                                throw new Error('Extract failed: ' + extractResp.status);
                            }
                            var extractData = await extractResp.json();
                            
                            if(extractData.success) {
                                ps.extractedData = extractData.extractedData;
                                
                                // Update API stats
                                if(extractData.apiStats) {
                                    ps.apiStats.calls += extractData.apiStats.calls || 1;
                                    ps.apiStats.tokensSent += extractData.apiStats.inputTokens || 0;
                                    ps.apiStats.tokensReceived += extractData.apiStats.outputTokens || 0;
                                }
                                
                                // Update rate limits from actual API response
                                if(extractData.rateLimits) {
                                    ps.rateLimits = extractData.rateLimits;
                                    if(ps.rateLimits.requests && ps.rateLimits.requests.limit > 0) {
                                        ps.rateLimits.usagePercent = Math.round((ps.rateLimits.requests.used / ps.rateLimits.requests.limit) * 100);
                                    }
                                    if(ps.rateLimits.tokens && ps.rateLimits.tokens.limit > 0) {
                                        ps.rateLimits.tokensUsagePercent = Math.round((ps.rateLimits.tokens.used / ps.rateLimits.tokens.limit) * 100);
                                    }
                                }
                                
                                // Save document timings for API log display
                                if(extractData.documentTimings) {
                                    ps.documentTimings = extractData.documentTimings;
                                }
                                
                                // Save summary info
                                if(extractData.summary) {
                                    ps.extractionSummary = extractData.summary;
                                }
                                
                                // Process detailed API call logs from server
                                // Skip if SSE logs were already received (Fix 5: avoid duplicates)
                                var skipBatchLogs = ps.sseLogsReceived && ps.sseLogsReceived();
                                
                                if(!skipBatchLogs && extractData.apiCallLogs && extractData.apiCallLogs.length > 0) {
                                    var runningTokens = 0;
                                    var TOKEN_LIMIT = 30000;
                                    
                                    extractData.apiCallLogs.forEach(function(call, idx) {
                                        var inputTokens = call.tokensUsed?.input || 0;
                                        runningTokens += inputTokens;
                                        
                                        // Add detailed API call entry
                                        addApiLog('api_call', '━━━ [' + (idx+1) + '] ' + call.document + ' (' + (call.documentSize || '?') + ' KB) ━━━');
                                        
                                        if(call.success) {
                                            // Time and tokens on one line
                                            addApiLog('api_response', (call.responseTime || 0).toFixed(1) + 's | ' + inputTokens.toLocaleString() + ' tokens in / ' + (call.tokensUsed?.output || 0).toLocaleString() + ' out');
                                            
                                            // Token limit status
                                            var tokenPct = Math.round((runningTokens / TOKEN_LIMIT) * 100);
                                            var limitIcon = tokenPct >= 80 ? '!' : '';
                                            addApiLog('rate_limit', limitIcon + ' Token usage: ' + runningTokens.toLocaleString() + ' / ' + TOKEN_LIMIT.toLocaleString() + ' (' + tokenPct + '%)');
                                            
                                            // Show if rate limit wait was needed
                                            if(tokenPct >= 80) {
                                                addApiLog('rate_limit', 'Rate limit wait triggered (62s for window reset)');
                                                runningTokens = 0; // Reset after wait
                                            }
                                            
                                            // Log key extracted values
                                            if(call.keyValues) {
                                                var keyVals = [];
                                                Object.keys(call.keyValues).forEach(function(k) {
                                                    if(call.keyValues[k] !== null && call.keyValues[k] !== undefined) {
                                                        var val = call.keyValues[k];
                                                        if(typeof val === 'number' && val > 1000) {
                                                            keyVals.push(k + ': '+formatCurrency(val));
                                                        } else {
                                                            keyVals.push(k + ': ' + val);
                                                        }
                                                    }
                                                });
                                                if(keyVals.length > 0) {
                                                    addApiLog('field', keyVals.join(' | '));
                                                }
                                            }
                                            
                                            if(call.fieldsExtracted) {
                                                addApiLog('extraction', call.fieldsExtracted + ' fields (confidence: ' + (call.confidence || 'unknown') + ')');
                                            }
                                        } else {
                                            addApiLog('api_error', 'ERROR: ' + (call.error || 'Unknown error'));
                                        }
                                        
                                        addApiLog('info', ''); // Empty line separator
                                    });
                                } else if(!skipBatchLogs) {
                                    // Fallback to simple logging if no detailed logs
                                    addApiLog('api_response', 'Response received in ' + extractTime + 's');
                                    
                                    // Log extraction summary
                                    var summary = extractData.summary || {};
                                    addApiLog('info', '━━━ EXTRACTION SUMMARY ━━━');
                                    addApiLog('info', 'Total API Calls: ' + (summary.total_api_calls || '?'));
                                    addApiLog('info', 'Total Time: ' + (summary.total_time_seconds || extractTime) + 's');
                                    addApiLog('info', '');
                                    
                                    if(summary.balance_sheets > 0) addApiLog('extraction', summary.balance_sheets + ' Balance Sheet(s)');
                                    if(summary.pnl_statements > 0) addApiLog('extraction', summary.pnl_statements + ' P&L Statement(s)');
                                    if(summary.gst_returns > 0) addApiLog('extraction', summary.gst_returns + ' GST Return(s)');
                                    if(summary.bank_statements > 0) addApiLog('extraction', summary.bank_statements + ' Bank Statement(s)');
                                    if(summary.itr_returns > 0) addApiLog('extraction', summary.itr_returns + ' ITR Return(s)');
                                    if(summary.kyc_documents > 0) addApiLog('extraction', summary.kyc_documents + ' KYC Document(s)');
                                    if(summary.property_documents > 0) addApiLog('extraction', summary.property_documents + ' Property Document(s)');
                                    
                                    // Show per-document timings if available
                                    if(extractData.documentTimings && extractData.documentTimings.length > 0) {
                                        addApiLog('info', '');
                                        addApiLog('info', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                                        addApiLog('info', 'PER-DOCUMENT EXTRACTION TIMING');
                                        addApiLog('info', '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
                                        
                                        var totalTokens = 0;
                                        extractData.documentTimings.forEach(function(dt, idx) {
                                            var icon = dt.success ? '[OK]' : '[ERR]';
                                            var tokens = dt.tokens || 0;
                                            totalTokens += tokens;
                                            var tokenStr = tokens > 0 ? ' | ' + tokens.toLocaleString() + ' tokens' : '';
                                            addApiLog('field', '[' + (idx+1) + '] ' + icon + ' ' + dt.doc + ': ' + dt.time + 's' + tokenStr);
                                        });
                                        
                                        addApiLog('info', '');
                                        addApiLog('info', 'TOTALS: ' + extractData.documentTimings.length + ' docs | ' + totalTokens.toLocaleString() + ' tokens');
                                    }
                                }
                                
                                addApiLog('info', '1s delay between API calls for rate limit protection');
                                addApiLog('info', 'Financial extraction complete');
                                console.log('Extraction successful');
                            } else {
                                addApiLog('api_error', 'Extraction returned error: ' + (extractData.error || 'Unknown'));
                                console.warn('Extraction returned:', extractData.error);
                            }
                            
                            // Check rate limits
                            if(ps.rateLimits.usagePercent > 80) {
                                addApiLog('rate_limit', 'WARNING: Rate limit at ' + ps.rateLimits.usagePercent + '% - may slow down');
                            }
                            
                        } catch(extErr) {
                            // Close SSE if open
                            if(eventSource) { try { eventSource.close(); } catch(e){} }
                            
                            // Categorize error
                            var errorMsg = extErr.message || 'Unknown extraction error';
                            if(errorMsg.includes('NetworkError') || errorMsg.includes('Failed to fetch')) {
                                errorMsg = 'NetworkError: Connection to server lost. Please check your internet connection and try again.';
                            } else if(errorMsg.includes('timed out')) {
                                errorMsg = 'Request timed out. The document may be too large or the server is busy. Please try again.';
                            }
                            
                            addApiLog('api_error', 'Error: ' + errorMsg);
                            console.error('Extraction error:', errorMsg);
                            
                            // Store error but don't throw - let user see partial progress
                            ps.extractionError = errorMsg;
                            
                            // If we have no data at all, show error immediately
                            if(!ps.extractedData || (!ps.extractedData.balance_sheet && !ps.extractedData.profit_and_loss)) {
                                throw new Error(errorMsg);
                            }
                        }
                    } else {
                        await delay(300);
                    }
                });
            }
        });
        
        // Agents 2-7: Other extractors (simulated or skipped)
        for(var agentIdx = 2; agentIdx <= 7; agentIdx++){
            await processAgent(agentIdx, async function(){
                var agent = ps.agents[agentIdx];
                if(agent.available === false) {
                    markAgentSkipped(agentIdx);
                    return;
                }
                for(var t = 0; t < agent.tasks.length; t++){
                    if(agent.tasks[t].available === false) {
                        agent.tasks[t].status = 'skipped';
                        agent.tasks[t].note = 'Data not available';
                        render();
                        await delay(150);
                        continue;
                    }
                    await processTask(agentIdx, t, async function(){
                        await delay(250);
                    });
                }
            });
        }
        
        // After extraction, show review modal
        await delay(500);
        
        // Initialize review data with extracted values
        state.extractedData = ps.extractedData || {balance_sheet: {}, profit_and_loss: {}};
        state.reviewData = {
            balance_sheet: JSON.parse(JSON.stringify(state.extractedData.balance_sheet || {})),
            profit_and_loss: JSON.parse(JSON.stringify(state.extractedData.profit_and_loss || {})),
            notes: {},
            status: {}
        };
        
        // REVIEW MODAL COMMENTED OUT - Auto-continue without user review
        // To re-enable review modal, uncomment the 3 lines below and comment out the continueAfterReview() call
        /*
        state.showReviewModal = true;
        state.reviewCallback = continueAfterReview;
        render();
        */
        
        // Auto-continue processing without review modal
        await continueAfterReview();
        
    } catch(err) {
        // Stop the timer to prevent further renders
        if(ps.timerInterval) {
            clearInterval(ps.timerInterval);
            ps.timerInterval = null;
        }
        ps.error = err.message || 'An error occurred';
        render();
    }
}

async function continueAfterReview() {
    var ps = state.actualProcessingState;
    
    try {
        // Continue processing from Agent 8
        // Agent 8: Financial Ratio Calculator
        await processAgent(8, async function(){
            for(var t = 0; t < ps.agents[8].tasks.length; t++){
                await processTask(8, t, async function(){
                    await delay(200);
                });
            }
        });
        
        // Agent 9: Policy Compliance
        await processAgent(9, async function(){
            for(var t = 0; t < ps.agents[9].tasks.length; t++){
                await processTask(9, t, async function(){
                    await delay(200);
                });
            }
        });
        
        // Agent 10: Credit Scoring - Complete assessment
        await processAgent(10, async function(){
            await processTask(10, 0, async function(){
                await delay(200);
            });
            await processTask(10, 1, async function(){
                await delay(200);
            });
            await processTask(10, 2, async function(){
                // Get API logs from processing state
                var apiLogs = ps.apiLogs || [];
                var apiStats = ps.apiStats || {};
                var processingTime = ps.startTime ? Date.now() - ps.startTime : 0;
                var documentTimings = ps.documentTimings || [];
                var extractionSummary = ps.extractionSummary || {};
                
                // Complete assessment with API logs
                var completeResp = await fetch('/api/assessment/complete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        assessmentId: state.assessmentId,
                        reviewedData: state.reviewData,

                        apiStats: apiStats,
                        processingTime: processingTime,
                        documentTimings: documentTimings,
                        extractionSummary: extractionSummary
                    })
                });
                var completeData = await completeResp.json();
                if(!completeData.success) throw new Error(completeData.error || 'Failed to complete assessment');
                ps.completeData = completeData;
            });
            await processTask(10, 3, async function(){
                await delay(300);
            });
        });
        
        // All done - show results
        await delay(500);
        finishActualDataAssessment(ps.completeData);
        
    } catch(err) {
        // Stop the timer
        if(ps.timerInterval) {
            clearInterval(ps.timerInterval);
            ps.timerInterval = null;
        }
        var errorMsg = err.message || 'An error occurred';
        if(errorMsg.includes('NetworkError') || errorMsg.includes('Failed to fetch')) {
            errorMsg = 'NetworkError: Connection lost. Please go back to dashboard and try again.';
        }
        ps.error = errorMsg;
        render();
    }
}

function getDocType(key) {
    // Handle both single upload (bs_fy24) and bulk upload (balance_sheet_2024) naming
    if(key.startsWith('bs_') || key.startsWith('balance_sheet_')) return 'balance-sheet';
    if(key.startsWith('pnl_') || key.startsWith('pl_') || key.startsWith('profit_loss_')) return 'pnl';
    if(key.startsWith('cf_') || key.startsWith('cashflow_') || key.startsWith('cash_flow_')) return 'cashflow';
    if(key.startsWith('bank_') || key.startsWith('bank_statement_')) return 'bank-statement';
    if(key.startsWith('odcc_') || key.startsWith('od_') || key.startsWith('cc_')) return 'odcc-statement';
    if(key.startsWith('gst_') || key.startsWith('gst_returns') || key.startsWith('gstr')) return 'gst-return';
    if(key.startsWith('itr_') || key.startsWith('income_tax_')) return 'itr';
    if(key.startsWith('prop_') || key.startsWith('property_')) return 'property';
    if(key.startsWith('director') || key.startsWith('cibil_director')) return 'director-kyc';
    if(key.startsWith('cibil_')) return 'cibil';
    if(key.startsWith('notes_') || key.startsWith('notes_to_accounts_')) return 'notes';
    if(key.startsWith('auditor_') || key.startsWith('audit_')) return 'auditor-report';
    if(key === 'cin_certificate' || key === 'moa' || key === 'aoa' || key === 'gst_certificate' || 
       key === 'company_pan' || key === 'tan_certificate' || key === 'address_proof') return 'statutory';
    if(key === 'stock_statement' || key === 'receivables' || key === 'payables' || 
       key === 'customer_list' || key === 'supplier_list') return 'business';
    if(key === 'form_26as' || key === '26as_fy25') return 'form-26as';
    if(key === 'sanction_letters' || key === 'noc_lenders') return 'banking-other';
    
    // Legal & Collateral Documents (per property: legal_prop1_tsr, legal_prop2_ec, etc.)
    if(key.startsWith('legal_') || key.startsWith('tsr_') || key.startsWith('title_search_')) return 'legal-tsr';
    if(key.startsWith('ec_') || key.startsWith('encumbrance_')) return 'legal-ec';
    if(key.startsWith('legal_opinion_') || key.startsWith('advocate_')) return 'legal-opinion';
    if(key.startsWith('roc_search_') || key.startsWith('roc_')) return 'legal-roc';
    if(key.startsWith('mutation_') || key.startsWith('7_12_') || key.startsWith('khata_')) return 'legal-mutation';
    if(key.startsWith('prop_tax_') || key.startsWith('property_tax_')) return 'legal-tax';
    if(key.startsWith('approved_plan_') || key.startsWith('building_plan_')) return 'legal-plan';
    if(key.startsWith('oc_') || key.startsWith('cc_') || key.startsWith('occupancy_')) return 'legal-oc';
    if(key.startsWith('na_order_') || key.startsWith('na_conversion_')) return 'legal-na';
    if(key.startsWith('sale_deed_') || key.startsWith('conveyance_')) return 'legal-deed';
    if(key.startsWith('chain_') || key.startsWith('prior_')) return 'legal-chain';
    if(key.startsWith('society_') || key.startsWith('share_cert_')) return 'legal-society';
    
    return 'kyc';
}

function getDocYear(key) {
    // Handle FY format: bs_fy24, pnl_fy23
    var fyMatch = key.match(/fy(\d+)/i);
    if(fyMatch) {
        return 'fy' + fyMatch[1];
    }
    
    // Handle year format: balance_sheet_2024, pnl_2023
    var yearMatch = key.match(/_(\d{4})$/);
    if(yearMatch) {
        // Convert 2024 to fy24, 2023 to fy23
        var year = yearMatch[1];
        return 'fy' + year.slice(-2);
    }
    
    // Handle month format: bank_apr_2024, bank_statement_apr_2024
    var monthMatch = key.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)_?(\d{4}|\d{2})/i);
    if(monthMatch) {
        var month = monthMatch[1].toLowerCase();
        var yr = monthMatch[2];
        if(yr.length === 2) yr = '20' + yr;
        return month + '_' + yr;
    }
    
    return 'misc';
}

async function processAgent(agentIdx, fn) {
    var ps = state.actualProcessingState;
    ps.currentAgent = agentIdx;
    ps.agents[agentIdx].status = 'active';
    render();
    await fn();
    ps.agents[agentIdx].status = 'complete';
    render();
}

async function processTask(agentIdx, taskIdx, fn) {
    var ps = state.actualProcessingState;
    ps.currentTask = taskIdx;
    ps.agents[agentIdx].tasks[taskIdx].status = 'active';
    render();
    await fn();
    ps.agents[agentIdx].tasks[taskIdx].status = 'complete';
    render();
}

function markAgentSkipped(agentIdx) {
    var ps = state.actualProcessingState;
    ps.agents[agentIdx].status = 'skipped';
    ps.agents[agentIdx].tasks.forEach(function(t){
        t.status = 'skipped';
        t.note = 'No data available';
    });
    render();
}

function renderActualProcessingScreen() {
    var ps = state.actualProcessingState;
    
    // Safety check - if no processing state, redirect to dashboard
    if (!ps || !ps.agents) {
        console.warn('No actualProcessingState - redirecting to dashboard');
        setTimeout(function() { goToDashboard(); }, 0);
        return '<div class="min-h-screen bg-gray-50 flex items-center justify-center"><div class="text-gray-500">Loading...</div></div>';
    }
    
    var elapsed = Date.now() - ps.startTime;
    var completedAgents = ps.agents.filter(function(a){return a.status === 'complete'}).length;
    var skippedAgents = ps.agents.filter(function(a){return a.status === 'skipped'}).length;
    var totalAgents = ps.agents.length;
    // Look for 'active' OR 'processing' status
    var activeAgentIdx = ps.agents.findIndex(function(a){return a.status === 'active' || a.status === 'processing'});
    // If no active agent found, use currentAgent from state
    if (activeAgentIdx < 0 && ps.currentAgent !== undefined) {
        activeAgentIdx = ps.currentAgent;
    }
    var activeAgent = activeAgentIdx >= 0 ? ps.agents[activeAgentIdx] : ps.agents[0];
    
    // Calculate progress - prefer server-reported progress
    var serverProgress = (state.currentProgress !== undefined && state.currentProgress !== null) ? state.currentProgress : (ps.docProgress || 0);
    var agentProgress = Math.round(((completedAgents + skippedAgents) / totalAgents) * 100);
    serverProgress = Math.min(serverProgress, 100);
    agentProgress = Math.min(agentProgress, 100);
    // Use whichever progress is higher (server or agent-based)
    var progress = Math.max(serverProgress, agentProgress);
    progress = Math.min(progress, 100);
    
    // Calculate completed tasks for current agent
    var completedTasks = activeAgent ? activeAgent.tasks.filter(function(t){return t.status === 'complete' && t.available !== false}).length : 0;
    var totalTasks = activeAgent ? activeAgent.tasks.filter(function(t){return t.available !== false}).length : 0;
    
    // Dynamic commentary based on current agent

    // Calculate real metrics - use ps.docCount first, then fall back to uploadData.files
    var docCount = ps.docCount || Object.keys(state.uploadData?.files || {}).filter(function(k){return state.uploadData.files[k]}).length || 0;
    var apiCalls = ps.apiStats?.calls || 0;
    var validations = ps.agents.filter(function(a){return a.status === 'complete'}).length * 3;
    
    // Calculate REAL data points from extracted data
    var dataPoints = 0;
    if (ps.extractedData) {
        // Count actual fields in extracted data
        function countFields(obj) {
            var count = 0;
            if (!obj || typeof obj !== 'object') return 0;
            for (var key in obj) {
                if (obj[key] !== null && obj[key] !== undefined && obj[key] !== '') {
                    if (typeof obj[key] === 'object' && !Array.isArray(obj[key])) {
                        count += countFields(obj[key]);
                    } else {
                        count++;
                    }
                }
            }
            return count;

// Generate dynamic commentary based on current agent
function getAgentCommentary(agent, agentIdx, ps) {
    if(!agent) return 'Processing complete. Generating final assessment...';
    
    var agentName = agent.name.toLowerCase();
    var companyName = state.uploadData?.companyName || 'the company';
    
    if(agentName.includes('upload')) {
        return 'Uploading documents for ' + companyName + '. All files are being validated and securely stored before AI extraction begins.';
    } else if(agentName.includes('document processing')) {
        return 'The Document Agent is now extracting data from financial statements—Balance Sheet, P&L, Cash Flow. No manual entry required. What would take your team 2-3 hours is happening in seconds.';
    } else if(agentName.includes('bank')) {
        return 'Analyzing 12 months of bank transactions. Computing average balances, identifying cash flow patterns, and detecting any cheque returns or irregularities.';
    } else if(agentName.includes('gst')) {
        return 'Processing GST returns to verify turnover and tax compliance. Cross-checking against declared revenue in financial statements.';
    } else if(agentName.includes('itr')) {
        return 'Extracting income tax return data. Verifying declared income matches with P&L figures and tax payments are compliant.';
    } else if(agentName.includes('kyc')) {
        return 'Verifying company registration documents, director information, and incorporation details from uploaded KYC documents.';
    } else if(agentName.includes('property')) {
        return 'Analyzing property documents for collateral assessment. Extracting property details and checking valuation report.';
    } else if(agentName.includes('bureau') || agentName.includes('credit bureau')) {
        return 'Connecting to credit bureau for commercial credit report. Fetching director CIBIL scores and payment history.';
    } else if(agentName.includes('ratio') || agentName.includes('financial ratio')) {
        return 'Now computing all financial ratios—Current Ratio, DSCR, Debt-to-Equity, Interest Coverage, and 15+ other metrics. Comparing against policy benchmarks.';
    } else if(agentName.includes('policy') || agentName.includes('compliance')) {
        return 'Checking against Board-approved Credit Policy. All parameters being validated against RBI norms and internal credit guidelines.';
    } else if(agentName.includes('scoring') || agentName.includes('credit scoring')) {
        return 'Computing final credit score based on financial strength, business stability, and security coverage. Generating credit grade and recommended limits.';
    } else {
        return 'Processing ' + agent.name + '... ' + (ps.currentSection || agent.cat);
    }
}

function formatTokens(num) {
    if(!num || num === 0) return '0';
    if(num >= 1000000) return (num/1000000).toFixed(1) + 'M';
    if(num >= 1000) return (num/1000).toFixed(1) + 'K';
    return num.toString();
}

function formatINR(num) {
    if(num === null || num === undefined || isNaN(num) || num === 0) return '0';
    var absNum = Math.abs(Math.round(num));
    var x = absNum.toString();
    var lastThree = x.substring(x.length - 3);
    var otherNumbers = x.substring(0, x.length - 3);
    if(otherNumbers !== '') lastThree = ',' + lastThree;
    var formatted = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + lastThree;
    return (num < 0 ? '-' : '') + formatted;
}
// Format with ₹ symbol, negative sign before ₹ (e.g., -₹1,000)
function formatCurrency(num) {
    if(num === null || num === undefined || isNaN(num) || num === 0) return '₹0';
    var absNum = Math.abs(Math.round(num));
    var x = absNum.toString();
    var lastThree = x.substring(x.length - 3);
    var otherNumbers = x.substring(0, x.length - 3);
    if(otherNumbers !== '') lastThree = ',' + lastThree;
    var formatted = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + lastThree;
    return (num < 0 ? '-₹' : '₹') + formatted;
}

function addApiLog(type, message) {
    if(state.actualProcessingState) {
        var now = new Date();
        var elapsed = Math.floor((now - state.actualProcessingState.startTime) / 1000);
        var mins = Math.floor(elapsed / 60);
        var secs = elapsed % 60;
        var timeStr = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        
        state.actualProcessingState.apiLogs.push({
            type: type,
            message: message,
            time: timeStr,
            timestamp: now.toISOString()
        });
        
        if(state.actualProcessingState.apiLogs.length > 200) {
            state.actualProcessingState.apiLogs = state.actualProcessingState.apiLogs.slice(-200);
        }
        
        render();
        
        if(state.actualProcessingState.activeTab === 'apiLog') {
            setTimeout(function(){
                var log = document.getElementById('apiLogTerminal');
                if(log) log.scrollTop = log.scrollHeight;
            }, 50);
        }
    }
}

function finishActualDataAssessment(data){
    // Clear the timer interval
    if(state.actualProcessingState && state.actualProcessingState.timerInterval) {
        clearInterval(state.actualProcessingState.timerInterval);
    }
    
    state.showProgressModal=false;
    state.showManualInputModal=false;
    state.isActualData=true;
    state.viewMode='actual';
    state.app={name:state.uploadData.companyName};
    state.results={decision:data.results.decision,grade:data.results.grade,score:data.results.score,breakdown:data.results.breakdown};
    
    // Get API logs and stats from response OR processing state
    var apiLogs = data.apiLogs || state.actualProcessingState?.apiLogs || [];
    var apiStats = data.apiStats || state.actualProcessingState?.apiStats || { calls: 0, tokensSent: 0, tokensReceived: 0 };
    var processingTime = data.processingTime || (state.actualProcessingState?.startTime ? Date.now() - state.actualProcessingState.startTime : 0);
    var processedAt = new Date().toISOString();
    var documentTimings = data.documentTimings || state.actualProcessingState?.documentTimings || [];
    var extractionSummary = data.extractionSummary || state.actualProcessingState?.extractionSummary || {};
    
    // Store actual assessment data for toggle - include API logs and all extracted data
    state.actualAssessmentData={
        extractedData: data.extractedData,
        calculatedData: data.calculatedData,
        policyCompliance: data.policyCompliance,
        // Save API logs and stats
        apiLogs: apiLogs,
        apiStats: apiStats,
        processingTime: processingTime,
        processedAt: processedAt,
        // Save document timings
        documentTimings: documentTimings,
        extractionSummary: extractionSummary
    };
    
    // Store in full assessment cache
    fullAssessmentCache[state.assessmentId] = {
        assessment_id: state.assessmentId,
        company_name: state.uploadData.companyName,
        extracted_data: data.extractedData,
        // Include all extracted data separately for the Extracted Data tab
        all_extracted_data: data.extractedData,
        calculations: data.calculatedData?.calculations,
        credit_score: data.calculatedData?.creditScore,
        policy_compliance: data.policyCompliance,
        recommended_limits: data.calculatedData?.recommendedLimits,
        // Save API logs and processing info
        api_logs: apiLogs,
        api_stats: apiStats,
        processing_time: processingTime,
        processed_at: processedAt,
        // Save document timings
        document_timings: documentTimings,
        extraction_summary: extractionSummary
    };
    state.fullAssessment = fullAssessmentCache[state.assessmentId];
    state.processedAt = processedAt;
    
    // Add to case queue with date (will be synced from server on next load)
    var newCase={
        id:state.assessmentId,
        company:state.uploadData.companyName,
        amount:parseFloat(state.uploadData.loanAmount)/100, // Lakhs to Cr
        product:'WC',
        lender:'Mumbai',
        priority:'High',
        status:data.results.decision==='APPROVED'?'Approved':data.results.decision==='REJECTED'?'Rejected':'Partial',
        grade:data.results.grade,
        score:data.results.score,
        tat:0,
        sla:2,
        type:'actual',
        processedAt: processedAt,
        created_at: processedAt,
        actualData:state.actualAssessmentData
    };
    casesList.unshift(newCase);
    state.selectedCase=newCase;
    
    // Mark assessment as complete on server
    try {
        fetch('/api/assessment/' + state.assessmentId + '/complete-processing', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                status: newCase.status,
                score: newCase.score,
                grade: newCase.grade,
                extractedData: data.extractedData,
                calculations: data.calculatedData?.calculations,
                creditScore: data.calculatedData?.creditScore,
                policyCompliance: data.policyCompliance,
                recommendedLimits: data.calculatedData?.recommendedLimits,
                // Include API stats and document info
                apiStats: apiStats,
                documentCount: state.actualProcessingState?.docCount || Object.keys(state.uploadData?.files || {}).filter(function(k){return state.uploadData.files[k]}).length,
                documentTimings: documentTimings,
                extractionSummary: extractionSummary
            })
        }).then(function(resp) {
            console.log('Assessment marked as complete on server');
        }).catch(function(e) {
            console.warn('Could not mark assessment as complete:', e);
        });
    } catch(e) {
        console.warn('Could not mark assessment as complete:', e);
    }
    
    state.resultsTab='decision';
    state.screen='results';
    state.chat=[];
    render();
}

window.skipManualInput=async function(){
    state.showManualInputModal=false;
    state.showProgressModal=true;
    state.uploadProgress.steps=['Completing assessment with defaults...'];
    state.uploadProgress.currentStep=0;
    render();
    try{
        var completeResp=await fetch('/api/assessment/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assessmentId:state.assessmentId})});

        state.uploadProgress.currentStep=1;render();
        await delay(500);
        finishActualDataAssessment(completeData);
    }catch(err){
        state.uploadProgress.error=err.message;render();
    }
};

window.submitManualInput=async function(){
    var manualData={};
    state.missingFields.forEach(function(f,i){
        var input=document.getElementById('manual_'+i);
        if(input&&input.value){
            manualData[f.category+'_'+f.year.toLowerCase()+'_'+f.field]=parseFloat(input.value);
        }
    });
    state.showManualInputModal=false;
    state.showProgressModal=true;
    state.uploadProgress.steps=['Submitting manual data...','Completing assessment...'];
    state.uploadProgress.currentStep=0;
    render();
    try{
        state.uploadProgress.currentStep=1;render();
        var completeResp=await fetch('/api/assessment/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assessmentId:state.assessmentId,manualData:manualData})});
        var completeData=await completeResp.json();
        state.uploadProgress.currentStep=2;render();
        await delay(500);
        finishActualDataAssessment(completeData);
    }catch(err){
        state.uploadProgress.error=err.message;render();
    }
};

function fileToBase64(file){
    return new Promise(function(resolve,reject){
        var reader=new FileReader();
        reader.onload=function(){
            var base64=reader.result.split(',')[1];
            resolve(base64);
        };
        reader.onerror=reject;
        reader.readAsDataURL(file);
    });
}

function camAssessmentId(){
    return (state.selectedCase && state.selectedCase.id) || (state.fullAssessment && (state.fullAssessment.id || state.fullAssessment.assessment_id)) || state.assessmentId || null;
}

function camLacs(v){
    if(v===null||v===undefined||isNaN(v)) return '-';
    var sign=v<0?'-':''; var abs=Math.abs(v);
    if(abs>=100) return sign+'₹'+(abs/100).toFixed(2)+' Cr';
    return sign+'₹'+abs.toFixed(2)+' L';
}
function camPct(v){ if(v===null||v===undefined||isNaN(v)) return '-'; return (v*100).toFixed(2)+'%'; }

// Capture current form DOM values into state.camForm (so values survive re-render)
function captureCamForm(){
    state.camForm = state.camForm || {};
    document.querySelectorAll('[data-cam-field]').forEach(function(el){
        var key=el.getAttribute('data-cam-field');
        if(el.type==='checkbox'){ state.camForm[key]=el.checked; }
        else { state.camForm[key]=el.value; }
    });
}

window.setCamProgram=function(p){
    captureCamForm();
    state.camProgram=p;
    state.camResult=null;
    render();
};

window.runCamEligibility=function(){
    captureCamForm();
    var program = state.camProgram || 'CASH_PROFIT';
    var def = CAM_FIELD_MAP[program];
    var payload = { program: program };
    def.inputs.forEach(function(f){
        var v = state.camForm[f.key];
        if(v!==undefined && v!=='' && v!==null) payload[f.key]=parseFloat(v);
    });
    def.checks.forEach(function(c){
        payload[c.key] = state.camForm[c.key]===true;
    });
    // Pass valuation fields
    CAM_VALUATION_FIELDS.forEach(function(f){
        var v=state.camForm[f.key];
        if(v===undefined||v===''||v===null) return;
        payload[f.key] = (f.type==='number') ? parseFloat(v) : v;
    });

    var btn=document.getElementById('camRunBtn');
    if(btn){ btn.disabled=true; btn.textContent='Calculating...'; }

    var id = camAssessmentId();
    var url = id ? ('/api/assessment/'+id+'/cam') : '/api/cam/evaluate';

    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
        .then(function(r){ return r.json(); })
        .then(function(data){
            if(data && data.success!==false){
                state.camResult = data.cam_eligibility || data.result;
                if(state.fullAssessment){ state.fullAssessment.cam_eligibility = state.camResult; state.fullAssessment.cam_input = payload; }
            } else {
                alert('CAM evaluation failed: ' + (data && data.error ? data.error : 'Unknown error'));
            }
            render();
        })
        .catch(function(err){ alert('CAM evaluation failed: '+err.message); if(btn){btn.disabled=false;btn.textContent='Run CAM Eligibility';} });
};

window.prefillCamDefaults=function(){
    var id=camAssessmentId();
    if(!id){ alert('Save the assessment first to prefill from financials'); return; }
    fetch('/api/assessment/'+id+'/cam/defaults')
        .then(function(r){return r.json();})
        .then(function(data){
            if(data && data.defaults){
                captureCamForm();
                state.camForm = Object.assign({}, state.camForm, data.defaults);
                render();
            }
        }).catch(function(){});
};

function renderCamInputField(f){
    state.camForm = state.camForm || {};
    var val = state.camForm[f.key];
    if(val===undefined && f.value!==undefined) val=f.value;
    if(val===undefined) val='';
    var hint = f.hint ? '<p class="text-xs text-gray-400 mt-1">'+escapeHtml(f.hint)+'</p>' : '';
    return '<div><label class="block text-xs font-medium text-gray-600 mb-1">'+escapeHtml(f.label)+'</label>'+
        '<input data-cam-field="'+f.key+'" type="'+(f.type||'text')+'"'+(f.step?' step="'+f.step+'"':'')+
        ' value="'+escapeHtml(String(val))+'" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-axis-primary focus:border-axis-primary"/>'+hint+'</div>';
}

function renderCamCheck(c){
    state.camForm = state.camForm || {};
    var checked = state.camForm[c.key]===true ? ' checked' : '';
    return '<label class="flex items-start space-x-2 py-1.5 cursor-pointer">'+
        '<input data-cam-field="'+c.key+'" type="checkbox"'+checked+' class="mt-0.5 h-4 w-4 text-axis-primary rounded border-gray-300"/>'+
        '<span class="text-sm text-gray-700">'+escapeHtml(c.label)+'</span></label>';
}

function renderCamResultPanel(cam){
    if(!cam || !cam.summary) return '';
    var s=cam.summary; var o=cam.overall||{};
    var breach=!!o.breaching;
    var banner='<div class="rounded-lg p-4 mb-4 '+(breach?'bg-red-50 border border-red-200':'bg-green-50 border border-green-200')+'">'+
        '<div class="flex items-center justify-between"><div>'+
        '<p class="text-sm text-gray-500">'+escapeHtml(cam.program_label||cam.program)+'</p>'+
        '<p class="text-lg font-bold '+(breach?'text-red-700':'text-green-700')+'">'+(breach?('BREACHING POLICY NORMS ('+(o.breach_count||0)+' flag'+((o.breach_count||0)===1?'':'s')+')'):'WITHIN POLICY NORMS')+'</p>'+
        '<p class="text-sm text-gray-600 mt-1">'+escapeHtml(o.decision_hint||'')+'</p>'+
        '</div></div></div>';

    // Summary cards
    function card(label,val,danger){return '<div class="bg-white rounded-lg border border-gray-200 p-3"><p class="text-xs text-gray-500">'+escapeHtml(label)+'</p><p class="text-base font-semibold '+(danger?'text-red-600':'text-gray-900')+'">'+escapeHtml(val)+'</p></div>';}
    var cards='<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">'+
        card('Income-Eligible Loan', camLacs(s.eligible_loan_amount))+
        card('Proposed Loan', camLacs(s.proposed_loan))+
        card('Proposed EMI', camLacs(s.proposed_emi))+
        card('Max EMI Allowed', camLacs(s.max_emi_allowed))+
        (s.foir_on_proposed?card('FOIR on Proposed', camPct(s.foir_on_proposed)):'')+
        (s.dscr_on_proposed?card('DSCR on Proposed', (s.dscr_on_proposed)+'x'):'')+
        card('LTV on Proposed', camPct(s.ltv_on_proposed), s.ltv_deviation>0)+
        card('LTV Deviation', camPct(s.ltv_deviation), s.ltv_deviation>0)+
        '</div>';

    // Steps table
    var steps='';
    if(cam.steps && cam.steps.length){
        steps='<h4 class="font-medium text-axis-primary mb-2 mt-4">Eligibility Calculation Working</h4>'+
            '<div class="bg-white rounded-lg overflow-hidden border border-gray-200 overflow-x-auto"><table class="data-table"><thead><tr><th>Particulars</th><th>Formula</th><th class="text-right">Value</th></tr></thead><tbody>'+
            cam.steps.map(function(st){return '<tr><td>'+escapeHtml(st.label)+'</td><td class="text-gray-400 text-xs">'+escapeHtml(st.formula||'-')+'</td><td class="text-right font-medium">'+escapeHtml(st.value_display!=null?String(st.value_display):String(st.value))+'</td></tr>';}).join('')+
            '</tbody></table></div>';
    }

    // Policy checks
    var checks='';
    if(cam.policy_checks && cam.policy_checks.length){
        checks='<h4 class="font-medium text-axis-primary mb-2 mt-4">Policy Conditions &amp; Flags</h4>'+
            '<div class="bg-white rounded-lg overflow-hidden border border-gray-200"><table class="data-table"><thead><tr><th>Condition</th><th>Norm</th><th class="text-center">Status</th></tr></thead><tbody>'+
            cam.policy_checks.map(function(c){var ok=c.complied;return '<tr><td>'+escapeHtml(c.label)+'</td><td class="text-gray-500">'+escapeHtml(c.norm||'Required')+'</td><td class="text-center"><span class="px-2 py-0.5 rounded text-xs font-medium '+(ok?'bg-green-100 text-green-700':'bg-red-100 text-red-700')+'">'+(ok?'✓ Pass':'✗ Fail')+'</span></td></tr>';}).join('')+
            '</tbody></table></div>';
    }

    // Flags
    var flags='';
    if(cam.flags && cam.flags.length){
        flags='<div class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg"><p class="text-sm font-semibold text-red-700 mb-2">Deviation Flags</p><ul class="list-disc list-inside space-y-1">'+
            cam.flags.map(function(f){return '<li class="text-sm text-red-700">'+escapeHtml(f)+'</li>';}).join('')+'</ul></div>';
    }

    return banner+cards+steps+checks+flags;
}

        if(stored) state.camResult=stored;

    var program=state.camProgram;

            '<h4 class="font-medium text-axis-primary mb-3">Program Inputs</h4>'+
            '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">'+inputFields+'</div>'+

window.toggleActionMenu = function(caseId) {
