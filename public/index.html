            html += '<td class="px-4 py-3 text-sm text-red-600 line-through">'+formatAuditValue(entry.old_value || entry.oldValue)+'</td>';
            html += '<td class="px-4 py-3 text-sm text-green-600 font-medium">'+formatAuditValue(entry.new_value || entry.newValue)+'</td>';
            html += '<td class="px-4 py-3 text-sm text-gray-600">'+escapeHtml(entry.edited_by || 'Unknown')+'</td>';
            html += '<td class="px-4 py-3 text-sm text-gray-600 max-w-xs truncate" title="'+escapeAttr(entry.reason || '-')+'">'+escapeHtml(entry.reason || '-')+'</td>';
            html += '</tr>';
        });
        
        html += '</tbody></table>';
        html += '</div></div>';
    }
    
    // Reprocess history
    if (reprocessHistory.length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden mt-6">';
        html += '<div class="bg-gray-50 px-4 py-3 border-b border-gray-200">';
        html += '<h4 class="font-medium text-gray-900">Reprocessing History</h4>';
        html += '</div>';
        html += '<div class="divide-y divide-gray-200">';
        
        reprocessHistory.slice().reverse().forEach(function(rp, idx) {
            var rpDate = rp.reprocessed_at ? new Date(rp.reprocessed_at).toLocaleString('en-IN') : '-';
            html += '<div class="p-4">';
            html += '<div class="flex items-center justify-between mb-2">';
            html += '<div class="flex items-center gap-3">';
            html += '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium">Run #'+(reprocessHistory.length - idx)+'</span>';
            html += '<span class="text-sm text-gray-600">'+rpDate+'</span>';
            html += '<span class="text-sm text-gray-500">by '+escapeHtml(rp.reprocessed_by || 'Unknown')+'</span>';
            html += '</div>';
            html += '<div class="flex items-center gap-2">';
            if (rp.original_decision !== rp.new_decision) {
                html += '<span class="text-sm text-red-600 line-through">'+escapeHtml(rp.original_decision || '-')+'</span>';
                html += '<span class="text-gray-400">→</span>';
                html += '<span class="text-sm text-green-600 font-medium">'+escapeHtml(rp.new_decision || '-')+'</span>';
            } else {
                html += '<span class="text-sm text-gray-600">'+escapeHtml(rp.new_decision || '-')+'</span>';
            }
            html += '</div></div>';
            html += '<div class="text-sm text-gray-500">'+( rp.changes_count || 0)+' field(s) modified</div>';
            if (rp.original_score !== undefined && rp.new_score !== undefined) {
                html += '<div class="text-sm text-gray-500">Score: '+rp.original_score+' → '+rp.new_score+'</div>';
            }
            html += '</div>';
        });
        
        html += '</div></div>';
    }
    
    html += '</div>';
    return html;
}

// Format field key to readable name
function formatFieldName(fieldKey) {
    if (!fieldKey) return '-';
    return fieldKey
        .replace(/_/g, ' ')
        .replace(/bs /g, 'Balance Sheet ')
        .replace(/pnl /g, 'P&L ')
        .replace(/cf /g, 'Cash Flow ')
        .replace(/fy/g, 'FY')
        .replace(/\b\w/g, function(l){ return l.toUpperCase(); });
}

window.updateHLExtractedValue = function(category, year, field, newValue) {
    var data = state.fullAssessment?.all_extracted_data || state.actualAssessmentData?.extractedData || {};
    var fieldKey = year ? category.replace('balance_sheet','bs').replace('profit_and_loss','pnl').replace('cash_flow','cf') + '_' + year + '_' + field : 'company_info_' + field;
    
    // Get old value
    var oldValue = '';
    if (year) {
        oldValue = data[category] && data[category][year] ? data[category][year][field] : '';
    } else {
        oldValue = data[category] ? data[category][field] : '';
    }
    
    // Convert to number if applicable
    var parsedValue = newValue;
    if (!isNaN(parseFloat(newValue)) && isFinite(newValue)) {
        parsedValue = parseFloat(newValue);
    }
    
    // If value hasn't changed, do nothing
    if (parsedValue === oldValue) {
        return;
    }
    
    // Store pending edit and show reason modal
    state.pendingEdit = {
        fieldKey: fieldKey,
        category: category,
        year: year,
        field: field,
        oldValue: oldValue,
        newValue: parsedValue
    };
    showEditReasonModal();
};

window.cancelEditReason = function() {
    state.pendingEdit = null;
    document.getElementById('editReasonModal').innerHTML = '';
    render(); // Re-render to reset input field to original value
};

window.confirmEditReason = function() {
    var reason = document.getElementById('editReasonInput')?.value?.trim();
    if (!reason) {
        alert('Please provide a reason for this change');
        return;
    }
    
    var edit = state.pendingEdit;
    if (!edit) return;
    
    // Close modal immediately
    document.getElementById('editReasonModal').innerHTML = '';
    
    // Show saving indicator
    state.humanLoopSaving = true;
    render();
    
    // Save to server first, then update local state
    var assessmentId = state.fullAssessment?.id || state.fullAssessment?.assessment_id || state.assessmentId;
    if (!assessmentId) {
        alert('Error: Could not determine assessment ID');
        state.humanLoopSaving = false;
        state.pendingEdit = null;
        render();
        return;
    }
    
    fetch('/api/assessment/'+assessmentId+'/save-edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            field_key: edit.fieldKey,
            category: edit.category,
            year: edit.year,
            field: edit.field,
            old_value: edit.oldValue,
            new_value: edit.newValue,
            reason: reason,
            edited_by: state.currentUser?.email || 'unknown'
        })
    })
    .then(function(response) {
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        return response.json();
    })
    .then(function(result) {
        if (result.success) {
            console.log('Edit saved successfully');
            
            // Clear cache for this assessment so next load gets fresh data
            var assessmentId = state.fullAssessment?.id || state.fullAssessment?.assessment_id || state.assessmentId;
            if (assessmentId) {
                clearAssessmentCache(assessmentId);
            }
            
            // Update local state with server response (authoritative source)
            if (result.assessment) {
                state.fullAssessment = result.assessment;
                // Also update the cache with fresh data
                if (assessmentId) {
                    fullAssessmentCache[assessmentId] = result.assessment;
                }
            }
            
            // Add to local audit trail for pending changes display
            var existingIdx = state.auditTrail.findIndex(function(e) { return e.fieldKey === edit.fieldKey; });
            if (existingIdx >= 0) {
                state.auditTrail[existingIdx].newValue = edit.newValue;
                state.auditTrail[existingIdx].reason = reason;
            } else {
                state.auditTrail.push({
                    fieldKey: edit.fieldKey,
                    category: edit.category,
                    year: edit.year,
                    field: edit.field,
                    oldValue: edit.oldValue,
                    newValue: edit.newValue,
                    originalValue: edit.oldValue,
                    reason: reason,
                    editedAt: new Date().toISOString(),
                    editedBy: state.currentUser?.email || 'unknown'
                });
            }
        } else {
            alert('Failed to save edit: ' + (result.error || 'Unknown error'));
        }
    })
    .catch(function(err) {
        console.error('Error saving edit:', err);
        alert('Error saving edit: ' + err.message);
    })
    .finally(function() {
        state.humanLoopSaving = false;
        state.pendingEdit = null;
        render();
    });
};

window.clearHumanLoopChanges = function() {
    // Show different message based on whether edits were already saved
    var savedEditsExist = (state.fullAssessment?.edit_audit_trail?.length || 0) > 0;
    var pendingInSession = state.auditTrail.length;
    
    var message = 'Are you sure you want to exit edit mode?';
    if (savedEditsExist) {
        message = 'Note: Previously saved edits are permanently stored in the audit trail and cannot be undone.\n\nDo you want to reload the assessment and exit edit mode?';
    }
    
    if (!confirm(message)) return;
    
    // Clear pending session edits
    state.auditTrail = [];
    state.humanLoopEditMode = false;
    
    // Clear cache and reload assessment from S3 to get current persisted state
    var assessmentId = state.fullAssessment?.id || state.fullAssessment?.assessment_id || state.assessmentId;
    if (assessmentId) {
        clearAssessmentCache(assessmentId);
        fetch('/api/assessment/' + assessmentId + '?refresh=true')
            .then(function(response) {
                if (response.ok) return response.json();
                throw new Error('Failed to reload');
            })
            .then(function(assessment) {
                state.fullAssessment = assessment;
                fullAssessmentCache[assessmentId] = assessment;
                render();
            })
            .catch(function(err) {
                console.error('Error reloading assessment:', err);
                render();
            });
    } else {
        render();
    }
};

window.resubmitHumanLoop = function() {
    if (state.auditTrail.length === 0) {
        alert('No changes to submit');
        return;
    }
    
    if (!confirm('Resubmit assessment with '+state.auditTrail.length+' change(s)? This will recalculate all metrics and the final decision.')) {
        return;
    }
    
    state.humanLoopReprocessing = true;
    render();
    
    // Get assessment ID - check multiple possible field names
    var assessmentId = state.fullAssessment?.id || state.fullAssessment?.assessment_id || state.assessmentId;
    
    // Get extracted data - check multiple possible sources
    var editedData = state.fullAssessment?.all_extracted_data || state.fullAssessment?.extracted_data || state.actualAssessmentData?.extractedData || state.extractedData || {};
    
    console.log('Resubmitting assessment:', assessmentId);
    console.log('Extracted data keys:', Object.keys(editedData));
    // DEBUG: Log P&L values being sent
    var debugPnl = editedData?.profit_and_loss || {};
    Object.keys(debugPnl).forEach(function(y) { 
        if (!y.startsWith('_')) console.log('RESUBMIT P&L ' + y + ': revenue=' + debugPnl[y]?.revenue + ', pat=' + debugPnl[y]?.profit_after_tax + ', employee_expenses=' + debugPnl[y]?.employee_expenses);
    });
    var debugBs = editedData?.balance_sheet || {};
    Object.keys(debugBs).forEach(function(y) {
        if (!y.startsWith('_')) console.log('RESUBMIT BS ' + y + ': net_worth=' + debugBs[y]?.net_worth);
    });
    
    if (!assessmentId) {
        alert('Error: Could not determine assessment ID');
        state.humanLoopReprocessing = false;
        render();
        return;
    }
    
    if (!editedData || Object.keys(editedData).length === 0) {
        alert('Error: No extracted data available to reprocess');
        state.humanLoopReprocessing = false;
        render();
        return;
    }
    
    fetch('/api/assessment/'+assessmentId+'/reprocess', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            extracted_data: editedData,
            audit_trail: state.auditTrail,
            edited_by: state.currentUser?.email || 'unknown'
        })
    })
    .then(function(response) {
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        return response.json();
    })
    .then(function(result) {
        if (result.success) {
            alert('Assessment reprocessed successfully!');
            state.auditTrail = [];
            state.humanLoopEditMode = false;
            
            // Refresh the assessment
            if (result.assessment) {
                state.fullAssessment = result.assessment;
                
                // Also update state.results so Decision tab shows updated data
                var cs = result.assessment.calculations?.credit_score;
                if (cs) {
                    if (!state.results) state.results = {};
                    state.results.decision = cs.decision || result.assessment.decision || state.results.decision;
                    state.results.grade = cs.grade || state.results.grade;
                    state.results.score = cs.total || state.results.score;
                    state.results.breakdown = cs.components || state.results.breakdown;
                }
                
                // Clear cache to ensure fresh data on next load
                var assessmentId = result.assessment.id || result.assessment.assessment_id;
                if (assessmentId) {
                    clearAssessmentCache(assessmentId);
                    fullAssessmentCache[assessmentId] = result.assessment;
                }
            }
            state.humanLoopReprocessing = false;
            render();
        } else {
            throw new Error(result.error || 'Unknown error');
        }
    })
    .catch(function(err) {
        console.error('Reprocess error:', err);
        alert('Reprocess failed: '+err.message);
        state.humanLoopReprocessing = false;
        render();
    });
};

            html += log.message || '';
            html += '</div>';
        });
    }
    
    html += '</div></div>';
    
    html += '</div>';
    return html;
}

window.showAuditTrail = async function(assessmentId) {
    var modal = document.getElementById('auditTrailModal');
    var trail = state.auditTrail || [];
    
    // If assessmentId provided, try to load audit trail from server
    if (assessmentId) {
        try {
            var resp = await fetch('/api/assessment/' + assessmentId);
            if (resp.ok) {
                var assessment = await resp.json();
                trail = assessment.audit_trail || [];
            }
        } catch (err) {
            console.error('Error loading audit trail:', err);
        }
    }
    
    var html = '<div class="audit-modal">';
    html += '<div class="audit-content">';
    html += '<div class="audit-header"><span class="font-bold">Audit Trail' + (assessmentId ? ' - ' + assessmentId : '') + ' ('+trail.length+' Changes)</span>';
    html += '<button onclick="closeAuditTrail()" class="text-gray-400 hover:text-axis-primary"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>';
    html += '<div class="audit-body">';
    
    if(trail.length === 0) {
        html += '<div class="text-center py-12 text-gray-500">No changes recorded yet</div>';
    } else {
        // Sort by timestamp descending (newest first)
        var sortedTrail = trail.slice().sort(function(a,b){ return new Date(b.timestamp) - new Date(a.timestamp); });
        
        sortedTrail.forEach(function(entry, idx) {
            html += '<div class="audit-item">';
            html += '<div class="audit-item-header">';
            html += '<span class="audit-item-field">'+(entry.fieldLabel || entry.field || 'Status Change')+'</span>';
            html += '<span class="audit-item-time">'+formatDate(entry.timestamp)+'</span>';
            html += '</div>';
            html += '<div class="audit-item-values">';
            html += '<div class="audit-item-old">'+(entry.displayOld || entry.old_value || '-')+'</div>';
            html += '<div class="audit-item-arrow">→</div>';
            html += '<div class="audit-item-new">'+(entry.displayNew || entry.new_value || '-')+'</div>';
            html += '</div>';
            if(entry.reason || entry.changed_by) {
                html += '<div class="audit-item-reason">"'+(entry.reason || 'Changed by ' + entry.changed_by)+'"</div>';
            }
            html += '</div>';
        });
    }
    
    html += '</div>';
    html += '<div class="p-4 border-t flex justify-between">';
    html += '<button onclick="downloadAuditTrail()" class="download-btn"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Download Audit Log</button>';
    html += '<button onclick="closeAuditTrail()" class="px-4 py-2 btn-secondary rounded-lg text-sm">Close</button>';
    html += '</div></div></div>';
    
    modal.innerHTML = html;
};

// Close audit trail modal

// Download audit trail as JSON
window.downloadAuditTrail = function() {
    var data = {
        assessment_id: state.assessmentId || state.fullAssessment?.assessment_id,
        company_name: state.uploadData?.companyName || state.fullAssessment?.company_name,
        exported_at: new Date().toISOString(),
        total_changes: state.auditTrail.length,
        changes: state.auditTrail
    };
    
    var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'audit_trail_' + (data.assessment_id || 'unknown') + '_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
};

// Show audit for specific field
window.showFieldAudit = function(fieldKey) {
    var entries = state.auditTrail.filter(function(e){ return e.fieldKey === fieldKey; });
    if(entries.length > 0) {
        alert('Field History:\n\n' + entries.map(function(e){
            return formatDate(e.timestamp) + '\n' + e.displayOld + ' → ' + e.displayNew + '\nReason: ' + e.reason;
        }).join('\n\n'));
    }
};

// Reprocess with changes
window.reprocessWithChanges = async function() {
    if(state.auditTrail.length === 0) {
        alert('No changes to reprocess');
        return;
    }
    
    if(!confirm('This will recalculate all ratios and credit scores based on the modified data. Continue?')) {
        return;
    }
    
    var assessmentId = state.assessmentId || state.fullAssessment?.assessment_id;
    if(!assessmentId) {
        alert('No assessment ID found');
        return;
    }
    
    try {
        // Get modified data
        var data = state.fullAssessment?.all_extracted_data || state.actualAssessmentData?.extractedData;
        
        // Call reprocess API
        var resp = await fetch('/api/assessment/' + assessmentId + '/reprocess', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                modified_data: data,
                audit_trail: state.auditTrail
            })
        });
        
        if(!resp.ok) throw new Error('Reprocess failed: ' + resp.status);
        
        var result = await resp.json();
        
        // Update state with new results
        if(result.success) {
            state.fullAssessment = result.assessment;
            state.extractedDataEditMode = false;
            alert('Reprocessing complete! Ratios and scores have been recalculated.');
            render();
        } else {
            throw new Error(result.error || 'Unknown error');
        }
    } catch(err) {
        console.error('Reprocess error:', err);
        alert('Error reprocessing: ' + err.message);
    }
};

// Direct DOM toggle - no re-render, no scroll jump
window.toggleDocSectionDirect=function(sectionId, event){
    event.preventDefault();
    event.stopPropagation();
    
    var header = event.currentTarget;
    var body = document.getElementById('body_' + sectionId);
    
    if(!body) return;
    
    var isCurrentlyHidden = body.style.display === 'none';
    
    if(isCurrentlyHidden) {
        body.style.display = 'block';
        header.classList.remove('collapsed');
    } else {
        body.style.display = 'none';
        header.classList.add('collapsed');
    }
    
    // Update state for persistence
    state.uploadData.collapsedSections = state.uploadData.collapsedSections || {};
    state.uploadData.collapsedSections[sectionId] = !isCurrentlyHidden;
};

window.submitAllAndProcess=async function(){
    // Applicant details now come from Pennant LOS (fetched via the Loan
    // Account Number), not manual entry. Require a successful fetch first.
    if(!state.uploadData.pennantFetched){
        alert('Please enter the Loan Account Number (LOS) and click Submit to fetch applicant details from Pennant before proceeding.');
        return;
    }
    var companyName = state.uploadData.companyName;
    var loanAmount = state.uploadData.loanAmount;
    var industryType = state.uploadData.industryType;
    if(!companyName){alert('Pennant did not return a company name for this LAN. Please verify the Loan Account Number and re-fetch.');return;}

    var files = state.uploadData.files;
    var fileCount = Object.keys(files).filter(function(k){return files[k]}).length;
    if(fileCount === 0){
        alert('Please upload at least one document');return;
    }
    
    state.showUploadModal = false;
    state.screen = 'actualProcessing';
    // CRITICAL: Reset progress state for fresh assessment
    state.currentProgress = 0;
    state.currentCommentary = '';
    state.elapsed = 0;
    state.metrics = {d:0,a:0,v:0,p:0};
    state.actualProcessingState = {
        agents: buildActualAgents(files),
        currentAgent: 0,
        currentTask: 0,
        startTime: Date.now(),
        phase: 'uploading',
        error: null,
        extractedData: state.uploadData.extractedCategoryData || {},
        industryType: industryType, // Store industry type in processing state
        // API Log tab state
        activeTab: 'visual',
        apiLogs: [],
        rateLimits: { requests: { remaining: '?', limit: '?' }, tokens: { remaining: '?', limit: '?' }, usagePercent: 0 },
        apiStats: { calls: 0, tokensSent: 0, tokensReceived: 0 },
        docCount: fileCount,
        docProgress: 0
    };
    render();
    
    // Mark assessment as Processing on server for dashboard visibility
    try {
        await fetch('/api/assessment/' + state.assessmentId + '/start-processing', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                companyName: companyName,
                documentCount: fileCount,
                loanAccountNumber: state.uploadData.loanAccountNumber || null
            })
        });
        console.log('Assessment marked as Processing on server');
        
        // Send initial progress update
        sendProgressUpdate(state.assessmentId, {
            progress: 0,
            commentary: 'Starting document extraction...',
            metrics: {
                documents: fileCount,
                apiCalls: 0,
                dataPoints: 0
            }
        });
    } catch(e) {
        console.warn('Could not mark assessment as Processing:', e);
    }
    
    await runActualDataProcessing();
};

// Best-effort mapping from Pennant's free-text industry description
// (e.g. "Growing of Cereals") to the internal industry buckets the
// scoring/masters logic expects. Falls back to 'other' — downstream
// code (detectCompanyTypeFromData, calculation-engine) also re-derives
// industry from extracted financial documents, so this is a hint, not
// the sole source of truth.
function mapPennantIndustryToInternal(desc){
    if(!desc) return 'other';
    var d = desc.toLowerCase();
    if(d.indexOf('software')>-1 || d.indexOf('it service')>-1 || d.indexOf('information technology')>-1) return 'service_it';
    if(d.indexOf('consult')>-1) return 'service_consulting';
    if(d.indexOf('manufactur')>-1 || d.indexOf('production')>-1 || d.indexOf('cereal')>-1 || d.indexOf('mill')>-1) return 'manufacturing';
    if(d.indexOf('trad')>-1 || d.indexOf('wholesale')>-1 || d.indexOf('retail')>-1) return 'trading';
    if(d.indexOf('construction')>-1 || d.indexOf('infrastructure')>-1) return 'infrastructure';
    if(d.indexOf('nbfc')>-1 || d.indexOf('financ')>-1) return 'nbfc';
    if(d.indexOf('health')>-1 || d.indexOf('hospital')>-1 || d.indexOf('medic')>-1) return 'healthcare';
    if(d.indexOf('educat')>-1 || d.indexOf('school')>-1) return 'education';
    if(d.indexOf('hospitality')>-1 || d.indexOf('hotel')>-1 || d.indexOf('restaurant')>-1) return 'hospitality';
    if(d.indexOf('real estate')>-1 || d.indexOf('realty')>-1) return 'real_estate';
    if(d.indexOf('agri')>-1 || d.indexOf('farm')>-1 || d.indexOf('crop')>-1 || d.indexOf('grow')>-1) return 'agriculture';
    if(d.indexOf('service')>-1) return 'service_other';
    return 'other';
}

// Fetch applicant/loan details from Pennant LOS by Loan Account Number
// (finReference), replacing the old manual Company Name / Industry Type /
// Loan Amount entry fields in the upload modal.
window.fetchPennantDetails=async function(){
    var lan = document.getElementById('uploadLAN')?.value?.trim();
    if(!lan){
        state.uploadData.pennantError = 'Please enter a Loan Account Number (LOS).';
        render();
        return;
    }
    state.uploadData.loanAccountNumber = lan;
    state.uploadData.pennantLoading = true;
    state.uploadData.pennantError = null;
    render();

    try {
        var resp = await fetch('/api/external/pennant', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ finReference: lan, assessmentId: state.assessmentId || null })
        });
        var data = await resp.json();
        var result = data.result || {};

        if(!resp.ok || !data.success || !result.success){
            state.uploadData.pennantFetched = false;
            state.uploadData.pennantError = result.error || data.error || 'Could not find this Loan Account Number in Pennant. Please verify and try again.';
            state.uploadData.pennantLoading = false;
            render();
            return;
        }

        var cust = result.customer || {};
        var loan = result.loanDetail || {};
        // financeAmount from Pennant is in rupees; internal fields elsewhere use ₹ Lakhs
        var loanAmountLakhs = loan.financeAmount ? (parseFloat(loan.financeAmount) / 100000) : '';

        state.uploadData.pennantFetched = true;
        state.uploadData.pennantLoading = false;
        state.uploadData.pennantError = null;
        state.uploadData.pennantData = result;
        state.uploadData.companyName = cust.name || '';
        state.uploadData.industryType = mapPennantIndustryToInternal(cust.industry);
        state.uploadData.loanAmount = loanAmountLakhs ? loanAmountLakhs.toFixed(2) : '';
        state.uploadData.finReference = lan;

        render();
    } catch(err) {
        console.error('Pennant fetch failed:', err);
        state.uploadData.pennantFetched = false;
        state.uploadData.pennantLoading = false;
        state.uploadData.pennantError = 'Network error while contacting Pennant. Please try again.';
        render();
    }
};

// Normalize filename for matching
function normalizeFileName(fileName) {
    return fileName
        .toLowerCase()
        .replace(/\.[^.]+$/, '') // Remove extension
        .replace(/[\s-]+/g, '_') // Replace spaces and hyphens with underscores
        .replace(/[^a-z0-9_]/g, ''); // Remove special characters
}

// Map files to documents
function mapFilesToDocuments(files) {
    var matched = [];
    var unmatched = [];
    var usedKeys = new Set();
    
    // Build flat list of all document patterns
    var allDocs = [];
    BULK_UPLOAD_SCHEMA.categories.forEach(function(cat) {
        cat.documents.forEach(function(doc) {
            allDocs.push({
                key: doc.key,
                name: doc.name,
                required: doc.required,
                patterns: doc.patterns,
                category: cat.name
            });
        });
    });
    
    // Try to match each file
    Array.from(files).forEach(function(file) {
        var normalizedName = normalizeFileName(file.name);
        var matchedDoc = null;
        
        // Find best match
        for (var i = 0; i < allDocs.length; i++) {
            var doc = allDocs[i];
            if (usedKeys.has(doc.key)) continue; // Already used
            
            for (var j = 0; j < doc.patterns.length; j++) {
                if (normalizedName.includes(doc.patterns[j]) || doc.patterns[j].includes(normalizedName)) {
                    matchedDoc = doc;
                    break;
                }
            }
            if (matchedDoc) break;
        }
        
        if (matchedDoc) {
            usedKeys.add(matchedDoc.key);
            matched.push({
                file: file,
                fileName: file.name,
                documentKey: matchedDoc.key,
                documentName: matchedDoc.name,
                category: matchedDoc.category,
                required: matchedDoc.required
            });
        } else {
            unmatched.push({
                file: file,
                fileName: file.name,
                documentKey: null,
                documentName: null,
                manualAssignment: null
            });
        }
    });
    
    // Get list of missing required documents - ALL OPTIONAL now
    var missingRequired = []; // Empty - all documents are optional
    
    return {
        matched: matched,
        unmatched: unmatched,
        missingRequired: missingRequired,
        totalUploaded: files.length,
        totalMatched: matched.length,
        totalUnmatched: unmatched.length
    };
}

// Handle bulk file selection
window.handleBulkFileSelect = function(event) {
    var files = event.target.files;

    state.bulkUploadFiles = files;
    state.bulkMappingResults = mapFilesToDocuments(files);

};

// Handle drag and drop
window.handleBulkDrop = function(event) {
    event.preventDefault();
    event.stopPropagation();
    
    var dropZone = document.getElementById('bulkDropZone');
    if (dropZone) dropZone.classList.remove('border-axis-primary', 'bg-axis-bg');
    
    var files = event.dataTransfer.files;
    if (files.length === 0) return;
    
    state.bulkUploadFiles = files;
    state.bulkMappingResults = mapFilesToDocuments(files);
    renderUploadModal();
};

window.handleBulkDragOver = function(event) {
    event.preventDefault();

window.handleBulkDragLeave = function(event) {

    if (dropZone) {
        dropZone.classList.remove('border-axis-primary', 'bg-axis-bg');
    }
};

// Assign unmatched file manually
window.assignUnmatchedFile = function(idx, docKey) {
    if (!state.bulkMappingResults || !state.bulkMappingResults.unmatched[idx]) return;
    
    var unmatched = state.bulkMappingResults.unmatched[idx];
    
    if (docKey) {
        // Find document info
        var docInfo = null;
        BULK_UPLOAD_SCHEMA.categories.forEach(function(cat) {
            cat.documents.forEach(function(doc) {
                if (doc.key === docKey) {
                    docInfo = { key: doc.key, name: doc.name, category: cat.name, required: doc.required };
                }
            });
        });
        
        if (docInfo) {
            // Move from unmatched to matched
            state.bulkMappingResults.matched.push({
                file: unmatched.file,
                fileName: unmatched.fileName,
                documentKey: docInfo.key,
                documentName: docInfo.name,
                category: docInfo.category,
                required: docInfo.required,
                manuallyAssigned: true
            });
            
            // Remove from unmatched
            state.bulkMappingResults.unmatched.splice(idx, 1);
            state.bulkMappingResults.totalMatched = state.bulkMappingResults.matched.length;
            state.bulkMappingResults.totalUnmatched = state.bulkMappingResults.unmatched.length;
            
            renderUploadModal();
        }
    }
};

// Skip unmatched file
window.skipUnmatchedFile = function(idx) {
    if (!state.bulkMappingResults || !state.bulkMappingResults.unmatched[idx]) return;
    state.bulkMappingResults.unmatched.splice(idx, 1);
    state.bulkMappingResults.totalUnmatched = state.bulkMappingResults.unmatched.length;
    renderUploadModal();
};

// Reset bulk upload
window.resetBulkUpload = function() {
    state.bulkUploadFiles = [];
    state.bulkMappingResults = null;
    renderUploadModal();
};

// Submit bulk upload and process
window.submitBulkUploadAndProcess = async function() {
    console.log('=== submitBulkUploadAndProcess called ===');
    
    if(!state.uploadData.pennantFetched){
        alert('Please enter the Loan Account Number (LOS) and click Submit to fetch applicant details from Pennant before proceeding.');
        return;
    }
    var companyName = state.uploadData.companyName;
    var loanAmount = state.uploadData.loanAmount;
    var industryType = state.uploadData.industryType;
    if (!companyName) { alert('Pennant did not return a company name for this LAN. Please verify the Loan Account Number and re-fetch.'); return; }
    
    if (!state.bulkMappingResults) {
        alert('No mapping results found. Please upload files first.');
        return;
    }
    
    var matchedFiles = state.bulkMappingResults.matched || [];
    if (matchedFiles.length === 0) {
        alert('No files mapped. Please upload files with correct names.');
        return;
    }
    
    state.uploadData.companyName = companyName;
    state.uploadData.loanAmount = loanAmount;
    state.uploadData.industryType = industryType;
    
    // Convert matched files to uploadData.files format
    state.uploadData.files = {};
    state.uploadData._duplicateMap = {};
    matchedFiles.forEach(function(m) {
        state.uploadData.files[m.documentKey] = m.file;
    });
    
    // Detect duplicates in bulk upload
    detectDuplicateFiles();
    
    var fileCount = Object.keys(state.uploadData.files).length;
    console.log('Bulk upload: ' + fileCount + ' files mapped');
    
    if (fileCount === 0) {
        alert('No files could be processed. Please try again.');
        return;
    }
    
    // Close modal and initialize processing state (CRITICAL!)
    state.showUploadModal = false;
    state.uploadMode = 'single'; // Reset for next time
    state.bulkUploadFiles = [];
    state.bulkMappingResults = null;
    state.screen = 'actualProcessing';
    // CRITICAL: Reset progress state for fresh assessment
    state.currentProgress = 0;
    state.currentCommentary = '';
    state.elapsed = 0;
    state.metrics = {d:0,a:0,v:0,p:0};
    
    // Initialize actualProcessingState (same as submitAllAndProcess)
    state.actualProcessingState = {
        agents: buildActualAgents(state.uploadData.files),
        currentAgent: 0,
        currentTask: 0,
        startTime: Date.now(),
        phase: 'uploading',
        error: null,
        extractedData: state.uploadData.extractedCategoryData || {},
        industryType: industryType, // Store industry type in processing state
        activeTab: 'visual',
        apiLogs: [],
        rateLimits: { requests: { remaining: '?', limit: '?' }, tokens: { remaining: '?', limit: '?' }, usagePercent: 0 },
        apiStats: { calls: 0, tokensSent: 0, tokensReceived: 0 },
        docCount: fileCount,
        docProgress: 0
    };
    render();
    
    // Rest is same as single upload...
    await runActualDataProcessing();
};

window.approveAndProceed=async function(){
    state.showReviewModal=false;
    
    // If coming from actualProcessing screen, continue with animation
    if(state.screen === 'actualProcessing' && state.reviewCallback) {
        render();
        await state.reviewCallback();
        return;
    }
    
    // Original flow for non-animated processing
    state.showProgressModal=true;
    state.uploadProgress={steps:['Saving approved data to S3...','Calculating financial ratios...','Generating assessment...'],currentStep:0,error:null};
    render();
    try{
        // Save to S3
        state.uploadProgress.currentStep=1;render();
        var saveData={
            assessment_id:state.assessmentId,
            company_name:state.uploadData.companyName,
            loan_amount_lakhs:state.uploadData.loanAmount,
            extracted_at:new Date().toISOString(),
            approved_at:new Date().toISOString(),
            balance_sheet:state.reviewData.balance_sheet,
            profit_and_loss:state.reviewData.profit_and_loss,
            notes:state.reviewData.notes,
            field_status:state.reviewData.status
        };
        var saveResp=await fetch('/api/extracted-data/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(saveData)});
        var saveResult=await saveResp.json();
        if(!saveResult.success)throw new Error(saveResult.error||'Failed to save data');
        state.savedFileName=saveResult.fileName;
        
        // Get API logs from processing state
        var apiLogs = state.actualProcessingState?.apiLogs || [];
        var apiStats = state.actualProcessingState?.apiStats || {};
        var processingTime = state.actualProcessingState?.startTime ? Date.now() - state.actualProcessingState.startTime : 0;
        
        // Complete assessment with reviewed data and API logs
        state.uploadProgress.currentStep=2;render();
        var completeResp=await fetch('/api/assessment/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            assessmentId:state.assessmentId,
            reviewedData:{
                balance_sheet:state.reviewData.balance_sheet,
                profit_and_loss:state.reviewData.profit_and_loss
            },
            apiLogs: apiLogs,
            apiStats: apiStats,
            processingTime: processingTime
        })});
        var completeData=await completeResp.json();
        if(!completeData.success)throw new Error(completeData.error||'Failed to complete assessment');
        
        state.uploadProgress.currentStep=3;render();
        await delay(500);
        
        finishActualDataAssessment(completeData);
    }catch(err){
        state.uploadProgress.error=err.message||'An error occurred';
        render();
    }
};

// Client-side duplicate detection using file name + size + lastModified as fingerprint
// (Full content hashing is async and expensive, so we use metadata fingerprint)
function detectDuplicateFiles() {
    var files = state.uploadData.files || {};
    var fileKeys = Object.keys(files).filter(function(k){ return files[k]; });
    
    // Build fingerprint map: fingerprint -> first key that has it
    var fingerprints = {};
    // Reset all duplicate markers first
    if (!state.uploadData._duplicateMap) state.uploadData._duplicateMap = {};
    state.uploadData._duplicateMap = {};
    
    fileKeys.forEach(function(key) {
        var f = files[key];
        if (!f) return;
        // Fingerprint = name + size + lastModified
        var fp = f.name + '|' + f.size + '|' + (f.lastModified || 0);
        if (fingerprints[fp]) {
            // This is a duplicate of fingerprints[fp]
            state.uploadData._duplicateMap[key] = fingerprints[fp];
            // Also mark the original if not already marked
            if (!state.uploadData._duplicateMap[fingerprints[fp]]) {
                // Original is not a dup itself, but it has duplicates - mark the dup ones only
            }
        } else {
            fingerprints[fp] = key;
        }
    });
}

// Get list of duplicate file keys for display
function getDuplicateInfo(key) {
    var dupMap = state.uploadData._duplicateMap || {};
    if (dupMap[key]) {
        // Find the label of the original
        var origKey = dupMap[key];
        return origKey;
    }
    return null;
}

// Get label for a document key
function getDocLabelByKey(key) {

    docCategories.forEach(function(cat){ cat.docs.forEach(function(d){ allDocs.push(d); }); });
    var found = allDocs.find(function(d){ return d.key === key; });
    return found ? found.label : key;
}
