// === AI RECOMMENDATIONS GENERATOR ===
function renderRecommendations(fa, calc, ed, limits, score) {
    var html = '';
    var recommendations = generateRecommendations(fa, calc, ed, limits, score);
    
    // recommendations is an object with: summary, options, strengths, concerns
    if (!recommendations) {
        return '';
    }
    
    // Check if there's any content to show
    var hasContent = recommendations.summary || 
                     (recommendations.options && recommendations.options.length > 0) ||
                     (recommendations.strengths && recommendations.strengths.length > 0) ||
                     (recommendations.concerns && recommendations.concerns.length > 0);
    
    if (!hasContent) {
        return '';
    }
    
    // Determine overall status for styling
    var hasIssues = (recommendations.concerns && recommendations.concerns.length > 0) || 
                    (recommendations.options && recommendations.options.length > 0);
    var headerBg = hasIssues ? 'bg-amber-50 border-amber-200' : 'bg-green-50 border-green-200';
    var iconColor = hasIssues ? 'text-amber-500' : 'text-green-500';
    
    html += '<div class="card mb-8 border '+headerBg+'">';
    html += '<div class="uw-header flex items-center"><svg class="w-5 h-5 mr-2 '+iconColor+'" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>';
    html += '<span>💡 AI Recommendations</span></div>';
    html += '<div class="uw-body">';
    
    // Summary insight
    if (recommendations.summary) {
        html += '<div class="mb-4 p-4 bg-white rounded-lg border border-gray-200">';
        html += '<p class="text-gray-700">' + recommendations.summary + '</p>';
        html += '</div>';
    }
    
    // Options to improve
    if (recommendations.options && recommendations.options.length > 0) {
        html += '<div class="mb-4"><h4 class="font-medium text-gray-900 mb-3">Options to Improve Coverage / Approval Chances:</h4>';
        html += '<div class="space-y-2">';
        recommendations.options.forEach(function(opt, idx) {
            var optClass = opt.priority === 'high' ? 'border-l-4 border-green-500 bg-green-50' : 
                          opt.priority === 'medium' ? 'border-l-4 border-yellow-500 bg-yellow-50' : 
                          'border-l-4 border-gray-300 bg-gray-50';
            html += '<div class="p-3 rounded-r-lg ' + optClass + '">';
            html += '<div class="flex items-start">';
            html += '<span class="flex-shrink-0 w-6 h-6 rounded-full bg-white border flex items-center justify-center text-sm font-medium mr-3">' + (idx + 1) + '</span>';
            html += '<div><div class="font-medium text-gray-900">' + opt.title + '</div>';
            if (opt.detail) {
                html += '<div class="text-sm text-gray-600 mt-1">' + opt.detail + '</div>';
            }
            html += '</div></div></div>';
        });
        html += '</div></div>';
    }
    
    // Strengths
    if (recommendations.strengths && recommendations.strengths.length > 0) {
        html += '<div class="mb-4"><h4 class="font-medium text-green-700 mb-2">✓ Key Strengths</h4>';
        html += '<ul class="space-y-1">';
        recommendations.strengths.forEach(function(s) {
            html += '<li class="flex items-start text-sm text-gray-600"><svg class="w-4 h-4 text-green-500 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' + s + '</li>';
        });
        html += '</ul></div>';
    }
    
    // Concerns
    if (recommendations.concerns && recommendations.concerns.length > 0) {
        html += '<div><h4 class="font-medium text-amber-700 mb-2">⚠ Areas of Concern</h4>';
        html += '<ul class="space-y-1">';
        recommendations.concerns.forEach(function(c) {
            html += '<li class="flex items-start text-sm text-gray-600"><svg class="w-4 h-4 text-amber-500 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>' + c + '</li>';
        });
        html += '</ul></div>';
    }
    
    html += '</div></div>';
    return html;
}

function generateRecommendations(fa, calc, ed, limits, score) {
    var result = {
        summary: '',
        options: [],
        strengths: [],
        concerns: []
    };
    
    // Get key financial data
    var bs = ed?.balance_sheet?.fy25 || ed?.balance_sheet?.fy24 || {};
    var pnl = ed?.profit_and_loss?.fy25 || ed?.profit_and_loss?.fy24 || {};
    
    // Get actual requested loan amount
    // PRIORITY: loan_amount_lakhs (stored in lakhs) -> convert to rupees
    var requestedAmount = 0;
    
    // Try loan_amount_lakhs first (this is how it's stored in assessments)
    var loanAmountLakhs = fa?.loan_amount_lakhs || 
                          state.fullAssessment?.loan_amount_lakhs || 
                          fa?.loanAmount || 
                          state.uploadData?.loanAmount || 0;
    
    if (loanAmountLakhs > 0) {
        requestedAmount = loanAmountLakhs * 100000; // Convert lakhs to rupees
    }
    
    // If still 0, try direct rupees value
    if (requestedAmount === 0) {
        requestedAmount = fa?.loan_amount || state.loanAmount || state.app?.loan_amount || 0;
    }
    
    console.log('[AI Recommendations] Loan Amount Lakhs:', loanAmountLakhs, 'Requested Amount (Rs):', requestedAmount);
    
    // Calculate security values
    var stock = bs.inventory || bs.inventories || 0;
    var debtors = bs.trade_receivables || bs.sundry_debtors || 0;
    var stockEligible = stock * 0.75; // 25% margin
    var debtorEligible = debtors * 0.60; // 40% margin
    var primarySecurity = stockEligible + debtorEligible;
    
    // Get financial metrics
    var pat = pnl.profit_after_tax || pnl.net_profit || 0;
    var revenue = pnl.revenue || pnl.total_revenue || 0;
    var netWorth = bs.net_worth || bs.shareholders_funds || bs.total_equity || 0;
    var currentRatio = calc?.liquidity?.current_ratio?.value || 0;
    var dscr = calc?.leverage?.dscr?.value || 0;
    var debtEquity = calc?.leverage?.debt_equity?.value || 0;
    var totalDebt = (bs.long_term_borrowings || 0) + (bs.short_term_borrowings || 0);
    
    // CRITICAL FIX: Use REQUESTED amount for recommendations, not calculated limits
    // The recommendations should be based on what the customer ASKED for
    var totalExposure = requestedAmount > 0 ? requestedAmount : (limits?.total?.amount || 0);
    var coverage = totalExposure > 0 ? (primarySecurity / totalExposure * 100) : 0;
    
    // Calculate security gap based on REQUESTED amount
    var securityGap = Math.max(0, totalExposure - primarySecurity);
    var fullySecuredAmount = primarySecurity > 0 ? primarySecurity : 0;
    
    console.log('[AI Recommendations] Total Exposure:', totalExposure, 'Primary Security:', primarySecurity, 'Coverage:', coverage.toFixed(1) + '%');
    
    // Build summary based on situation
    var summaryParts = [];
    
    // Strengths
    if (pat > 0) {
        result.strengths.push('Profitable business with PAT of ' + formatINR(pat));
    }
    if (currentRatio >= 1.25) {
        result.strengths.push('Strong liquidity position (Current Ratio: ' + currentRatio.toFixed(2) + ')');
    }
    if (dscr >= 1.5) {
        result.strengths.push('Healthy debt servicing capacity (DSCR: ' + dscr.toFixed(2) + 'x)');
    }
    if (debtEquity < 1) {
        result.strengths.push('Low leverage / minimal existing debt (D/E: ' + debtEquity.toFixed(2) + ')');
    }
    if (netWorth > totalExposure) {
        result.strengths.push('Net Worth (' + formatINR(netWorth) + ') exceeds loan requirement');
    }
    
    // Concerns
    if (coverage < 100 && totalExposure > 0) {
        result.concerns.push('Primary security coverage is only ' + Math.round(coverage) + '% of total exposure');
    }
    if (dscr > 0 && dscr < 1.5) {
        result.concerns.push('DSCR of ' + dscr.toFixed(2) + 'x is below benchmark of 1.5x');
    }
    if (currentRatio > 0 && currentRatio < 1.25) {
        result.concerns.push('Current Ratio of ' + currentRatio.toFixed(2) + ' is below policy norm of 1.25');
    }
    
    // Build summary
    if (result.strengths.length > 0 && coverage < 100) {
        var strengthsList = [];
        if (pat > 0) strengthsList.push('PAT ' + formatINR(pat));
        if (currentRatio >= 1.25) strengthsList.push('Current Ratio ' + currentRatio.toFixed(2));
        if (debtEquity < 1) strengthsList.push('almost no debt');
        
        result.summary = 'Despite strong financials (' + strengthsList.join(', ') + '), the primary security coverage is only ' + 
                        Math.round(coverage) + '% for a ' + formatINR(totalExposure) + ' exposure.';
    } else if (coverage >= 100) {
        result.summary = 'Strong financial profile with adequate security coverage of ' + Math.round(coverage) + '%. Recommend approval subject to standard conditions.';
    } else if (totalExposure > 0) {
        result.summary = 'Security coverage needs improvement. Current primary security of ' + formatINR(primarySecurity) + ' covers only ' + Math.round(coverage) + '% of exposure.';
    }
    
    // Generate options based on coverage gap
    if (coverage < 100 && totalExposure > 0) {
        // Option 1: Reduce loan amount - ONLY if fully secured amount is less than requested
        // and the reduction is meaningful (at least 10% less)
        if (fullySecuredAmount > 0 && fullySecuredAmount < totalExposure * 0.95) {
            result.options.push({
                title: 'Reduce loan amount to ' + formatINR(fullySecuredAmount),
                detail: 'This amount would be 100% covered by existing primary security (Stock + Debtors)',
                priority: 'high'
            });
        }
        
        // Option 2: Add collateral
        if (securityGap > 0) {
            result.options.push({
                title: 'Add collateral security worth ' + formatINR(securityGap),
                detail: 'Property/Fixed Assets mortgage to cover the security gap',
                priority: 'high'
            });
        }
        
        // Option 3: Personal guarantee + property
        result.options.push({
            title: 'Personal Guarantee of directors + property mortgage',
            detail: 'Standard security enhancement for MSME lending',
            priority: 'medium'
        });
        
        // Option 4: CGTMSE
        if (totalExposure <= 50000000) { // 5 Cr limit for CGTMSE
            result.options.push({
                title: 'CGTMSE coverage for eligible portion',
                detail: 'Credit Guarantee scheme covers loans up to ₹5 Cr for eligible MSMEs',
                priority: 'medium'
            });
        } else if (totalExposure <= 100000000) { // 10 Cr
            result.options.push({
                title: 'Partial CGTMSE coverage',
                detail: 'CGTMSE can cover up to ₹5 Cr, remaining requires collateral',
                priority: 'medium'
            });
        }
        
        // Option 5: Increase stock/debtors (if business can support)
        if (revenue > 0) {
            result.options.push({
                title: 'Increase working capital cycle',
                detail: 'Higher stock/receivables levels will increase eligible primary security',
                priority: 'low'
            });
        }
    }
    
    // If DSCR is low, add options
    if (dscr > 0 && dscr < 1.5) {
        result.options.push({
            title: 'Reduce requested term loan amount',
            detail: 'Lower EMI will improve DSCR to meet 1.5x benchmark',
            priority: 'medium'
        });
        result.options.push({
            title: 'Extend loan tenure',
            detail: 'Longer tenure reduces EMI and improves DSCR',
            priority: 'medium'
        });
    }
    
    return result;
}

function generateDynamicInsights(fa, calc, ed, limits, score) {
    var insights = [];
    
    // Get financial data
    var bs = ed?.balance_sheet?.fy25 || ed?.balance_sheet?.fy24 || {};
    var pnl = ed?.profit_and_loss?.fy25 || ed?.profit_and_loss?.fy24 || {};
    var bsPrev = ed?.balance_sheet?.fy24 || ed?.balance_sheet?.fy23 || {};
    var pnlPrev = ed?.profit_and_loss?.fy24 || ed?.profit_and_loss?.fy23 || {};
    
    // Get calculations
    var currentRatio = calc?.liquidity?.current_ratio?.value || 0;
    var dscr = calc?.leverage?.dscr?.value || 0;
    var debtEquity = calc?.leverage?.debt_equity?.value || 0;
    
    // 1. Revenue Insight
    var revenue = pnl.revenue || pnl.total_revenue || 0;
    var revenuePrev = pnlPrev.revenue || pnlPrev.total_revenue || 0;
    var revenueGrowth = revenuePrev > 0 ? ((revenue - revenuePrev) / revenuePrev * 100) : 0;
    if (revenue > 0) {
        var revColor = revenueGrowth >= 10 ? 'bg-green-100' : revenueGrowth >= 0 ? 'bg-yellow-100' : 'bg-red-100';
        var revIconColor = revenueGrowth >= 10 ? 'text-green-600' : revenueGrowth >= 0 ? 'text-yellow-600' : 'text-red-600';
        var revValueColor = revenueGrowth >= 10 ? 'text-green-600 font-semibold' : revenueGrowth >= 0 ? 'text-yellow-600' : 'text-red-600';
        insights.push({
            label: 'Revenue',
            value: formatCurrency(revenue) + (revenueGrowth !== 0 ? ' (' + (revenueGrowth > 0 ? '+' : '') + revenueGrowth.toFixed(1) + '% YoY)' : ''),
            icon: '₹',
            q: 'Explain the revenue trend and growth drivers',
            color: revColor,
            iconColor: revIconColor,
            valueColor: revValueColor
        });
    } else {
        insights.push({ label: 'Revenue', value: 'Not extracted', icon: '₹', q: 'What revenue information is available?', color: 'bg-gray-100', iconColor: 'text-gray-500', valueColor: 'text-gray-500' });
    }
    
    // 2. Profitability Insight
    var pat = pnl.profit_after_tax || pnl.net_profit || 0;
    var patMargin = revenue > 0 ? (pat / revenue * 100) : 0;
    if (pat !== 0) {
        var patColor = pat > 0 ? 'bg-green-100' : 'bg-red-100';
        var patIconColor = pat > 0 ? 'text-green-600' : 'text-red-600';
        insights.push({
            label: 'Net Profit',
            value: formatCurrency(Math.abs(pat)) + (pat < 0 ? ' (Loss)' : '') + ' | ' + patMargin.toFixed(1) + '% margin',
            icon: pat > 0 ? '✓' : '✗',
            q: 'Analyze the profitability and margins',
            color: patColor,
            iconColor: patIconColor,
            valueColor: pat > 0 ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold'
        });
    } else {
        insights.push({ label: 'Net Profit', value: 'Not extracted', icon: 'P', q: 'What profit information is available?', color: 'bg-gray-100', iconColor: 'text-gray-500', valueColor: 'text-gray-500' });
    }
    
    // 3. DSCR Insight
    if (dscr > 0) {
        var dscrColor = dscr >= 1.5 ? 'bg-green-100' : dscr >= 1.25 ? 'bg-yellow-100' : 'bg-red-100';
        var dscrIconColor = dscr >= 1.5 ? 'text-green-600' : dscr >= 1.25 ? 'text-yellow-600' : 'text-red-600';
        insights.push({
            label: 'DSCR',
            value: dscr.toFixed(2) + 'x' + (dscr >= 1.5 ? ' ✓ Strong' : dscr >= 1.25 ? ' ⚠ Adequate' : ' ✗ Weak'),
            icon: 'D',
            q: 'Explain the debt service coverage capacity',
            color: dscrColor,
            iconColor: dscrIconColor,
            valueColor: dscr >= 1.5 ? 'text-green-600 font-semibold' : dscr >= 1.25 ? 'text-yellow-600' : 'text-red-600'
        });
    } else {
        insights.push({ label: 'DSCR', value: 'Not calculated', icon: 'D', q: 'What is the debt service coverage?', color: 'bg-gray-100', iconColor: 'text-gray-500', valueColor: 'text-gray-500' });
    }
    
    // 4. Current Ratio Insight
    if (currentRatio > 0) {
        var crColor = currentRatio >= 1.5 ? 'bg-green-100' : currentRatio >= 1.25 ? 'bg-yellow-100' : 'bg-red-100';
        var crIconColor = currentRatio >= 1.5 ? 'text-green-600' : currentRatio >= 1.25 ? 'text-yellow-600' : 'text-red-600';
        insights.push({
            label: 'Current Ratio',
            value: currentRatio.toFixed(2) + (currentRatio >= 1.5 ? ' ✓ Strong' : currentRatio >= 1.25 ? ' ⚠ Adequate' : ' ✗ Low'),
            icon: 'C',
            q: 'Explain the liquidity position',
            color: crColor,
            iconColor: crIconColor,
            valueColor: currentRatio >= 1.5 ? 'text-green-600 font-semibold' : currentRatio >= 1.25 ? 'text-yellow-600' : 'text-red-600'
        });
    } else {
        insights.push({ label: 'Current Ratio', value: 'Not calculated', icon: 'C', q: 'What is the liquidity position?', color: 'bg-gray-100', iconColor: 'text-gray-500', valueColor: 'text-gray-500' });
    }
    
    // 5. Net Worth / D/E Insight
    var netWorth = bs.net_worth || bs.shareholders_funds || 0;
    if (netWorth > 0 || debtEquity > 0) {
        var deColor = debtEquity <= 1 ? 'bg-green-100' : debtEquity <= 2 ? 'bg-yellow-100' : 'bg-red-100';
        var deIconColor = debtEquity <= 1 ? 'text-green-600' : debtEquity <= 2 ? 'text-yellow-600' : 'text-red-600';
        insights.push({
            label: 'Net Worth',
            value: formatCurrency(netWorth) + (debtEquity > 0 ? ' | D/E: ' + debtEquity.toFixed(2) : ''),
            icon: 'N',
            q: 'Analyze the capital structure and leverage',
            color: deColor,
            iconColor: deIconColor,
            valueColor: debtEquity <= 1 ? 'text-green-600 font-semibold' : debtEquity <= 2 ? 'text-yellow-600' : 'text-red-600'
        });
    } else {
        insights.push({ label: 'Net Worth', value: 'Not extracted', icon: 'N', q: 'What is the net worth position?', color: 'bg-gray-100', iconColor: 'text-gray-500', valueColor: 'text-gray-500' });
    }
    
    return insights;
}

// Render Industry-Specific Calculation Logic section for Decision tab
function renderIndustryCalculationLogic(fa, calc, ed) {
    var html = '';
    
    // Get industry type from assessment or detect it
    var industryType = fa?.industry_type || state.uploadData?.industryType || detectCompanyTypeFromData(fa, ed);
    var industryLabel = getIndustryLabel(industryType);
    var industryColor = getIndustryColor(industryType);
    
    // Get P&L data for calculations
    var pnl = ed?.profit_and_loss?.fy25 || ed?.profit_and_loss?.fy24 || {};
    var bs = ed?.balance_sheet?.fy25 || ed?.balance_sheet?.fy24 || {};
    
    var revenue = pnl.revenue || pnl.total_revenue || 0;
    var pbt = pnl.profit_before_tax || 0;
    var pat = pnl.profit_after_tax || 0;
    var depreciation = pnl.depreciation || pnl.depreciation_amortization || 0;
    var interestExp = pnl.interest_expense || pnl.finance_costs || 0;
    var employeeExp = pnl.employee_expenses || pnl.employee_benefit_expenses || 0;
    var cogs = pnl.cost_of_goods_sold || 0;
    var grossProfit = pnl.gross_profit || 0;
    var ebitda = pnl.ebitda || (pbt + depreciation + interestExp);
    
    html += '<div class="card mt-8">';
    html += '<div class="uw-header flex items-center justify-between">';
    html += '<span class="flex items-center gap-2"><svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg> Industry-Specific Calculation Logic</span>';
    html += '<span class="px-3 py-1 rounded-full text-sm font-medium bg-' + industryColor + '-100 text-' + industryColor + '-800">' + industryLabel + '</span>';
    html += '</div>';
    html += '<div class="uw-body">';
    
    // Explanation based on industry
    html += '<div class="bg-' + industryColor + '-50 border border-' + industryColor + '-200 rounded-lg p-4 mb-4">';
    html += '<p class="text-sm text-' + industryColor + '-800">' + getIndustryExplanation(industryType) + '</p>';
    html += '</div>';
    
    // Calculations table
    html += '<div class="overflow-x-auto">';
    html += '<table class="min-w-full text-sm">';
    html += '<thead class="bg-gray-50"><tr>';
    html += '<th class="px-4 py-2 text-left font-semibold text-gray-700">Metric</th>';
    html += '<th class="px-4 py-2 text-left font-semibold text-gray-700">Formula Used</th>';
    html += '<th class="px-4 py-2 text-left font-semibold text-gray-700">Calculation</th>';
    html += '<th class="px-4 py-2 text-left font-semibold text-gray-700">Result</th>';
    html += '<th class="px-4 py-2 text-left font-semibold text-gray-700">Status</th>';
    html += '</tr></thead>';
    html += '<tbody class="divide-y divide-gray-200">';
    
    // EBITDA row
    html += '<tr>';
    html += '<td class="px-4 py-2 font-medium">EBITDA</td>';
    html += '<td class="px-4 py-2 font-mono text-xs text-gray-600">PBT + Depreciation + Finance Costs</td>';
    html += '<td class="px-4 py-2 text-xs text-gray-600">'+formatCurrency(pbt) + ' + '+formatCurrency(depreciation) + ' + '+formatCurrency(interestExp) + '</td>';
    html += '<td class="px-4 py-2 font-bold text-axis-primary">'+formatCurrency(ebitda) + '</td>';
    html += '<td class="px-4 py-2"><span class="px-2 py-1 bg-green-100 text-green-800 rounded text-xs">Calculated</span></td>';
    html += '</tr>';
    
    // EBITDA Margin row
    var ebitdaMargin = revenue > 0 ? (ebitda / revenue * 100) : 0;
    var ebitdaBenchmark = getEbitdaBenchmark(industryType);
    var ebitdaStatus = ebitdaMargin >= ebitdaBenchmark ? 'pass' : 'fail';
    html += '<tr>';
    html += '<td class="px-4 py-2 font-medium">EBITDA Margin</td>';
    html += '<td class="px-4 py-2 font-mono text-xs text-gray-600">EBITDA ÷ Revenue × 100</td>';
    html += '<td class="px-4 py-2 text-xs text-gray-600">'+formatCurrency(ebitda) + ' ÷ '+formatCurrency(revenue) + ' × 100</td>';
    html += '<td class="px-4 py-2 font-bold">' + ebitdaMargin.toFixed(1) + '%</td>';
    html += '<td class="px-4 py-2"><span class="px-2 py-1 ' + (ebitdaStatus === 'pass' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800') + ' rounded text-xs">' + (ebitdaStatus === 'pass' ? '✓ ≥' + ebitdaBenchmark + '%' : '✗ <' + ebitdaBenchmark + '%') + '</span></td>';
    html += '</tr>';
    
    // Gross Margin row (based on industry)
    if (isGrossMarginApplicable(industryType)) {
        var grossMargin = revenue > 0 && grossProfit > 0 ? (grossProfit / revenue * 100) : 0;
        var grossBenchmark = getGrossMarginBenchmark(industryType);
        var grossStatus = grossMargin >= grossBenchmark ? 'pass' : (grossProfit === 0 ? 'na' : 'fail');
        html += '<tr>';
        html += '<td class="px-4 py-2 font-medium">Gross Margin</td>';
        html += '<td class="px-4 py-2 font-mono text-xs text-gray-600">Gross Profit ÷ Revenue × 100</td>';
        if (grossProfit > 0) {
            html += '<td class="px-4 py-2 text-xs text-gray-600">'+formatCurrency(grossProfit) + ' ÷ '+formatCurrency(revenue) + ' × 100</td>';
            html += '<td class="px-4 py-2 font-bold">' + grossMargin.toFixed(1) + '%</td>';
            html += '<td class="px-4 py-2"><span class="px-2 py-1 ' + (grossStatus === 'pass' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800') + ' rounded text-xs">' + (grossStatus === 'pass' ? '✓ ≥' + grossBenchmark + '%' : '✗ <' + grossBenchmark + '%') + '</span></td>';
        } else {
            html += '<td class="px-4 py-2 text-xs text-gray-400">COGS not available in P&L</td>';
            html += '<td class="px-4 py-2 text-gray-400">-</td>';
            html += '<td class="px-4 py-2"><span class="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs">Data Missing</span></td>';

    } else {

        html += '<td class="px-4 py-2 text-gray-400" colspan="3">Not applicable for ' + industryLabel + ' - No traditional COGS structure</td>';
        html += '<td class="px-4 py-2"><span class="px-2 py-1 bg-gray-200 text-gray-600 rounded text-xs">N/A</span></td>';
        html += '</tr>';
    }
    
    // Employee Cost Ratio (important for service companies)
    if (isEmployeeCostCritical(industryType)) {
        var empCostRatio = revenue > 0 ? (employeeExp / revenue * 100) : 0;
        var empBenchmark = industryType.startsWith('service') ? '30-50%' : '<30%';
        var empStatus = (industryType.startsWith('service') && empCostRatio >= 30 && empCostRatio <= 50) || (!industryType.startsWith('service') && empCostRatio < 30) ? 'pass' : 'warn';
        html += '<tr class="' + (industryType.startsWith('service') ? 'bg-blue-50' : '') + '">';
        html += '<td class="px-4 py-2 font-medium">' + (industryType.startsWith('service') ? '⭐ ' : '') + 'Employee Cost Ratio</td>';
        html += '<td class="px-4 py-2 font-mono text-xs text-gray-600">Employee Exp ÷ Revenue × 100</td>';
        html += '<td class="px-4 py-2 text-xs text-gray-600">'+formatCurrency(employeeExp) + ' ÷ '+formatCurrency(revenue) + ' × 100</td>';
        html += '<td class="px-4 py-2 font-bold">' + empCostRatio.toFixed(1) + '%</td>';
        html += '<td class="px-4 py-2"><span class="px-2 py-1 ' + (empStatus === 'pass' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800') + ' rounded text-xs">' + empBenchmark + '</span></td>';
        html += '</tr>';
    }
    
    // PAT Margin
    var patMargin = revenue > 0 ? (pat / revenue * 100) : 0;
    html += '<tr>';
    html += '<td class="px-4 py-2 font-medium">PAT Margin</td>';
    html += '<td class="px-4 py-2 font-mono text-xs text-gray-600">PAT ÷ Revenue × 100</td>';
    html += '<td class="px-4 py-2 text-xs text-gray-600">'+formatCurrency(pat) + ' ÷ '+formatCurrency(revenue) + ' × 100</td>';
    html += '<td class="px-4 py-2 font-bold ' + (patMargin >= 10 ? 'text-green-600' : patMargin >= 5 ? 'text-yellow-600' : 'text-red-600') + '">' + patMargin.toFixed(1) + '%</td>';
    html += '<td class="px-4 py-2"><span class="px-2 py-1 ' + (patMargin >= 10 ? 'bg-green-100 text-green-800' : patMargin >= 5 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800') + ' rounded text-xs">' + (patMargin >= 10 ? '✓ Strong' : patMargin >= 5 ? '⚠ Moderate' : '✗ Weak') + '</span></td>';
    html += '</tr>';
    
    html += '</tbody></table>';
    html += '</div>';
    
    // Link to full calculation logic page
    html += '<div class="mt-4 pt-4 border-t border-gray-200 flex items-center justify-between">';
    html += '<p class="text-sm text-gray-500">Calculations adapted for <strong>' + industryLabel + '</strong> as per industry-specific norms.</p>';
    html += '<button onclick="openCalculationLogic()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">';

    html += 'View All Industry Logic';
    html += '</button>';
    html += '</div>';
    
    html += '</div></div>';
    
    return html;
}

// Helper functions for industry-specific logic
function detectCompanyTypeFromData(fa, ed) {
    var pnl = ed?.profit_and_loss?.fy25 || ed?.profit_and_loss?.fy24 || {};
    var cogs = pnl.cost_of_goods_sold || 0;
    var employeeExp = pnl.employee_expenses || pnl.employee_benefit_expenses || 0;
    var revenue = pnl.revenue || pnl.total_revenue || 0;
    var companyName = (fa?.company_name || fa?.company || '').toLowerCase();
    
    // Check company name for hints
    if (companyName.includes('software') || companyName.includes('consulting') || 
        companyName.includes('technologies') || companyName.includes('solutions') ||
        companyName.includes('cloud') || companyName.includes('computing') ||
        companyName.includes('services') || companyName.includes('infotech')) {
        return 'service_it';
    }
    
    // No COGS but high employee expenses = service
    if (!cogs && employeeExp > 0 && revenue > 0 && (employeeExp / revenue) > 0.3) {
        return 'service_other';
    }
    
    // Has COGS = manufacturing or trading
    if (cogs > 0) {
        return 'manufacturing';
    }
    
    return 'other';
}

function countUploadedDocs(fa) {
    if(!fa) return 0;
    
    // 0. Check if document_count is already saved from processing
    if(fa.document_count && fa.document_count > 0) {
        return fa.document_count;
    }
    
    // Try multiple sources for document count
    // 1. Check fa.documents
    if(fa.documents && Object.keys(fa.documents).length > 0) {
        var count = 0;
        Object.keys(fa.documents).forEach(function(key) {
            var doc = fa.documents[key];
            if(doc && (doc.buffer || doc.s3Key || doc.data || doc.uploadedAt || doc.filename)) {
                count++;
            }
        });
        if(count > 0) return count;
    }
    
    // 2. Check fa.extracted_data for years processed
    if(fa.extracted_data) {
        var edCount = 0;
        ['balance_sheet', 'profit_and_loss', 'cash_flow'].forEach(function(cat) {
            if(fa.extracted_data[cat]) {
                ['fy25', 'fy24', 'fy23'].forEach(function(yr) {
                    if(fa.extracted_data[cat][yr]) edCount++;
                });
            }
        });
        if(edCount > 0) return edCount;
    }
    
    // 3. Check state.uploadData.files
    if(state.uploadData && state.uploadData.files) {
        var uploadCount = Object.keys(state.uploadData.files).filter(function(k){
            return state.uploadData.files[k];
        }).length;
        if(uploadCount > 0) return uploadCount;
    }
    
    // 4. Check actualProcessingState
    if(state.actualProcessingState && state.actualProcessingState.docCount) {
        return state.actualProcessingState.docCount;
    }
    
    return 0;
}

function countDataPoints(ed) {
    if(!ed) return 0;
    var count = 0;
    ['balance_sheet', 'profit_and_loss'].forEach(function(cat) {
        if(ed[cat]) {
            ['fy25', 'fy24', 'fy23'].forEach(function(yr) {
                if(ed[cat][yr]) count += Object.keys(ed[cat][yr]).length;
            });
        }
    });
    return count || 409;
}

        var docs = [];

            var keyLower = key.toLowerCase();
            var type = 'Document';
            var year = '';

                type = 'Balance Sheet';

                type = 'KYC Document';

                type = 'Cash Flow Statement';
            }
            
            // Determine year/period
            if(keyLower.includes('fy25') || keyLower.includes('fy2025')) {
                year = 'FY 2024-25';

// === LEGAL/COLLATERAL TAB ===
function renderLegalTab(){
    var legalAssessment = state.fullAssessment?.legal_risk_assessment || 
                          state.fullAssessment?.extracted_data?.legal_risk_assessment;
    
    if(!legalAssessment){
        return '<div class="card"><div class="uw-header">Legal/Collateral Assessment</div><div class="uw-body text-center py-12"><div class="text-gray-400 text-lg mb-2">No Legal Assessment Available</div><div class="text-gray-500 text-sm">Upload legal documents (TSR, EC, Legal Opinion) to see assessment</div></div></div>';
    }
    
    var summary = legalAssessment.summary || {};
    var properties = legalAssessment.properties || [];
    var selectedProp = state.selectedLegalProperty || (properties.length > 0 ? properties[0].property_id : null);
    var currentProp = properties.find(function(p){ return p.property_id === selectedProp; }) || properties[0];
    
    // Risk badge colors
    function getRiskBadge(risk){
        var colors = {
            'High': 'bg-red-100 text-red-800 border-red-200',
            'Medium': 'bg-yellow-100 text-yellow-800 border-yellow-200',
            'Low': 'bg-green-100 text-green-800 border-green-200'
        };
        return '<span class="px-3 py-1 rounded-full text-sm font-medium border '+(colors[risk]||colors['Medium'])+'">'+risk+' Risk</span>';
    }
    
    function getEnforceabilityBadge(enf){
        var colors = {
            'Enforceable': 'bg-green-100 text-green-800 border-green-200',
            'Enforceable with Conditions': 'bg-yellow-100 text-yellow-800 border-yellow-200',
            'Not Enforceable': 'bg-red-100 text-red-800 border-red-200'
        };
        return '<span class="px-3 py-1 rounded-full text-sm font-medium border '+(colors[enf]||colors['Enforceable with Conditions'])+'">'+enf+'</span>';
    }
    
    // Summary Card
    var summaryHtml = '<div class="card mb-6"><div class="uw-header flex justify-between items-center"><span>Legal Risk Assessment Summary</span><span class="text-xs font-normal text-gray-500">Assessed: '+(legalAssessment.assessment_date ? new Date(legalAssessment.assessment_date).toLocaleDateString() : 'N/A')+'</span></div><div class="uw-body"><div class="grid grid-cols-4 gap-4 mb-6">';
    
    // Summary stats
    summaryHtml += '<div class="text-center p-4 bg-gray-50 rounded-lg"><div class="text-3xl font-bold text-gray-900">'+summary.total_properties+'</div><div class="text-sm text-gray-500">Properties</div></div>';
    summaryHtml += '<div class="text-center p-4 '+(summary.high_risk_count > 0 ? 'bg-red-50' : 'bg-gray-50')+' rounded-lg"><div class="text-3xl font-bold '+(summary.high_risk_count > 0 ? 'text-red-600' : 'text-gray-900')+'">'+summary.high_risk_count+'</div><div class="text-sm text-gray-500">High Risk</div></div>';
    summaryHtml += '<div class="text-center p-4 '+(summary.medium_risk_count > 0 ? 'bg-yellow-50' : 'bg-gray-50')+' rounded-lg"><div class="text-3xl font-bold '+(summary.medium_risk_count > 0 ? 'text-yellow-600' : 'text-gray-900')+'">'+summary.medium_risk_count+'</div><div class="text-sm text-gray-500">Medium Risk</div></div>';
    summaryHtml += '<div class="text-center p-4 bg-green-50 rounded-lg"><div class="text-3xl font-bold text-green-600">'+summary.low_risk_count+'</div><div class="text-sm text-gray-500">Low Risk</div></div>';
    summaryHtml += '</div>';
    
    // Overall assessment
    summaryHtml += '<div class="flex items-center justify-between p-4 border rounded-lg"><div><div class="text-sm text-gray-500 mb-1">Overall Assessment</div><div class="flex items-center space-x-3">'+getRiskBadge(summary.overall_risk_rating)+getEnforceabilityBadge(summary.overall_enforceability)+'</div></div>';
    
    // Key findings
    if(summary.key_findings && summary.key_findings.length > 0){
        summaryHtml += '<div class="text-right"><div class="text-sm text-gray-500 mb-1">Key Findings</div><div class="text-sm text-red-600">'+summary.key_findings.slice(0,2).join(', ')+(summary.key_findings.length > 2 ? ' (+'+( summary.key_findings.length - 2)+' more)' : '')+'</div></div>';
    }
    summaryHtml += '</div></div></div>';
    
    // Property selector (if multiple properties)
    var propSelectorHtml = '';
    if(properties.length > 1){
        propSelectorHtml = '<div class="card mb-6"><div class="uw-header">Select Property</div><div class="uw-body"><div class="flex flex-wrap gap-2">';
        properties.forEach(function(p){
            var isActive = p.property_id === selectedProp;
            var riskColor = p.risk_rating === 'High' ? 'border-red-500 bg-red-50' : (p.risk_rating === 'Medium' ? 'border-yellow-500 bg-yellow-50' : 'border-green-500 bg-green-50');
            propSelectorHtml += '<button onclick="selectLegalProperty(\''+p.property_id+'\')" class="px-4 py-2 rounded-lg border-2 text-sm font-medium transition '+(isActive ? riskColor+' ring-2 ring-offset-2' : 'border-gray-200 hover:border-gray-400')+'">'+p.property_id.toUpperCase()+' - '+(p.property_address || 'Property').substring(0,30)+(p.property_address && p.property_address.length > 30 ? '...' : '')+' <span class="text-xs opacity-75">('+p.risk_rating+')</span></button>';
        });
        propSelectorHtml += '</div></div></div>';
    }
    
    // Property detail card
    var propDetailHtml = '';
    if(currentProp){
        propDetailHtml = '<div class="grid grid-cols-12 gap-6">';
        
        // Left column - Property info and analysis sections
        propDetailHtml += '<div class="col-span-8">';
        
        // Property header
        propDetailHtml += '<div class="card mb-4"><div class="uw-header flex justify-between items-center"><span>'+currentProp.property_id.toUpperCase()+': '+(currentProp.property_address || 'Property Details')+'</span><div class="flex items-center space-x-2">'+getRiskBadge(currentProp.risk_rating)+getEnforceabilityBadge(currentProp.enforceability_decision)+'</div></div><div class="uw-body">';
        
        // Property metadata
        propDetailHtml += '<div class="grid grid-cols-3 gap-4 mb-4 text-sm">';
        propDetailHtml += '<div><span class="text-gray-500">Type:</span> <span class="font-medium">'+(currentProp.property_type || 'N/A')+'</span></div>';
        propDetailHtml += '<div><span class="text-gray-500">State:</span> <span class="font-medium">'+(currentProp.state || 'N/A')+'</span></div>';
        propDetailHtml += '<div><span class="text-gray-500">Assessed:</span> <span class="font-medium">'+(currentProp.assessment_date ? new Date(currentProp.assessment_date).toLocaleDateString() : 'N/A')+'</span></div>';
        propDetailHtml += '</div>';
        
        // Enforceability rationale
        if(currentProp.enforceability_rationale){
            propDetailHtml += '<div class="p-3 bg-gray-50 rounded-lg text-sm"><span class="font-medium">Rationale:</span> '+currentProp.enforceability_rationale+'</div>';
        }
        propDetailHtml += '</div></div>';
        
        // Analysis sections - collapsible accordion style
        propDetailHtml += renderLegalAnalysisSections(currentProp);
        
        propDetailHtml += '</div>'; // End left column
        
        // Right column - Rules triggered and actions
        propDetailHtml += '<div class="col-span-4">';
        
        // Rules triggered
        propDetailHtml += '<div class="card mb-4"><div class="uw-header">Rules Triggered ('+(currentProp.rules_triggered?.length || 0)+')</div><div class="uw-body max-h-64 overflow-y-auto">';
        if(currentProp.rules_triggered && currentProp.rules_triggered.length > 0){
            currentProp.rules_triggered.forEach(function(rule){
                var rColor = rule.risk_rating === 'High' ? 'border-l-red-500 bg-red-50' : (rule.risk_rating === 'Medium' ? 'border-l-yellow-500 bg-yellow-50' : 'border-l-green-500 bg-green-50');
                propDetailHtml += '<div class="p-2 mb-2 border-l-4 rounded-r '+rColor+'"><div class="text-xs font-medium">'+rule.rule_code+'</div><div class="text-sm">'+rule.rule_name+'</div><div class="text-xs text-gray-500 mt-1">'+rule.risk_category+' • '+rule.enforceability_impact+'</div></div>';
            });
        } else {
            propDetailHtml += '<div class="text-center py-4 text-gray-400 text-sm">No rules triggered</div>';
        }
        propDetailHtml += '</div></div>';
        
        // Blocking issues
        if(currentProp.blocking_issues && currentProp.blocking_issues.length > 0){
            propDetailHtml += '<div class="card mb-4 border-red-200"><div class="uw-header bg-red-50 text-red-800">⚠️ Blocking Issues</div><div class="uw-body">';
            currentProp.blocking_issues.forEach(function(issue){
                propDetailHtml += '<div class="flex items-start gap-2 mb-2"><span class="text-red-500">✕</span><span class="text-sm">'+issue+'</span></div>';
            });
            propDetailHtml += '</div></div>';
        }
        
        // Recommended actions
        propDetailHtml += '<div class="card mb-4"><div class="uw-header">Recommended Actions</div><div class="uw-body">';
        if(currentProp.recommended_actions && currentProp.recommended_actions.length > 0){
            currentProp.recommended_actions.forEach(function(action, idx){
                propDetailHtml += '<div class="flex items-start gap-2 mb-2"><span class="text-blue-500 font-bold">'+(idx+1)+'.</span><span class="text-sm">'+action+'</span></div>';
            });
        } else {
            propDetailHtml += '<div class="text-center py-4 text-gray-400 text-sm">No actions required</div>';
        }
        propDetailHtml += '</div></div>';
        
        // Conditions precedent/subsequent
        if((currentProp.advocate_remarks?.conditions_precedent?.length > 0) || (currentProp.advocate_remarks?.conditions_subsequent?.length > 0)){
            propDetailHtml += '<div class="card"><div class="uw-header">Conditions</div><div class="uw-body">';
            if(currentProp.advocate_remarks.conditions_precedent?.length > 0){
                propDetailHtml += '<div class="mb-3"><div class="text-xs font-medium text-gray-500 mb-1">CONDITIONS PRECEDENT</div>';
                currentProp.advocate_remarks.conditions_precedent.forEach(function(c){
                    propDetailHtml += '<div class="text-sm mb-1">• '+c+'</div>';
                });
                propDetailHtml += '</div>';
            }
            if(currentProp.advocate_remarks.conditions_subsequent?.length > 0){
                propDetailHtml += '<div><div class="text-xs font-medium text-gray-500 mb-1">CONDITIONS SUBSEQUENT</div>';
                currentProp.advocate_remarks.conditions_subsequent.forEach(function(c){
                    propDetailHtml += '<div class="text-sm mb-1">• '+c+'</div>';
                });
                propDetailHtml += '</div>';
            }
            propDetailHtml += '</div></div>';
        }
        
        propDetailHtml += '</div>'; // End right column
        propDetailHtml += '</div>'; // End grid
    }
    
    return summaryHtml + propSelectorHtml + propDetailHtml;
}

// Helper function to render analysis sections

            {k: 'prior_charge_subsisting', l: 'Prior Charge Exists', type: 'bool'},
            {k: 'lis_pendens_found', l: 'Lis Pendens', type: 'bool'}
        ], array: 'encumbrances'},
        { key: 'litigation_analysis', title: 'Litigation Analysis', icon: '⚖️', fields: [
            {k: 'has_litigation', l: 'Has Litigation', type: 'bool'},

        ], array: 'cases'},

            {k: 'mutation_status', l: 'Mutation Status'},
            {k: 'revenue_records_match', l: 'Records Match', type: 'bool'},
            {k: 'property_tax_current', l: 'Tax Current', type: 'bool'},
            {k: 'dues_amount', l: 'Dues Amount', type: 'currency'}
        ]},
        { key: 'land_use_analysis', title: 'Land Use', icon: '🏗️', fields: [
            {k: 'current_use', l: 'Current Use'},
            {k: 'zoning_compliant', l: 'Zoning Compliant', type: 'bool'},
            {k: 'na_conversion_status', l: 'NA Conversion'},
            {k: 'building_approval_valid', l: 'Building Approved', type: 'bool'}
        ]},
        { key: 'stamping_registration_analysis', title: 'Stamp/Registration', icon: '📋', fields: [
            {k: 'properly_stamped', l: 'Properly Stamped', type: 'bool'},
            {k: 'properly_registered', l: 'Properly Registered', type: 'bool'}
        ], array: 'deficiencies'},
        { key: 'mortgage_perfection_analysis', title: 'Mortgage Perfection', icon: '🏦', fields: [
            {k: 'mortgage_type', l: 'Mortgage Type'},
            {k: 'mod_registered', l: 'MOD Registered', type: 'bool'},
            {k: 'schedule_correct', l: 'Schedule Correct', type: 'bool'}
        ], array: 'deficiencies'},
        { key: 'advocate_remarks', title: 'Advocate Remarks', icon: '👨‍⚖️', fields: [
            {k: 'has_adverse_remarks', l: 'Has Adverse Remarks', type: 'bool'},
            {k: 'remarks_summary', l: 'Summary'}
        ]}
    ];
    
    sections.forEach(function(section){
        var data = prop[section.key];
        if(!data) return;
        
        html += '<div class="card mb-4"><div class="uw-header cursor-pointer" onclick="toggleLegalSection(\''+section.key+'\')"><span>'+section.icon+' '+section.title+'</span><span class="text-gray-400">▼</span></div>';
        html += '<div id="legal-section-'+section.key+'" class="uw-body">';
        
        // Render fields
        html += '<div class="grid grid-cols-2 gap-3 text-sm">';
        section.fields.forEach(function(f){
            var val = data[f.k];
            var displayVal = val;
            if(f.type === 'bool'){
                displayVal = val ? '<span class="text-red-600">Yes</span>' : '<span class="text-green-600">No</span>';
                if(f.k === 'revenue_records_match' || f.k === 'property_tax_current' || f.k === 'zoning_compliant' || f.k === 'properly_stamped' || f.k === 'properly_registered' || f.k === 'mod_registered' || f.k === 'schedule_correct' || f.k === 'building_approval_valid'){
                    displayVal = val ? '<span class="text-green-600">Yes</span>' : '<span class="text-red-600">No</span>';
                }
            } else if(f.type === 'currency'){
                displayVal = val ? '₹'+Number(val).toLocaleString('en-IN') : '₹0';
            }
            html += '<div><span class="text-gray-500">'+f.l+':</span> <span class="font-medium">'+(displayVal !== null && displayVal !== undefined ? displayVal : 'N/A')+'</span></div>';
        });
        html += '</div>';
        
        // Render array if present
        if(section.array && data[section.array] && data[section.array].length > 0){
            html += '<div class="mt-3 pt-3 border-t"><div class="text-xs font-medium text-gray-500 mb-2">'+section.array.toUpperCase().replace('_', ' ')+'</div>';
            html += '<div class="space-y-2">';
            data[section.array].forEach(function(item){
                if(typeof item === 'string'){
                    html += '<div class="text-sm p-2 bg-gray-50 rounded">'+item+'</div>';
                } else {

                    Object.keys(item).forEach(function(k){

// Detect company type based on P&L structure
function detectCompanyType(pnl, bs, companyInfo) {
    var cogs = pnl.cost_of_goods_sold || 0;
    var grossProfit = pnl.gross_profit || 0;
    var employeeExp = pnl.employee_expenses || pnl.employee_benefit_expenses || 0;
    var softwareHardware = pnl.software_hardware_expenses || pnl.software_and_hardware_expenses || 0;
    var purchases = pnl.purchases || 0;
    var revenue = pnl.revenue || pnl.total_revenue || 0;
    var inventory = bs.inventory || bs.inventories || 0;
    
    // Check company info for hints
    var industry = (companyInfo.industry || '').toLowerCase();
    var companyName = (companyInfo.company_name || '').toLowerCase();
    
    // Service company indicators
    if (industry.includes('service') || industry.includes('software') || industry.includes('consulting') || 
        industry.includes('it ') || industry.includes('technology') ||
        companyName.includes('consulting') || companyName.includes('software') || 
        companyName.includes('technologies') || companyName.includes('solutions') ||
        companyName.includes('cloud') || companyName.includes('computing')) {
        return { type: 'service', label: '🏢 Service Company', color: 'blue' };
    }
    
    // No COGS but high employee expenses = service company
    if (!cogs && !grossProfit && employeeExp > 0 && revenue > 0) {
        var empRatio = employeeExp / revenue;
        if (empRatio > 0.3) { // Employee expenses > 30% of revenue
            return { type: 'service', label: '🏢 Service Company', color: 'blue' };
        }
    }
    
    // Software/Hardware expenses without COGS = IT service company
    if (softwareHardware > 0 && !cogs) {
        return { type: 'service', label: '💻 IT Service Company', color: 'indigo' };
    }
    
    // Has COGS and inventory = manufacturing
    if (cogs > 0 && inventory > 0) {
        return { type: 'manufacturing', label: '🏭 Manufacturing Company', color: 'green' };
    }
    
    // Has purchases and inventory = trading
    if (purchases > 0 && inventory > 0) {
        return { type: 'trading', label: '🛒 Trading Company', color: 'orange' };
    }
    
    // Has COGS = manufacturing or trading
    if (cogs > 0 || grossProfit > 0) {
        return { type: 'manufacturing', label: '🏭 Manufacturing/Trading', color: 'green' };
    }
    
    // Default
    return { type: 'unknown', label: '📋 Company', color: 'gray' };
}

// Format amount in Crores
function formatCrores(amount) {
    if (!amount || amount === 0) return '₹0';
    var crores = amount / 10000000;
    if (crores >= 1) {
        return '₹' + crores.toFixed(2) + ' Cr';
    } else {
        var lakhs = amount / 100000;
        return '₹' + lakhs.toFixed(2) + ' L';
    }
}

        html += '</div>';
        html += '<div id="hl_notes" class="p-4">';
        var notesYears = Object.keys(notes).sort().reverse();
        notesYears.forEach(function(yr) {
            var yrNotes = notes[yr] || {};

                        html += '<span class="text-gray-600">'+key.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase();})+'</span>';

    // GST Returns
    var gstReturns = data.gst_returns || [];

    // ITR Returns

    // Bank Statements

        // Aggregated Summary

        }
        
        // Detailed Records
        if (bankStmts.length > 0) {
            html += '<div class="overflow-x-auto"><table class="w-full text-sm">';
            html += '<thead><tr class="bg-gray-100"><th class="px-3 py-2 text-left">Month</th><th class="px-3 py-2 text-right">Opening</th><th class="px-3 py-2 text-right">Credits</th><th class="px-3 py-2 text-right">Debits</th><th class="px-3 py-2 text-right">Closing</th></tr></thead><tbody>';
            bankStmts.forEach(function(b) {
                html += '<tr class="border-b"><td class="px-3 py-2">'+(b.month || b.period || '-')+'</td>';
                html += '<td class="px-3 py-2 text-right">'+formatCurrency(b.opening_balance || 0)+'</td>';
                html += '<td class="px-3 py-2 text-right text-green-600">'+formatCurrency(b.total_credits || 0)+'</td>';
                html += '<td class="px-3 py-2 text-right text-red-600">'+formatCurrency(b.total_debits || 0)+'</td>';
                html += '<td class="px-3 py-2 text-right">'+formatCurrency(b.closing_balance || 0)+'</td></tr>';
            });
            html += '</tbody></table></div>';
        }
        html += '</div></div>';
    }
    
    // Legal & Property Documents
    var legalRisk = data.legal_risk_assessment || {};
    var property = data.property || data.property_documents || {};
    if (Object.keys(legalRisk).length > 0 || Object.keys(property).length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-purple-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_legal\')">';
        html += '<span class="font-medium text-purple-900">Legal & Property Documents</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_legal" class="p-4">';
        
        // Legal Risk Assessment Summary
        if (legalRisk.overall_assessment) {
            var riskLevel = legalRisk.overall_assessment.risk_level || 'Unknown';
            var riskClass = riskLevel.toLowerCase().includes('low') ? 'bg-green-100 text-green-800' : riskLevel.toLowerCase().includes('high') ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800';
            html += '<div class="mb-4 p-3 rounded-lg '+riskClass+'">';
            html += '<div class="font-bold">Overall Legal Risk: '+riskLevel+'</div>';
            if (legalRisk.overall_assessment.recommendation) {
                html += '<div class="text-sm mt-1">'+legalRisk.overall_assessment.recommendation+'</div>';

            html += '</div>';

        // Properties
        var properties = legalRisk.properties || [];
        if (properties.length > 0) {
            html += '<div class="space-y-3">';
            properties.forEach(function(prop, idx) {

                if (prop.property_type) html += '<div><span class="text-gray-500">Type:</span> '+prop.property_type+'</div>';
                if (prop.market_value) html += '<div><span class="text-gray-500">Market Value:</span> '+formatCurrency(prop.market_value)+'</div>';
                if (prop.title_status) html += '<div><span class="text-gray-500">Title:</span> '+prop.title_status+'</div>';
                if (prop.encumbrance_status) html += '<div><span class="text-gray-500">Encumbrance:</span> '+prop.encumbrance_status+'</div>';
                if (prop.mutation_status) html += '<div><span class="text-gray-500">Mutation:</span> '+prop.mutation_status+'</div>';
                if (prop.risk_level) html += '<div><span class="text-gray-500">Risk:</span> '+prop.risk_level+'</div>';
                html += '</div></div>';
            });
            html += '</div>';
        }
        
        // Raw property documents
        if (Object.keys(property).length > 0 && properties.length === 0) {
            html += '<div class="grid grid-cols-2 gap-4">';
            Object.keys(property).forEach(function(k) {
                var propData = property[k];
                html += '<div class="p-3 bg-gray-50 rounded-lg">';
                html += '<h5 class="font-medium text-gray-900 mb-2">'+k.replace(/_/g,' ').toUpperCase()+'</h5>';

                    html += '<div class="text-sm space-y-1">';
                    Object.keys(propData).slice(0, 6).forEach(function(field) {
                        var val = propData[field];
                        if (typeof val === 'number' && Math.abs(val) > 10000) val = formatCurrency(val);
                        html += '<div><span class="text-gray-500">'+field+':</span> '+val+'</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        
        html += '</div></div>';
    }
    
    // KYC Documents
    var kyc = data.kyc || data.kyc_documents || {};
    if (Object.keys(kyc).length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_kyc\')">';
        html += '<span class="font-medium text-gray-900">KYC Documents</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_kyc" class="p-4">';
        html += '<div class="grid grid-cols-2 gap-4">';
        Object.keys(kyc).forEach(function(k) {
            var kycData = kyc[k];
            html += '<div class="p-3 bg-gray-50 rounded-lg">';
            html += '<h5 class="font-medium text-gray-900 mb-2">'+k.replace(/_/g,' ').toUpperCase()+'</h5>';
            if (typeof kycData === 'object') {
                html += '<div class="text-sm space-y-1">';
                Object.keys(kycData).slice(0, 5).forEach(function(field) {
                    html += '<div><span class="text-gray-500">'+field+':</span> '+kycData[field]+'</div>';

                html += '<div class="text-sm">'+kycData+'</div>';
            }
            html += '</div>';
        });
        html += '</div></div></div>';
    }
    
    // Statutory Documents
    var statutory = data.statutory || data.statutory_compliance || {};
    if (Object.keys(statutory).length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_statutory\')">';
        html += '<span class="font-medium text-gray-900">Statutory Compliance</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_statutory" class="p-4">';
        html += '<div class="grid grid-cols-3 gap-4 text-sm">';
        Object.keys(statutory).forEach(function(k) {
            var val = statutory[k];
            html += '<div class="flex justify-between border-b border-gray-100 py-2">';
            html += '<span class="text-gray-600">'+k.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase();})+'</span>';
            html += '<span class="font-medium">'+val+'</span></div>';
        });
        html += '</div></div></div>';
    }
    
    html += '</div>';
    return html;
}

// Helper function to render financial tables (BS, P&L, CF)
function renderHLFinancialTable(title, sectionId, data, category, prefix, fields, editMode, modifiedFields) {
    var html = '';
    if (Object.keys(data).length === 0) {
        return html; // Don't show empty sections
    }
    
    html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
    html += '<div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\''+sectionId+'\')">';
    html += '<span class="font-medium text-gray-900">'+title+'</span>';
    var years = Object.keys(data).filter(function(y){ return !y.startsWith('_'); }).sort().reverse();
    html += '<span class="text-sm text-gray-500">('+years.length+' years: '+years.join(', ').toUpperCase()+')</span>';
    html += '</div>';
    html += '<div id="'+sectionId+'" class="p-4">';
    
    // Duplicate detection banner
    var hasDuplicates = years.some(function(y) { return data[y] && data[y]._is_duplicate; });
    if (hasDuplicates) {
        html += '<div class="bg-red-50 border-l-4 border-red-500 p-3 mb-3">';
        html += '<div class="flex items-center">';
        html += '<svg class="w-5 h-5 text-red-600 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>';
        html += '<div><strong class="text-red-800">⚠ Duplicate Documents Detected</strong>';
        html += '<p class="text-red-700 text-sm">Same file was uploaded for multiple years. Values in <span class="font-bold text-red-900">RED columns</span> are copied from the original and are NOT actual data for that year.</p></div>';
        html += '</div></div>';
    }
    
    html += '<div class="overflow-x-auto"><table class="w-full text-sm">';
    html += '<thead><tr class="bg-gray-100"><th class="px-3 py-2 text-left">Field</th>';
    years.forEach(function(y) {
        var isDup = data[y] && data[y]._is_duplicate;
        html += '<th class="px-3 py-2 text-right '+(isDup ? 'bg-red-100 text-red-800' : '')+'">'+y.toUpperCase()+(isDup ? ' <span class="text-red-600">⚠️ DUPLICATE</span>' : '')+'</th>';
    });
    html += '<th class="px-3 py-2 text-left">Source</th></tr></thead><tbody>';
    
    fields.forEach(function(f) {
        var hasAnyValue = years.some(function(y) { return data[y] && data[y][f]; });
        if (!hasAnyValue) return;
        var isModified = years.some(function(y) { return modifiedFields[prefix+'_'+y+'_'+f]; });
        html += '<tr class="border-b '+(isModified ? 'bg-yellow-50' : '')+'">';
        html += '<td class="px-3 py-2 font-medium">'+f.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase();})+(isModified ? ' <span class="text-yellow-600">*</span>' : '')+'</td>';
        years.forEach(function(y) {
            var val = data[y] && data[y][f] ? data[y][f] : '';
            var isDup = data[y] && data[y]._is_duplicate;
            if (editMode) {
                html += '<td class="px-3 py-2 text-right '+(isDup ? 'bg-red-50' : '')+'"><input type="number" class="w-28 border rounded px-2 py-1 text-right text-sm" value="'+val+'" onchange="updateHLExtractedValue(\''+category+'\',\''+y+'\',\''+f+'\',this.value)"></td>';
            } else {
                var negClass = (val && val < 0) ? ' text-red-600' : '';
                html += '<td class="px-3 py-2 text-right '+(isDup ? 'bg-red-50 text-red-700' : '')+negClass+'">'+(val ? formatCurrency(val) : '-')+'</td>';
            }
        });
        html += '<td class="px-3 py-2 text-xs text-gray-500">'+title+'</td>';
        html += '</tr>';
    });
    
    html += '</tbody></table></div></div></div>';
    return html;
}

// Section 2: Masters Used in Decision
function renderHumanLoopMastersSection() {
    var html = '<div class="space-y-6">';
    var masters = state.humanLoopMasters;
    
    if (!masters) {
        html += '<div class="text-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-axis-primary mx-auto"></div><p class="mt-2 text-gray-500">Loading masters configuration...</p></div>';
        return html + '</div>';
    }
    
    // Section header
    html += '<div class="mb-4">';
    html += '<h3 class="text-lg font-semibold text-gray-900">Masters Configuration Used</h3>';
    html += '<p class="text-sm text-gray-500">These master values were applied to this assessment. Changes to masters affect future assessments.</p>';
    html += '</div>';
    
    // Policy Rules
    if (masters.policy_rules && masters.policy_rules.length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-purple-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_policy_rules\')">';
        html += '<span class="font-medium text-purple-900">Policy Rules ('+masters.policy_rules.length+' rules)</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_policy_rules" class="p-4">';
        html += '<div class="overflow-x-auto"><table class="w-full text-sm">';
        html += '<thead><tr class="bg-gray-100"><th class="px-3 py-2 text-left">Parameter</th><th class="px-3 py-2 text-left">Clause</th><th class="px-3 py-2 text-center">Operator</th><th class="px-3 py-2 text-right">Threshold</th><th class="px-3 py-2 text-center">Severity</th></tr></thead><tbody>';
        masters.policy_rules.slice(0, 15).forEach(function(rule) {
            var severityClass = rule.severity === 'Critical' ? 'bg-red-100 text-red-700' : rule.severity === 'Warning' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700';
            html += '<tr class="border-b">';
            html += '<td class="px-3 py-2 font-medium">'+(rule.parameter || rule.rule_name)+'</td>';
            html += '<td class="px-3 py-2 text-gray-500">'+(rule.clause_ref || '-')+'</td>';

        });
        if (masters.policy_rules.length > 15) {
            html += '<tr class="bg-gray-50"><td colspan="5" class="px-3 py-2 text-center text-gray-500">... and '+(masters.policy_rules.length - 15)+' more rules</td></tr>';
        }
        html += '</tbody></table></div></div></div>';
    }
    
    // Scoring Weights
    if (masters.scoring_weights && masters.scoring_weights.length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-blue-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_scoring_weights\')">';

        html += '<div id="hl_scoring_weights" class="p-4">';

            html += '</div>';
        });
        html += '</div>';
        html += '<div class="mt-3 text-center text-sm text-gray-500">Total Score: '+totalWeight+' points</div>';
        html += '</div></div>';
    }
    
    // Scoring Grades
    if (masters.scoring_grades && masters.scoring_grades.length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-green-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_scoring_grades\')">';
        html += '<span class="font-medium text-green-900">Grade & Decision Mapping</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_scoring_grades" class="p-4">';
        html += '<div class="grid grid-cols-6 gap-3">';
        masters.scoring_grades.forEach(function(g) {
            var bgClass = g.decision && g.decision.includes('Approve') ? 'bg-green-100 border-green-300' : g.decision && g.decision.includes('Decline') ? 'bg-red-100 border-red-300' : 'bg-yellow-100 border-yellow-300';
            html += '<div class="text-center p-3 rounded-lg border '+bgClass+'">';
            html += '<div class="text-xl font-bold">'+(g.grade || '-')+'</div>';
            html += '<div class="text-xs text-gray-600">'+(g.min_score||0)+'-'+(g.max_score||0)+'</div>';
            html += '<div class="text-xs font-medium mt-1">'+(g.decision || '-')+'</div>';
            html += '</div>';
        });
        html += '</div></div></div>';
    }
    
    // Limit Parameters
    if (masters.limit_params && masters.limit_params.length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-amber-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_limit_params\')">';

        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';

        html += '<div class="grid grid-cols-3 gap-4">';
        masters.limit_params.forEach(function(p) {

            html += '<div class="text-xs text-gray-500 uppercase">'+(p.param_name || p.param_code)+'</div>';
            html += '<div class="text-lg font-bold text-gray-900">'+(p.param_value || 0)+' '+(p.param_unit || '')+'</div>';

    html += '</div>';
    return html;
}

// Section 3: Calculations with Editable Inputs
function renderHumanLoopCalculationsSection(calc, data, editMode, isAdmin) {

        html += '<div class="text-center py-8 text-gray-500">No calculation data available</div>';

        var decisionClass = cs.decision && cs.decision.includes('APPROVE') ? 'bg-green-50 text-green-800 border-green-200' : cs.decision && cs.decision.includes('REJECT') ? 'bg-red-50 text-red-800 border-red-200' : 'bg-yellow-50 text-yellow-800 border-yellow-200';
        html += '<div class="p-3 rounded-lg border '+decisionClass+' mb-4">';
        html += '<div class="font-bold">'+(cs.decision || 'Pending')+'</div>';

        if (cs.components) {

                    html += '<div class="mt-2 text-xs space-y-1">';
                    comp.breakdown.forEach(function(b) {

                    html += '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
        }
        html += '</div></div>';
    }
    
    // Financial Ratios with formula transparency
    var categories = [
        {key: 'liquidity', name: 'Liquidity Ratios', icon: ''},
        {key: 'leverage', name: 'Leverage & Coverage', icon: ''},
        {key: 'profitability', name: 'Profitability Ratios', icon: ''},
        {key: 'efficiency', name: 'Efficiency Ratios', icon: ''},
        {key: 'growth', name: 'Growth Metrics', icon: ''}
    ];
    
    categories.forEach(function(cat) {
        var ratios = calc[cat.key];
        if (!ratios) return;
        
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-gray-50 px-4 py-3 border-b flex items-center justify-between cursor-pointer" onclick="toggleHLSection(\'hl_calc_'+cat.key+'\')">';
        html += '<span class="font-medium">'+cat.icon+' '+cat.name+'</span>';
        html += '<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
        html += '</div>';
        html += '<div id="hl_calc_'+cat.key+'" class="divide-y divide-gray-200">';
        
        Object.values(ratios).forEach(function(r) {
            if (!r || !r.name) return;
            var statusClass = r.status === 'pass' ? 'bg-green-100 text-green-700' : r.status === 'fail' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
            var statusIcon = r.status === 'pass' ? '✓' : r.status === 'fail' ? '✗' : '!';

            html += '<div class="flex items-center justify-between mb-2">';

            html += '<div class="flex items-center gap-2">';
            html += '<span class="text-xl font-bold text-axis-primary">'+(r.result_display || r.result || '-')+'</span>';
            html += '<span class="px-2 py-0.5 text-xs rounded '+statusClass+'">'+statusIcon+'</span>';
            html += '</div></div>';
            
            // Formula
            html += '<div class="bg-gray-100 rounded px-3 py-2 mb-2 text-sm">';
            html += '<span class="text-gray-500">Formula:</span> <span class="font-mono">'+(r.formula || '-')+'</span>';
            html += '</div>';
            
            // Input Values (editable in edit mode)
            if (r.numerator && r.denominator) {
                html += '<div class="bg-yellow-50 rounded px-3 py-2 mb-2 text-sm">';
                html += '<span class="text-yellow-600">Values:</span> ';
                if (editMode) {
                    html += '<input type="text" class="border rounded px-2 py-0.5 w-24 text-sm" value="'+(r.numerator.value || 0)+'" disabled title="Edit in Extracted Parameters section"> ÷ ';
                    html += '<input type="text" class="border rounded px-2 py-0.5 w-24 text-sm" value="'+(r.denominator.value || 0)+'" disabled title="Edit in Extracted Parameters section">';
                } else {
                    html += '<span class="font-mono">'+(r.numerator.formatted || r.numerator.value || '-')+' ÷ '+(r.denominator.formatted || r.denominator.value || '-')+'</span>';
                }
                html += '</div>';
            }
            
            // Policy Norm (from Masters)
            html += '<div class="flex items-center justify-between text-sm">';
            html += '<span class="text-gray-500">Policy Norm: <span class="font-medium">'+(r.policy_norm || '-')+'</span> <span class="text-xs text-gray-400">(from Masters)</span></span>';
            if (r.clause_ref) html += '<span class="text-gray-400">Clause: '+r.clause_ref+'</span>';
            html += '</div>';
            
            html += '</div>';
        });
        
        html += '</div></div>';
    });
    
    html += '</div>';
    return html;
}

// Section 4: Final Decision Summary
function renderHumanLoopDecisionSection(fa, calc) {
    var html = '<div class="space-y-6">';
    
    var cs = calc?.credit_score || {};
    var limits = fa?.recommended_limits || {};
    
    // Decision Banner
    var decision = cs.decision || fa?.decision || 'Pending';
    var isApprove = decision.includes('APPROVE');
    var isReject = decision.includes('REJECT') || decision.includes('DECLINE');
    var bannerClass = isApprove ? 'bg-green-50 border-green-300' : isReject ? 'bg-red-50 border-red-300' : 'bg-yellow-50 border-yellow-300';
    var textClass = isApprove ? 'text-green-800' : isReject ? 'text-red-800' : 'text-yellow-800';
    
    html += '<div class="'+bannerClass+' border-2 rounded-lg p-6 text-center">';
    html += '<div class="text-3xl font-bold '+textClass+'">'+decision+'</div>';
    html += '<div class="text-lg mt-2">Credit Score: <span class="font-bold">'+(cs.total || 0)+'/'+(cs.max || 100)+'</span> | Grade: <span class="font-bold">'+(cs.grade || '-')+'</span></div>';
    html += '</div>';
    
    // Recommended Limits
    if (limits && Object.keys(limits).length > 0) {
        html += '<div class="border border-gray-200 rounded-lg overflow-hidden">';
        html += '<div class="bg-gray-50 px-4 py-3 border-b"><span class="font-medium">Recommended Limits</span></div>';
        html += '<div class="p-4 grid grid-cols-3 gap-4">';
        
        ['working_capital', 'term_loan', 'overdraft'].forEach(function(key) {
            var lim = limits[key];
            if (!lim) return;
            var bgClass = key === 'working_capital' ? 'bg-axis-bg' : key === 'term_loan' ? 'bg-green-50' : 'bg-purple-50';
            html += '<div class="'+bgClass+' rounded-lg p-4 text-center">';
            html += '<div class="text-xs text-gray-500 uppercase">'+(lim.name || key.replace(/_/g, ' '))+'</div>';
            html += '<div class="text-2xl font-bold text-gray-900 mt-1">'+(lim.formatted || '₹0')+'</div>';
            html += '<div class="text-xs text-gray-400 mt-1">'+(lim.method || '')+'</div>';
            html += '</div>';
        });
        
        html += '</div>';
        if (limits.total) {
            html += '<div class="px-4 py-3 bg-gray-50 border-t flex justify-between items-center">';
            html += '<span class="font-medium">Total Recommended Exposure</span>';
            html += '<span class="text-2xl font-bold text-axis-primary">'+(limits.total.formatted || '₹0')+'</span>';
            html += '</div>';
        }
        html += '</div>';
    }
    
    // Key Metrics Summary
    html += '<div class="grid grid-cols-4 gap-4">';
    var keyMetrics = [
        {label: 'Current Ratio', value: calc?.liquidity?.current_ratio?.result_display || '-', status: calc?.liquidity?.current_ratio?.status},
        {label: 'DSCR', value: calc?.leverage?.dscr?.result_display || '-', status: calc?.leverage?.dscr?.status},
        {label: 'Net Profit Margin', value: calc?.profitability?.net_profit_margin?.result_display || '-', status: calc?.profitability?.net_profit_margin?.status},
        {label: 'Debt/Equity', value: calc?.leverage?.debt_equity?.result_display || '-', status: calc?.leverage?.debt_equity?.status}
    ];
    keyMetrics.forEach(function(m) {
        var statusClass = m.status === 'pass' ? 'border-green-300 bg-green-50' : m.status === 'fail' ? 'border-red-300 bg-red-50' : 'border-gray-200';
        html += '<div class="border rounded-lg p-3 text-center '+statusClass+'">';
        html += '<div class="text-xs text-gray-500 uppercase">'+m.label+'</div>';
        html += '<div class="text-xl font-bold mt-1">'+m.value+'</div>';
        html += '</div>';
    });
    html += '</div>';
    
    html += '</div>';
    return html;
}

// Resubmit Panel

    var html = '<div class="bg-yellow-50 border-2 border-yellow-400 rounded-lg p-4 mb-6 shadow-md">';
    html += '<div class="flex items-center justify-between flex-wrap gap-4">';
    html += '<div class="flex items-center gap-3">';

    html += '<button onclick="resubmitHumanLoop()" class="px-5 py-2 bg-axis-primary text-white rounded-lg text-sm hover:bg-axis-dark flex items-center gap-2 font-semibold shadow-sm"'+((state.humanLoopReprocessing || state.humanLoopSaving) ? ' disabled' : '')+'>';
    if (state.humanLoopReprocessing) {
        html += '<span class="animate-spin">⟳</span> Processing...';
    } else {
        html += '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Resubmit for Processing';
    }
    html += '</button>';
    html += '</div></div>';
    
    // List of changes
    if (state.auditTrail.length > 0) {
        html += '<div class="mt-3 border-t border-yellow-200 pt-3">';
        html += '<div class="text-xs text-yellow-600 uppercase mb-2">Changes Summary:</div>';
        html += '<div class="space-y-1 text-sm max-h-32 overflow-y-auto">';
        state.auditTrail.forEach(function(change) {
            html += '<div class="flex items-center gap-2">';
            html += '<span class="text-yellow-600">•</span>';
            html += '<span class="font-medium">'+change.fieldKey+':</span>';
            html += '<span class="text-gray-500 line-through">'+formatAuditValue(change.oldValue)+'</span>';
            html += '<span>→</span>';
            html += '<span class="text-green-700 font-medium">'+formatAuditValue(change.newValue)+'</span>';

        });
        html += '</div></div>';
    }
    
    html += '</div>';
    return html;
}

function formatAuditValue(val) {
    if (val === null || val === undefined || val === '') return '-';
    if (typeof val === 'number' && Math.abs(val) > 1000) return formatCurrency(val);
    return val;
}
