    if (!menu) return;
    
    // Close all other menus first
    closeAllActionMenus();
    
    // Toggle this menu
    menu.classList.toggle('hidden');
    
    // Add click outside listener to close menu
    if (!menu.classList.contains('hidden')) {
        setTimeout(function() {
            document.addEventListener('click', closeMenuOnClickOutside);
        }, 10);
    }
};

window.closeAllActionMenus = function() {
    document.querySelectorAll('.action-menu').forEach(function(menu) {
        menu.classList.add('hidden');
    });
    document.removeEventListener('click', closeMenuOnClickOutside);
};

function closeMenuOnClickOutside(e) {
    if (!e.target.closest('.action-menu-container')) {
        closeAllActionMenus();
    }
}

window.openCase=async function(id){
    var c=casesList.find(function(x){return x.id===id;});
    if(!c) return;
    
    // Check if case is Processing or Queued - show Agent Pipeline with background mode
    var statusUpper = (c.status || '').toUpperCase();
    if(statusUpper === 'PROCESSING' || statusUpper === 'QUEUED') {
        state.assessmentId = id;
        state.app = {name: c.company};
        state.backgroundProcessing = true;
        state.processingMode = 'server';
        state.uploadData = state.uploadData || {};
        state.uploadData.companyName = c.company;
        
        // Initialize actualProcessingState for background viewing mode
        // Reset progress to show server-reported progress accurately
        state.currentProgress = c.progress || 0;
        state.currentCommentary = '';
        state.actualProcessingState = {
            agents: buildDefaultAgentsForBackgroundView(),
            currentAgent: 0,
            currentTask: 0,
            startTime: c.startedAt ? new Date(c.startedAt).getTime() : Date.now(),
            phase: statusUpper === 'QUEUED' ? 'queued' : 'processing',
            error: null,
            extractedData: {},
            activeTab: 'visual',
            apiLogs: [],
            rateLimits: { requests: { remaining: '?', limit: '?' }, tokens: { remaining: '?', limit: '?' }, usagePercent: 0 },
            apiStats: { calls: 0, tokensSent: 0, tokensReceived: 0 },
            docCount: c.documentCount || 0,
            docProgress: c.progress || 0
        };
        state.progressData = {
            status: statusUpper.toLowerCase(),
            progress: c.progress || 0,
            phase: statusUpper === 'QUEUED' ? 'queued' : 'processing',
            commentary: statusUpper === 'QUEUED' ? 'Waiting in queue...' : 'Processing in background...',
            docsCount: c.documentCount || 0
        };
        
        state.screen = 'actualProcessing'; // Show Agent Pipeline screen
        subscribeToAssessment(id);
        startProgressPolling(id);
        render();
        return;
    }
    
    // Check if case is "created" - shouldn't be viewable yet
    if(statusUpper === 'CREATED') {
        alert('This assessment is still being set up. Please wait for processing to begin.');
        return;
    }
    
    // Allow opening ALL cases - even Pending ones (may show partial data)
    // Force refresh from S3 to get latest data
    var fullData = await loadFullAssessment(id, true);
    
    // Ensure all_extracted_data is available (fix for Issue 2 & 4)
    if(fullData && fullData.extracted_data && !fullData.all_extracted_data) {
        fullData.all_extracted_data = fullData.extracted_data;
    }
    
    state.selectedCase=c;
    state.fullAssessment=fullData;
    state.mappingReport=null;
    state.app={name:c.company};
    
    // Normalize status for decision display (case-insensitive)
    var statusUpper = (c.status || '').toUpperCase();
    var decision = statusUpper.indexOf('APPROVED') >= 0 ? 'APPROVED' : 
                   statusUpper.indexOf('REJECT') >= 0 ? 'REJECTED' : 
                   statusUpper.indexOf('PENDING') >= 0 ? 'PENDING' : 'PARTIAL APPROVAL';
    
    state.results={
        decision: decision,
        grade: c.grade || fullData?.credit_score?.grade || 'N/A',
        score: c.score || fullData?.credit_score?.total || 0,
        breakdown: fullData?.credit_score?.components || null
    };
    state.isActualData=c.type==='actual';
    state.isProductDemo=false;
    state.viewMode=c.type==='actual'?'actual':'demo';
    state.actualAssessmentData=fullData ? {
        extractedData: fullData.extracted_data || fullData.all_extracted_data,
        calculatedData: fullData.calculations,
        creditScore: fullData.credit_score,
        policyCompliance: fullData.policy_compliance,
        recommendedLimits: fullData.recommended_limits
    } : null;
    state.auditTrail = [];
    state.extractedDataEditMode = false;
    state.resultsTab='decision';
    state.screen='results';
    state.chat=[];
    render();
};

window.deleteCase=async function(id, company){
    // Only superadmin can delete
    if(!state.currentUser || state.currentUser.role !== 'super_admin'){
        alert('Only Super Admin can delete assessments.');
        return;
    }
    
    // Confirm deletion
    if(!confirm('Are you sure you want to permanently delete this assessment?\n\nCase ID: ' + id + '\nCompany: ' + company + '\n\nThis action cannot be undone!')){
        return;
    }
    
    try {
        var response = await fetch('/api/assessment/' + id, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if(!response.ok){
            var error = await response.json();
            throw new Error(error.error || 'Failed to delete assessment');
        }
        
        var result = await response.json();
        
        // Remove from local casesList
        casesList = casesList.filter(function(c){ return c.id !== id; });
        
        // Show success message
        alert('Assessment deleted successfully!\n\n' + result.message);
        
        // Re-render dashboard
        render();
        
    } catch(err){
        console.error('Delete error:', err);
        alert('Failed to delete assessment: ' + err.message);
    }
};

function openSystemStatus(){
    console.log('Opening system status...');
    // Show modal immediately with loading state
    state.systemStatus = { loading: true };
    state.showSystemStatusModal = true;
    render();
    
    // Then fetch actual status
    refreshSystemStatus();
}

function refreshSystemStatus(){
    fetch('/api/processing/status', {credentials: 'include'})
        .then(function(res) { return res.json(); })
        .then(function(data) {
            state.systemStatus = data;
            state.systemStatus.loading = false;
            render();
        })
        .catch(function(err) {
            console.error('Failed to load system status:', err);
            state.systemStatus = {
                loading: false,
                serverSideAvailable: false,
                socketConnected: socket && socket.connected,
                claudeReady: false,
                redisConfigured: false,
                mode: 'client',
                queueStats: {waiting: 0, active: 0, completed: 0, failed: 0},
                error: err.message
            };
            render();
        });
}

function closeSystemStatus(event){
    if(!event || event.target === event.currentTarget){
        state.showSystemStatusModal = false;
        render();
    }
}

// Clear all waiting jobs from the queue (Super Admin only)
async function clearJobQueue() {
    if (!confirm('Are you sure you want to clear all waiting jobs from the queue?\n\nThis will:\n• Remove all waiting jobs\n• Clear active job tracking\n\nCurrently processing jobs will continue until they complete or fail.')) {
        return;
    }
    
    try {
        const response = await fetch('/api/admin/clear-job-queue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Queue cleared successfully!\n\nBefore: ' + data.before.queued + ' queued, ' + data.before.processing + ' processing\nAfter: Queue is now empty');
            refreshSystemStatus();
            loadCases();
        } else {
            alert('Failed to clear queue: ' + (data.error || 'Unknown error'));
        }
    } catch (err) {
        console.error('Error clearing queue:', err);
        alert('Error clearing queue: ' + err.message);
    }
}
window.clearJobQueue = clearJobQueue;

function addNewUser(){
    var emailInput = document.getElementById('newUserEmail');
    var roleSelect = document.getElementById('newUserRole');
    
    var email = emailInput.value.trim().toLowerCase();  // Normalize to lowercase
    var role = roleSelect.value;
    
    if(!email){
        alert('Please enter an email address');
        return;
    }
    
    // Accept any alphanumeric ID (no '@') or an @axisfinance.in email.
    // AFL uses multiple ID formats: AFL2631, tp000061282, 445114, etc.
    const isEmpId = !email.includes('@') && /^[a-z0-9]{3,}$/i.test(email);
    const isAllowedEmail = email.includes('@') && 
        (['@axisfinance.in'].some(d => email.toLowerCase().endsWith(d)));
    if (!isEmpId && !isAllowedEmail) {
        alert('Enter a valid Employee ID (e.g. AFL2349, tp000061282, 445114) or an email from @axisfinance.in');
        return;
    }
    
    if(!role){
        alert('Please select a role');
        return;
    }
    
    console.log('Adding user:', email, role);
    
    fetch('/api/users', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email: email, role: role })
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert('Error: ' + data.error);
            return;
        }
        console.log('User added successfully');
        emailInput.value = '';
        roleSelect.value = '';
        // Reload users
        openUserManagement();
    })
    .catch(err => {
        console.error('Failed to add user:', err);
        alert('Failed to add user. Please try again.');
    });
}

function deleteUser(email){
    if(!confirm('Are you sure you want to delete user: ' + email + '?')){
        return;
    }
    
    console.log('Deleting user:', email);
    
    fetch('/api/users/' + encodeURIComponent(email), {
        method: 'DELETE',
        credentials: 'include'
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert('Error: ' + data.error);
            return;
        }
        console.log('User deleted successfully');
        // Reload users
        openUserManagement();
    })
    .catch(err => {
        console.error('Failed to delete user:', err);
        alert('Failed to delete user. Please try again.');
    });
}

    if(!state.mappingReport){
        fetch('/api/assessment/'+assessmentId+'/mapping-report')
            .then(res => {
                // Check content type to avoid JSON parse errors

                if(!res.ok) {

                        throw new Error('Server timeout - processing may still be in progress. Please wait and retry.');

    // Summary statistics
    var totalDecisionParams = 0;

        });

    html += '</div>';
    html += '</div>';
    
    html += '</div></div>';
    return html;
}

// Helper function to check if fields are extracted
function checkFieldsExtracted(data, fields) {
    if (!data || !fields || fields.length === 0) return false;
    
    var found = 0;
    fields.forEach(function(field) {
        // Check in various locations
        if (findFieldValue(data, field) !== null) found++;
    });
    
    // Return true if at least half of the fields are found
    return found >= Math.ceil(fields.length / 2);
}

function findFieldValue(data, field) {
    if (!data) return null;
    
    // Direct match
    if (data[field] !== undefined && data[field] !== null && data[field] !== '') return data[field];
    
    // Check in balance_sheet (latest year)
    if (data.balance_sheet) {
        var years = Object.keys(data.balance_sheet).sort().reverse();
        for (var i = 0; i < years.length; i++) {
            var yr = years[i];
            if (data.balance_sheet[yr] && data.balance_sheet[yr][field] !== undefined) {
                return data.balance_sheet[yr][field];
            }
        }
    }
    
    // Check in profit_and_loss (latest year)
    if (data.profit_and_loss) {
        var years = Object.keys(data.profit_and_loss).sort().reverse();
        for (var i = 0; i < years.length; i++) {
            var yr = years[i];
            if (data.profit_and_loss[yr] && data.profit_and_loss[yr][field] !== undefined) {
                return data.profit_and_loss[yr][field];
            }
        }
    }
    
    // Check in company_info
    if (data.company_info && data.company_info[field] !== undefined) {
        return data.company_info[field];
    }
    
    // Check in bank_aggregated
    if (data.bank_aggregated && data.bank_aggregated[field] !== undefined) {
        return data.bank_aggregated[field];
    }
    
    // Check in gst_aggregated
    if (data.gst_aggregated && data.gst_aggregated[field] !== undefined) {
        return data.gst_aggregated[field];
    }
    
    return null;
}

function renderCategoryParameters(category) {
    var html = '<div class="space-y-2">';
    
    // Fetch comprehensive schema if not already loaded
    if (!window.comprehensiveSchema) {
        // Show loading while schema loads
        html += '<div id="schemaLoadingContainer" class="text-center py-8">';
        html += '<div class="spinner mx-auto mb-4"></div>';
        html += '<div class="text-gray-600">Loading parameter schema...</div>';
        html += '</div>';
        html += '</div>';
        
        // Load it asynchronously from API
        fetch('/api/parameters-schema')
            .then(function(res) { 
                if (!res.ok) throw new Error('Failed to load schema');
                return res.json(); 
            })
            .then(function(schema) {
                window.comprehensiveSchema = schema;
                // Re-render just the parameters section
                var cat = state.mappingReport.categories.find(function(c) { return c.id === state.selectedCategoryId; });
                if (cat) {
                    var container = document.getElementById('schemaLoadingContainer');
                    if (container && container.parentElement) {
                        container.parentElement.innerHTML = renderCategoryParameters(cat);
                    }
                }
            })
            .catch(function(err) {
                console.error('Schema loading error:', err);
                var container = document.getElementById('schemaLoadingContainer');
                if (container) {
                    container.innerHTML = '<div class="text-center py-8 text-red-600">Error loading schema: ' + err.message + '</div>';
                }
            });
        
        return html;
    }
    
    var schema = window.comprehensiveSchema;
    var allParams = [];
    
    // Get extracted data from multiple sources
    var extractedData = {};
    // Source 1: mapping report
    if (state.mappingReport && state.mappingReport.all_extracted_data) {
        extractedData = state.mappingReport.all_extracted_data;
    }
    // Source 2: fullAssessment.extracted_data (fallback/merge)
    if (state.fullAssessment && state.fullAssessment.extracted_data) {
        var faData = state.fullAssessment.extracted_data;
        // Merge - prefer mappingReport but fill in missing from fullAssessment
        Object.keys(faData).forEach(function(key) {
            if (!extractedData[key] || (typeof extractedData[key] === 'object' && Object.keys(extractedData[key]).length === 0)) {
                extractedData[key] = faData[key];
            }
        });
    }
    // Source 3: state.extractedData (another fallback)
    if (state.extractedData && Object.keys(extractedData).length === 0) {
        extractedData = state.extractedData;
    }
    
    // Find category in schema - try exact match first, then try aliases
    var categoryId = category.id;
    var schemaCategory = schema.categories.find(function(c) { return c.id === categoryId; });
    
    // Try common aliases if not found
    if (!schemaCategory) {
        var aliases = {
            'document_upload_metadata': 'document_metadata',
            'company_master': 'company_master_data',
            'basic_details': 'company_master'

        if (aliases[categoryId]) {
            schemaCategory = schema.categories.find(function(c) { return c.id === aliases[categoryId]; });
        }
    }
    
    if (schemaCategory) {
        // Build list of all parameters for this category
        // Each category has a different data structure - handle them specifically

                    schemaCategory.years.forEach(function(year) {
                        var yearData = subData[year] || {};

                            name: field.label + ' (' + year.toUpperCase() + ')',

                            required: field.required

                                required: field.required

            var hasCibilData = assessment.cibil_score || extractedData.cibil || assessment.credit_score;

                        if (fieldId.includes('gst')) {

                        else if (fieldId.includes('cibil')) {
                            // CIBIL is always available in demo/production
                            value = 'Connected';
                        }
                        // Banking related
                        else if (fieldId.includes('bank')) {
                            value = hasBankData ? 'Connected' : null;
                        }
                        // MCA related
                        else if (fieldId.includes('mca')) {
                            value = hasCompanyInfo ? 'Connected' : null;
                        }
                        // PAN related
                        else if (fieldId.includes('pan')) {
                            value = hasPanData ? 'Verified' : (hasKycData ? 'Pending' : null);

                        else if (fieldId.includes('aadhaar')) {
                            value = (extractedData.kyc?.director_aadhaar || hasKycData) ? 'Verified' : null;

                        else if (fieldId.includes('verification') || fieldId.includes('verified') || fieldId.includes('connected')) {

        } else if (schemaCategory.subcategories) {
            // Generic fallback for categories with subcategories
            schemaCategory.subcategories.forEach(function(sub) {
                if (sub.fields) {
                    sub.fields.forEach(function(field) {
                        var value = extractedData[field.id];
                        allParams.push({
                            name: field.label,
                            value: value,
                            hasValue: value !== null && value !== undefined && value !== '' && value !== 'N/A',
                            required: field.required
                        });
                    });
                }
            });
        }
    }
    
    // If no schema found OR schema didn't provide enough fields, try extracted data with smart names
    if (allParams.length < category.total) {
        // Get all keys from extracted data and add any not already in allParams
        Object.keys(extractedData).forEach(function(key) {
            // Check if this key is already in allParams by checking if value exists
            var alreadyAdded = allParams.some(function(p) {
                return p.value === extractedData[key] && p.hasValue;
            });
            
            if (!alreadyAdded && allParams.length < category.total) {
                var value = extractedData[key];
                // Make smart name from key
                var smartName = key
                    .replace(/_/g, ' ')
                    .replace(/\b\w/g, function(l) { return l.toUpperCase(); })
                    .replace(/^Document Upload Metadata /, ''); // Remove category prefix if present
                
                allParams.push({
                    name: smartName,
                    value: value,
                    hasValue: value !== null && value !== undefined && value !== '' && value !== 'N/A'
                });
            }
        });
    }
    
    // Only if STILL not enough, add placeholders with smart names
    while (allParams.length < category.total) {
        var paramNum = allParams.length + 1;
        var smartPlaceholder = category.name.replace(' Data', '').replace(' Metadata', '') + ' Field ' + paramNum;
        allParams.push({
            name: smartPlaceholder,
            value: null,
            hasValue: false
        });
    }
    
    // Show all parameters
    var extractedCount = 0;
    var missingCount = 0;
    
    allParams.forEach(function(param) {
        if (param.hasValue) {
            extractedCount++;
            // Format the value for display
            var displayValue = param.value;
            if (typeof displayValue === 'number') {
                displayValue = formatCurrency(displayValue);
            } else if (displayValue && !isNaN(parseFloat(displayValue))) {
                displayValue = formatCurrency(parseFloat(displayValue));
            }
            // Green for extracted - HIGHLIGHTED
            html += '<div class="flex items-start gap-3 p-3 bg-green-100 border-l-4 border-green-600 rounded shadow-sm">';
            html += '<div class="text-green-700 font-bold text-lg mt-0.5 flex-shrink-0">✓</div>';
            html += '<div class="flex-1 min-w-0">';
            html += '<div class="font-semibold text-gray-900 break-words">' + param.name + '</div>';
            html += '<div class="text-sm text-green-800 font-medium break-all mt-1">' + displayValue + '</div>';
            html += '</div>';
            html += '</div>';
        } else {
            missingCount++;
            // Red for missing - HIGHLIGHTED
            html += '<div class="flex items-start gap-3 p-3 bg-red-100 border-l-4 border-red-600 rounded shadow-sm">';
            html += '<div class="text-red-600 font-bold text-lg mt-0.5 flex-shrink-0">-</div>';
            html += '<div class="flex-1">';
            html += '<div class="font-semibold text-gray-900 break-words">' + param.name + '</div>';
            html += '<div class="text-sm text-red-700 font-bold mt-1">[No Data]</div>';
            html += '</div>';
            html += '</div>';
        }
    });
    
    html += '</div>';
    
    return html;
}

function genResp(q){
    var ql=q.toLowerCase();
    var fa = state.fullAssessment;
    var calc = fa?.calculations;
    var limits = fa?.recommended_limits;
    var cs = fa?.credit_score || calc?.credit_score;
    var score = state.results?.score || cs?.total || 0;
    var grade = state.results?.grade || cs?.grade || 'N/A';
    var decision = state.results?.decision || cs?.decision || 'Pending';
    var company = state.selectedCase?.company || state.app?.name || 'Company';
    
    // LIMIT CALCULATIONS - ACTUAL DATA
    if(ql.indexOf('limit')>=0||ql.indexOf('calculation')>=0){
        if(!limits) return 'No limit calculation data available for this assessment.';
        
        var html = '<strong>Limit Calculation Methodology:</strong><br><br>';
        
        if(limits.working_capital){
            var wc = limits.working_capital;
            html += '<u>Working Capital (' + (wc.formatted || wc.amount || 'N/A') + ')</u><br>';
            html += 'Method: ' + (wc.methodology || wc.method || 'N/A') + '<br>';
            if(wc.calculation) html += wc.calculation + '<br>';
            html += '<br>';
        }
        
        if(limits.term_loan){
            var tl = limits.term_loan;
            html += '<u>Term Loan (' + (tl.formatted || tl.amount || 'N/A') + ')</u><br>';
            html += 'Method: ' + (tl.methodology || tl.method || 'N/A') + '<br>';
            if(tl.calculation) html += tl.calculation + '<br>';
            html += '<br>';
        }
        
        if(limits.overdraft){
            var od = limits.overdraft;
            html += '<u>Overdraft (' + (od.formatted || od.amount || 'N/A') + ')</u><br>';
            html += 'Method: ' + (od.methodology || od.method || 'N/A') + '<br>';
            if(od.calculation) html += od.calculation + '<br>';
        }
        
        return html || 'Limit calculation details not available.';
    }
    
    // APPROVAL RATIONALE - ACTUAL DATA
    if(ql.indexOf('why')>=0||ql.indexOf('approved')>=0||ql.indexOf('rejected')>=0){
        var html = '<strong>Decision Rationale:</strong><br><br>';
        html += 'The application scored <strong>' + score + '/100 (Grade ' + grade + ')</strong><br><br>';
        
        if(cs && cs.components){
            html += '<strong>Score Breakdown:</strong><br>';
            var comps = cs.components;
            if(comps.financial_strength) html += '- Financial Strength: ' + comps.financial_strength.score + '/' + comps.financial_strength.max + '<br>';
            if(comps.banking_conduct) html += '- Banking Conduct: ' + comps.banking_conduct.score + '/' + comps.banking_conduct.max + '<br>';
            if(comps.credit_history) html += '- Credit History: ' + comps.credit_history.score + '/' + comps.credit_history.max + '<br>';
            if(comps.business_stability) html += '- Business Stability: ' + comps.business_stability.score + '/' + comps.business_stability.max + '<br>';
            if(comps.security_coverage) html += '- Security Coverage: ' + comps.security_coverage.score + '/' + comps.security_coverage.max + '<br>';
            html += '<br>';
        }
        
        if(cs && cs.note) html += '<em>' + cs.note + '</em><br>';
        
        return html;
    }
    
    // RISK ASSESSMENT - ACTUAL DATA
    if(ql.indexOf('risk')>=0){
        var html = '<strong>Risk Assessment:</strong><br><br>';
        html += '<u>Risk Category:</u> ' + (fa?.risk_rating || 'Not Available') + '<br><br>';
        
        if(cs && cs.components){
            html += '<strong>Strengths:</strong><br>';
            var comps = cs.components;
            if(comps.financial_strength && comps.financial_strength.score >= comps.financial_strength.max * 0.8) {
                html += '- Strong financial position<br>';
            }
            if(comps.credit_history && comps.credit_history.score >= comps.credit_history.max * 0.8) {
                html += '- Clean credit history<br>';
            }
            if(comps.banking_conduct && comps.banking_conduct.score >= comps.banking_conduct.max * 0.8) {
                html += '- Excellent banking conduct<br>';
            }
            if(comps.business_stability && comps.business_stability.score >= comps.business_stability.max * 0.7) {
                html += '- Stable business operations<br>';
            }
            if(comps.security_coverage && comps.security_coverage.score >= comps.security_coverage.max * 0.7) {
                html += '- Adequate collateral coverage<br>';
            }
            html += '<br>';
            
            html += '<strong>Watch Points:</strong><br>';
            if(comps.credit_history && comps.credit_history.score < comps.credit_history.max * 0.5) {
                html += '- Limited credit history or bureau issues<br>';
            }
            if(comps.financial_strength && comps.financial_strength.score < comps.financial_strength.max * 0.6) {
                html += '- Financial metrics below expected levels<br>';
            }
            if(comps.security_coverage && comps.security_coverage.score < comps.security_coverage.max * 0.5) {
                html += '- Insufficient collateral coverage<br>';
            }
        }
        
        return html || 'Risk assessment details not available.';
    }
    
    // FINANCIAL COVENANTS - ACTUAL DATA
    if(ql.indexOf('covenant')>=0||ql.indexOf('term')>=0||ql.indexOf('condition')>=0){
        var html = '<strong>Financial Covenants:</strong><br><br>';
        
        var policy = fa?.policy_compliance;
        if(policy && policy.length > 0){
            policy.forEach(function(p){
                var status = p.status === 'pass' || p.status === 'Pass' ? '✓' : '✗';
                html += status + ' ' + p.parameter + ': ' + p.policy_norm + ' (Actual: ' + p.actual + ')<br>';
            });
        } else {
            html += 'No policy compliance data available.';
        }
        
        return html;
    }
    
    // DECISION SUMMARY - ACTUAL DATA
    if(ql.indexOf('summar')>=0||ql.indexOf('decision')>=0||ql.indexOf('overview')>=0){
        var html = '<strong>Underwriting Summary</strong><br><br>';
        html += 'Applicant: <strong>' + company + '</strong><br>';
        
        if(fa?.extracted_data?.profit_and_loss?.fy25?.revenue){
            var rev = fa.extracted_data.profit_and_loss.fy25.revenue;
            html += 'Turnover: Rs ' + (rev / 10000000).toFixed(2) + ' Cr<br>';
        }
        
        if(fa?.company_info?.vintage_years){
            html += 'Vintage: ' + fa.company_info.vintage_years + ' Years<br>';
        }
        
        html += '<br><strong>DECISION: ' + decision + '</strong><br>';
        html += 'Grade: ' + grade + ' | Score: ' + score + '/100<br><br>';
        
        if(limits){
            html += '<strong>Limits Sanctioned:</strong><br>';
            if(limits.working_capital) html += '- WC Limit: ' + (limits.working_capital.formatted || limits.working_capital.amount) + '<br>';
            if(limits.term_loan) html += '- Term Loan: ' + (limits.term_loan.formatted || limits.term_loan.amount) + '<br>';
            if(limits.overdraft) html += '- Overdraft: ' + (limits.overdraft.formatted || limits.overdraft.amount) + '<br>';
            if(limits.total) html += '- <strong>Total: ' + (limits.total.formatted || limits.total) + '</strong><br>';
        }
        
        return html;
    }
    
    // POLICY REFERENCE
    if(ql.indexOf('policy')>=0){
        return '<strong>Credit Policy Reference:</strong><br><br>This assessment was conducted as per the Board-approved MSME Credit Policy.<br><br>Key policy sections applied:<br>- Section 2: Eligibility Criteria<br>- Section 3: Financial Parameters<br>- Section 4: Credit Bureau Norms<br>- Section 5: Banking Conduct<br>- Section 6: Collateral & Security<br>- Section 8: Approval Authority<br><br>Policy compliance details are available in the Decision tab.';
    }
    
    // DEFAULT HELP MENU
    return 'I can help explain any aspect of this underwriting decision:<br><br>- <strong>Limit Calculations</strong> - How WC/TL/OD limits were derived<br>- <strong>Approval Rationale</strong> - Why the application was approved/rejected<br>- <strong>Risk Assessment</strong> - Strengths and watch points<br>- <strong>Financial Covenants</strong> - Terms and conditions<br>- <strong>Decision Summary</strong> - Complete overview<br>- <strong>Policy Reference</strong> - Credit policy details<br><br>What would you like to know?';
}

function startProcessing(){
    delay(400).then(function(){
        var dT=[8,14,18,22,35,48,58,63,66,67],aT=[0,3,5,7,8,8,8,8,8,8],vT=[5,15,25,35,50,62,72,78,80,82],pT=[25,85,130,175,250,320,365,390,400,409];
        var i=0;
        function processAgent(){
            if(i>=agents.length){
                state.metrics={d:67,a:8,v:82,p:409};
                state.processedAt=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
                delay(500).then(function(){
                    // Different results based on demo type
                    if(state.isProductDemo){
                        state.results={decision:'APPROVE WITH CONDITIONS',grade:'B',score:72};
                    } else {
                        state.results={decision:'APPROVED',grade:'A+',score:98};
                    }
                    state.screen='results';render();
                });
                return;
            }
            state.step=i;var a=agents[i];render();
            state.logs.push({aid:a.id});
            var j=0;
            function processTask(){
                if(j>=a.tasks.length){i++;processAgent();return;}
                delay(a.dur/a.tasks.length).then(function(){
                    state.logs.push({aid:a.id});
                    state.metrics.d=dT[i];state.metrics.a=aT[i];state.metrics.v=vT[i];state.metrics.p=pT[i];
                    render();j++;processTask();
                });
            }
            processTask();
        }
        processAgent();
    });
}

function formatTime(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),ss=s%60,t=Math.floor((ms%1000)/100);return m+':'+ss.toString().padStart(2,'0')+'.'+t;}

function formatDate(dateStr){
    if(!dateStr) return '-';
    try {
        var d = new Date(dateStr);
        if(isNaN(d.getTime())) return '-';
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var day = d.getDate();
        var month = months[d.getMonth()];
        var year = d.getFullYear();
        var hours = d.getHours();
        var mins = d.getMinutes();
        var ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        return day + ' ' + month + ' ' + year + ', ' + hours + ':' + (mins < 10 ? '0' : '') + mins + ' ' + ampm;
    } catch(e) {
        return '-';
    }
}
function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}

// Fetch with timeout wrapper - prevents infinite waiting
function fetchWithTimeout(url, options, timeout) {
    timeout = timeout || 300000; // Default 5 minutes
    return Promise.race([
        fetch(url, options),
        new Promise(function(_, reject) {
            setTimeout(function() {
                reject(new Error('Request timed out after ' + Math.round(timeout/1000) + ' seconds. The server may be busy or the document is taking longer than expected to process.'));
            }, timeout);
        })
    ]);
}

function highlightTraceabilityTabs(){
    var tabs=['calculations','extracted','policy'];
    var delay=1300;
    tabs.forEach(function(tabName,idx){
        setTimeout(function(){
            var tabBtn=document.querySelector('.tab-btn[onclick*="'+tabName+'"]');
            if(tabBtn){
                tabBtn.classList.add('pulse-tab');
                setTimeout(function(){
                    tabBtn.classList.remove('pulse-tab');
                },delay-100);
            }
        },idx*delay);
    });
}

async function loadPolicyRules() {
    try {
        var response = await fetch('/api/policy/rules');
        var data = await response.json();
        state.policyRules = data.rules || [];
        state.policyMetadata = data.metadata || {};
        state.policyRulesLoaded = true;
        render();
    } catch(err) {
        console.error('Error loading policy rules:', err);
    }
}

async function loadPolicyAudit() {
    try {
        var response = await fetch('/api/policy/audit');
        var data = await response.json();
        state.policyAuditLog = data.logs || [];
        state.policyAuditLoaded = true;
        render();
    } catch(err) {
        console.error('Error loading policy audit:', err);
    }
}

function editPolicyRule(ruleId, paramName, currentValue) {
    var newValue = prompt('Edit ' + paramName + '\n\nCurrent value: ' + currentValue + '\nEnter new value:');
    if(newValue === null || newValue === '') return;
    
    var reason = prompt('Reason for change:\n(e.g., RBI Circular update, Board approval, etc.)');
    if(!reason) {
        alert('Reason is required for audit trail');
        return;
    }
    
    // Call API to update
    fetch('/api/policy/rules/' + ruleId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            newValue: parseFloat(newValue),
            reason: reason
        })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if(data.success) {
            alert('Policy rule updated successfully!\n\nParameter: ' + paramName + '\nNew Value: ' + newValue + '\nReason: ' + reason);
            loadPolicyRules();
            loadPolicyAudit();
        } else {
            alert('Error: ' + data.error);
        }
    })
    .catch(function(err) {
        alert('Error updating policy rule: ' + err.message);
    });
}

function triggerPolicyUpload(policyType){
    document.getElementById('policyFile_' + policyType).click();
}

function handlePolicyUpload(policyType, input){
    if(!input.files || !input.files[0]) return;
    
    var file = input.files[0];
    var typeNames = {
        'rbi': 'RBI Master Circular',
        'internal': 'Internal Credit Policy',
        'board': 'Board Approved Norms'
    };
    
    // Add to policies list (in production, would upload to S3)
    var newPolicy = {
        id: 'policy_' + Date.now(),
        name: typeNames[policyType],
        version: 'V' + new Date().getFullYear() + '-' + (new Date().getMonth() + 1).toString().padStart(2, '0'),
        type: policyType,
        status: 'active',
        uploadedAt: new Date().toISOString().split('T')[0],
        fileName: file.name,
        clauses: {}
    };
    
    creditPolicies.push(newPolicy);
    alert('Policy uploaded successfully: ' + file.name + '\n\nNote: In production, this would be parsed to extract clause mappings.');
    render();
}

function viewPolicyClauses(policyIdx){
    var policy = creditPolicies[policyIdx];
    if(!policy) return;
    
    var clauseList = '';
    Object.keys(policy.clauses).forEach(function(clause){
        clauseList += 'Clause ' + clause + ': ' + policy.clauses[clause] + '\n';
    });
    
    alert('Policy: ' + policy.name + ' ' + policy.version + '\n\n' + (clauseList || 'No clauses defined'));
}

function openPolicyClause(clauseRef){
    if(!clauseRef) return;
    
    // Find clause in active policies
    var clauseText = '';
    var policyName = '';
    
    for(var i = 0; i < creditPolicies.length; i++){
        var policy = creditPolicies[i];
        if(policy.status === 'active' && policy.clauses[clauseRef]){
            clauseText = policy.clauses[clauseRef];
            policyName = policy.name + ' ' + policy.version;
            break;
        }
    }
    
    if(clauseText){
        alert('📋 ' + policyName + '\n\nClause §' + clauseRef + ':\n' + clauseText);
    } else {
        alert('Clause §' + clauseRef + ' - Details not available.\n\nPolicy: MSME Credit Policy V2024-25 / 3.2');
    }
}

// ── Masters Add / Edit Modal ──────────────────────────────────────────────────
// Both Add and Edit use the same modal. The schema for each master type is
// fetched from /api/masters/:masterType/schema which returns the field
// definitions (name, label, type, required, options) from masters-schema.json.
// The form renders every field dynamically so we never need to hard-code a
// per-master form — works for all 27 master types.

var mastersModalState = { masterType: null, recordId: null, mode: null };

function closeMasterFormModal() {
    var el = document.getElementById('masterFormModal');
    if (el) el.remove();
}

function renderMasterFormModal(masterType, schema, existingRecord, mode) {
    var isEdit = mode === 'edit';
    var title  = (isEdit ? 'Edit' : 'Add') + ' record in ' + (schema.display_name || masterType);
    var fields = schema.fields || [];

    var formRows = fields.map(function(field) {
        var current = existingRecord ? (existingRecord[field.name] != null ? existingRecord[field.name] : '') : '';
        var required = field.required ? 'required' : '';
        var reqMark  = field.required ? '<span class="text-red-500 ml-1">*</span>' : '';
        var inputId  = 'mf_' + field.name;
        var input;

        if (field.type === 'textarea') {
            input = '<textarea id="' + inputId + '" name="' + field.name + '" rows="2" ' + required + ' ' +
                    'class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-axis-primary focus:border-transparent">' +
                    escapeHtml(String(current)) + '</textarea>';

        } else if (field.type === 'boolean') {
            var checked = current === true || current === 'true' || current === 1 ? 'checked' : '';
            input = '<label class="flex items-center gap-2 mt-1">' +
                    '<input type="checkbox" id="' + inputId + '" name="' + field.name + '" ' + checked + ' ' +
                    'class="h-4 w-4 text-axis-primary border-gray-300 rounded">' +
                    '<span class="text-sm text-gray-600">' + escapeHtml(field.label) + '</span></label>';

        } else if (field.type === 'select' && field.options && field.options.length) {
            var opts = field.options.map(function(o) {
                var sel = String(current) === String(o) ? 'selected' : '';
                return '<option value="' + escapeHtml(o) + '" ' + sel + '>' + escapeHtml(o) + '</option>';
            }).join('');
            input = '<select id="' + inputId + '" name="' + field.name + '" ' + required + ' ' +
                    'class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-axis-primary">' +
                    '<option value="">-- Select --</option>' + opts + '</select>';

        } else {
            var inputType = field.type === 'number' ? 'number' :
                            field.type === 'date'   ? 'date'   :
                            field.type === 'email'  ? 'email'  : 'text';
            var step = field.type === 'number' ? ' step="any"' : '';
            var readOnly = isEdit && field.unique ? 'readonly class="w-full border border-gray-200 bg-gray-100 rounded px-3 py-2 text-sm text-gray-500 cursor-not-allowed"' :
                                                    'class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-axis-primary"';
            input = '<input type="' + inputType + '" id="' + inputId + '" name="' + field.name + '" ' +
                    'value="' + escapeHtml(String(current)) + '" ' + required + step + ' ' + readOnly + '>';
        }

        // For boolean, label is inside the input itself
        if (field.type === 'boolean') {
            return '<div class="mb-3">' + input + '</div>';
        }
        return '<div class="mb-3">' +
               '<label class="block text-xs font-semibold text-gray-700 mb-1">' + escapeHtml(field.label) + reqMark + '</label>' +
               input + '</div>';
    }).join('');

    var html =
        '<div id="masterFormModal" class="fixed inset-0 z-50 overflow-y-auto bg-gray-500 bg-opacity-75">' +
        '<div class="min-h-screen flex items-center justify-center px-4">' +
        '<div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl">' +

        // Header
        '<div class="bg-axis-primary px-6 py-4 rounded-t-xl flex items-center justify-between">' +
        '<h3 class="text-lg font-bold text-white">' + escapeHtml(title) + '</h3>' +
        '<button onclick="closeMasterFormModal()" class="text-white hover:text-gray-200 text-2xl leading-none">&times;</button>' +
        '</div>' +

        // Form body
        '<form id="masterRecordForm" onsubmit="submitMasterForm(event)" class="px-6 py-5 max-h-[70vh] overflow-y-auto">' +
        formRows +
        '<div id="masterFormError" class="hidden mb-3 p-3 bg-red-50 border border-red-200 rounded text-sm text-red-700"></div>' +
        '</form>' +

        // Footer
        '<div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3 rounded-b-xl">' +
        '<button onclick="closeMasterFormModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Cancel</button>' +
        '<button onclick="document.getElementById(\'masterRecordForm\').requestSubmit()" ' +
        'class="px-5 py-2 bg-axis-primary text-white rounded-lg text-sm font-semibold hover:opacity-90">' +
        (isEdit ? 'Save Changes' : 'Add Record') +
        '</button></div>' +
        '</div></div></div>';

    document.body.insertAdjacentHTML('beforeend', html);
}

// Add master record — handles two call signatures:
//   addMasterRecord(masterType) — from the main all-masters table (+ Add button)
//   addMasterRecord()           — from the per-master detail view
window.addMasterRecord = function(masterType) {
    // If no argument, we're in the detail view — use mastersState.currentMaster
    if (!masterType) {
        showMasterModal(null);
        return;
    }
    // From main masters table — show the schema-driven form
    mastersModalState = { masterType: masterType, recordId: null, mode: 'add' };
    fetch('/api/masters/' + masterType + '/schema')
        .then(function(r) { return r.json(); })
        .then(function(schema) {
            renderMasterFormModal(masterType, schema, null, 'add');
        })
        .catch(function(err) {
            alert('Could not load schema for ' + masterType + ': ' + err.message);
        });
};

// Edit master record — handles two call signatures:
//   editMasterRecord(masterType, recordId) — from the main all-masters table
//   editMasterRecord(recordId)             — from the per-master detail view
window.editMasterRecord = function(masterTypeOrId, recordId) {
    // If only one argument, we're in the detail view — use mastersState.currentMaster
    if (recordId === undefined) {
        var id = masterTypeOrId;
        var record = mastersState.records.find(function(r) { return r.id === id; });
        showMasterModal(record);
        return;
    }
    // Two arguments — from the main masters table
    mastersModalState = { masterType: masterTypeOrId, recordId: recordId, mode: 'edit' };
    Promise.all([
        fetch('/api/masters/' + masterTypeOrId + '/schema').then(function(r) { return r.json(); }),
        fetch('/api/masters/' + masterTypeOrId + '/' + recordId).then(function(r) { return r.json(); })
    ])
    .then(function(results) {
        renderMasterFormModal(masterTypeOrId, results[0], results[1], 'edit');
    })
    .catch(function(err) {
        alert('Could not load record for editing: ' + err.message);
    });
};

// Form submission handler (shared by Add and Edit)
window.submitMasterForm = function(e) {
    e.preventDefault();
    var form = document.getElementById('masterRecordForm');
    var errDiv = document.getElementById('masterFormError');
    var s = mastersModalState;

    // Collect field values from the form
    var payload = {};
    form.querySelectorAll('input, select, textarea').forEach(function(el) {
        if (!el.name) return;
        if (el.type === 'checkbox') {
            payload[el.name] = el.checked;
        } else if (el.type === 'number') {
            payload[el.name] = el.value !== '' ? parseFloat(el.value) : null;
        } else {
            payload[el.name] = el.value;
        }
    });

    var url    = s.mode === 'edit'
                    ? '/api/masters/' + s.masterType + '/' + s.recordId
                    : '/api/masters/' + s.masterType;
    var method = s.mode === 'edit' ? 'PUT' : 'POST';

    // Disable the submit button while saving
    var submitBtn = form.closest('.bg-white').querySelector('button[onclick*="requestSubmit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
    errDiv.classList.add('hidden');

    fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            closeMasterFormModal();
            openMasters(); // Reload the full masters table
        } else {
            throw new Error(data.error || 'Unknown error from server');
        }
    })
    .catch(function(err) {
        errDiv.textContent = 'Error: ' + err.message;
        errDiv.classList.remove('hidden');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = s.mode === 'edit' ? 'Save Changes' : 'Add Record'; }
    });
};

// Delete master record
window.deleteMasterRecord = function(masterType, recordId) {
    if (!confirm('Delete this record?\n\nThis will be saved to S3 immediately.')) return;
    
    fetch('/api/masters/' + masterType + '/' + recordId, {
        method: 'DELETE'
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        alert('Record deleted successfully!\n\nSaved to S3.');
        openMasters(); // Reload page
    })
    .catch(function(err) {
        alert('Error deleting record: ' + err.message);
    });
};

// Toggle impact section visibility
window.toggleImpact = function(masterKey) {
    var impactDiv = document.getElementById('impact-' + masterKey);
    var icon = document.getElementById('impact-icon-' + masterKey);
    
    if (impactDiv) {
        if (impactDiv.classList.contains('hidden')) {
            impactDiv.classList.remove('hidden');
            icon.style.transform = 'rotate(180deg)';
        } else {
            impactDiv.classList.add('hidden');
            icon.style.transform = 'rotate(0deg)';
        }
    }
};

function showMasterModal(record){
    var html = '<div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onclick="closeMasterModal(event)">';
    html += '<div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-hidden" onclick="event.stopPropagation()">';
    html += '<div class="p-6 border-b flex items-center justify-between sticky top-0 bg-white z-10">';
    html += '<h3 class="text-2xl font-bold text-gray-900">'+(record ? 'Edit' : 'Add New')+' Record</h3>';
    html += '<button onclick="closeMasterModal()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold leading-none">&times;</button>';
    html += '</div>';
    html += '<div class="p-6 overflow-y-auto" style="max-height: calc(90vh - 180px);">';
    html += '<form id="masterForm" class="space-y-4">';
    
    mastersState.schema.fields.forEach(function(field){
        // Skip system fields
        if(field.name === 'created_by' || field.name === 'created_at' || field.name === 'updated_by' || field.name === 'updated_at'){
            return;
        }
        
        if(field.type === 'boolean'){
            html += '<div class="flex items-center">';
            html += '<input type="checkbox" id="'+field.name+'" name="'+field.name+'" '+(record && record[field.name] ? 'checked' : '')+' class="h-4 w-4 text-axis-primary border-gray-300 rounded focus:ring-axis-primary">';
            html += '<label for="'+field.name+'" class="ml-2 block text-sm text-gray-900">'+field.label+'</label>';
            html += '</div>';
        } else if(field.type === 'select'){
            html += '<div>';
            html += '<label class="block text-sm font-medium text-gray-700 mb-1">'+field.label+(field.required ? ' <span class="text-red-500">*</span>' : '')+'</label>';
            html += '<select name="'+field.name+'" '+(field.required ? 'required' : '')+' class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-axis-primary focus:border-transparent">';
            html += '<option value="">Select...</option>';
            field.options.forEach(function(opt){
                var selected = record && record[field.name] === opt ? 'selected' : '';
                html += '<option value="'+opt+'" '+selected+'>'+opt+'</option>';
            });
            html += '</select>';
            html += '</div>';
        } else if(field.type === 'textarea'){
            html += '<div>';
            html += '<label class="block text-sm font-medium text-gray-700 mb-1">'+field.label+(field.required ? ' <span class="text-red-500">*</span>' : '')+'</label>';
            html += '<textarea name="'+field.name+'" '+(field.required ? 'required' : '')+' rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-axis-primary focus:border-transparent">'+(record ? (record[field.name] || '') : '')+'</textarea>';
            html += '</div>';
        } else {
            html += '<div>';
            html += '<label class="block text-sm font-medium text-gray-700 mb-1">'+field.label+(field.required ? ' <span class="text-red-500">*</span>' : '')+'</label>';
            var inputType = field.type === 'email' ? 'email' : field.type === 'number' ? 'number' : field.type === 'date' ? 'date' : 'text';
            var inputValue = record ? (record[field.name] || '') : (field.default || '');
            html += '<input type="'+inputType+'" name="'+field.name+'" value="'+inputValue+'" '+(field.required ? 'required' : '')+' class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-axis-primary focus:border-transparent">';
            html += '</div>';
        }
    });
    
    html += '</form>';
    html += '</div>';
    html += '<div class="p-6 border-t flex justify-end gap-3 bg-gray-50">';
    html += '<button onclick="closeMasterModal()" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 font-medium">Cancel</button>';
    html += '<button onclick="saveMasterRecord(\''+(record ? record.id : '')+'\')" class="px-6 py-2 bg-axis-primary text-white rounded-lg hover:bg-axis-dark font-semibold">Save Record</button>';
    html += '</div>';
    html += '</div></div>';
    
    var modalDiv = document.getElementById('masterModal');
    if(!modalDiv){
        modalDiv = document.createElement('div');
        modalDiv.id = 'masterModal';
        document.body.appendChild(modalDiv);
    }
    modalDiv.innerHTML = html;
}

function closeMasterModal(event){
    if(event && event.target !== event.currentTarget) return;
    var modalDiv = document.getElementById('masterModal');
    if(modalDiv) modalDiv.remove();
}

function saveMasterRecord(id){
    var form = document.getElementById('masterForm');
    if(!form.checkValidity()){
        form.reportValidity();
        return;
    }
    
    var formData = new FormData(form);
    var data = {};
    
    mastersState.schema.fields.forEach(function(field){
        // Skip system fields
        if(field.name === 'created_by' || field.name === 'created_at' || field.name === 'updated_by' || field.name === 'updated_at'){
            return;
        }
        
        if(field.type === 'boolean'){
            data[field.name] = formData.get(field.name) === 'on';
        } else if(field.type === 'number'){
            var val = formData.get(field.name);
            data[field.name] = val ? parseFloat(val) : (field.required ? 0 : null);
        } else {
            data[field.name] = formData.get(field.name) || '';
        }
    });
    
    var url = '/api/masters/'+mastersState.currentMaster + (id ? '/'+id : '');
    var method = id ? 'PUT' : 'POST';
    
    fetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(res => res.json())
    .then(result => {
        if(result.success){
            closeMasterModal();
            openMasterType(mastersState.currentMaster);
        } else {
            alert('Error: ' + (result.error || 'Unknown error'));
        }
    }).catch(err => alert('Error saving record: ' + err.message));
}

function deleteMasterRecord(id){
    if(!confirm('Are you sure you want to delete this record? This action cannot be undone.')) return;
    
    fetch('/api/masters/'+mastersState.currentMaster+'/'+id, {
        method: 'DELETE'
    }).then(res => res.json())
    .then(result => {
        if(result.success){
            openMasterType(mastersState.currentMaster);
        } else {
            alert('Error: ' + (result.error || 'Unknown error'));
        }
    }).catch(err => alert('Error deleting record: ' + err.message));
}

function getSortIcon(col){
    if(state.sortColumn!==col) return '<svg class="w-3 h-3 ml-1 inline opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>';
    return state.sortDirection==='asc'?'<svg class="w-3 h-3 ml-1 inline text-axis-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>':'<svg class="w-3 h-3 ml-1 inline text-axis-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
}
function sortByColumn(col){
    if(state.sortColumn===col){state.sortDirection=state.sortDirection==='asc'?'desc':'asc';}
    else{state.sortColumn=col;state.sortDirection='asc';}
    render();
}
function sortCasesList(cases){
    var sorted=cases.slice();
    sorted.sort(function(a,b){
        var valA,valB;
        switch(state.sortColumn){
            case'id':valA=a.id||'';valB=b.id||'';break;
            case'company':valA=(a.company||'').toLowerCase();valB=(b.company||'').toLowerCase();break;
            case'amount':valA=a.amount||0;valB=b.amount||0;break;
            case'date':valA=new Date(a.processedAt||a.created_at||0).getTime();valB=new Date(b.processedAt||b.created_at||0).getTime();break;
            case'product':valA=a.product||'';valB=b.product||'';break;
            case'status':valA=a.status||'';valB=b.status||'';break;
            case'tat':valA=a.tat||0;valB=b.tat||0;break;
            default:return 0;
        }
        if(valA<valB)return state.sortDirection==='asc'?-1:1;
        if(valA>valB)return state.sortDirection==='asc'?1:-1;
        return 0;
    });
    return sorted;
}

async function submitStatusChange(){
    var ns=document.getElementById('newStatus').value;
    var reason=document.getElementById('statusReason').value.trim();
    if(!reason){alert('Please enter a reason.');return;}
    var a=state.statusChangeAssessment;
    if(ns===a.currentStatus){alert('Select a different status.');return;}
    try{
        var r=await fetch('/api/assessment/'+a.id+'/change-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_status:ns,reason:reason,previous_status:a.currentStatus})});
        var d=await r.json();
        if(d.success){alert('Status updated to '+ns);var idx=casesList.findIndex(function(c){return c.id===a.id;});if(idx!==-1){casesList[idx].status=ns;casesList[idx].status_override=true;}closeStatusChangeModal();}
        else{alert('Error: '+(d.error||'Failed'));}
    }catch(e){alert('Error: '+e.message);}
}
